- hosts: controller
  become: true
  vars: 
    export_path: "/config"
    export_name: "config"
    local_path:  "/config"
  tasks:
    - include_role: 
        name: privilege_group
    - include_role: 
        name: nfs-server       
- hosts: controller, slurm_backup
  become: true
  gather_facts: true
  roles: 
    - yaml
    - oci-cloud-agent
    - privilege_group
    - oci-legacy
    - packages
    - firewall 
    - oci-hostname
    - ssh
    - limits
    - boot-volume
    - mpivars

- hosts: controller, slurm_backup
  become: true
  tasks: 
    - include_role: 
        name: localdisk
      when: localdisk | default(true) | bool
    - include_role: 
        name: healthchecks

- hosts: controller
  become: true
  vars:
    export_path: "/home"
    export_name: "home"
    local_path:  "/home"
  tasks:
    - include_role:
        name: nfs-server
      when: home_nfs|bool and (not home_fss|bool)

- hosts: controller
  become: true
  vars:
    tmp_home: "/tmp/home_tmp/"
    remote_path: "{% if create_fss|bool %}/home{% else%}{{nfs_source_path}}{% endif %}"
  tasks:
    - include_role:
        name: nfs-client
      vars:
        local_path: "{{tmp_home}}"
        export_host: "{{ nfs_source_IP }}"
        export_path: "{{ remote_path }}"
        options: ""
        lock: "none"
      when: add_nfs|bool and home_fss|bool 
    - include_role:
        name: fss-home
      when: add_nfs|bool and home_fss|bool

- hosts: controller, slurm_backup
  become: true
  tasks:
    - include_role:
        name: nfs-client
      vars:
        local_path: "/home"
        export_host: "{{ nfs_source_IP }}"
        export_path: "{% if create_fss|bool %}/home{% else%}{{nfs_source_path}}/home{% endif %}"
        options: ""
        lock: "none"
      when: add_nfs|bool and home_fss|bool
    - include_role: 
        name: passwords


- hosts: controller
  become: true
  vars:

  tasks:
    - include_role: 
        name: ssl
      when: ldap|default(true)|bool
    - include_role: 
        name: openldap
      when: ldap|default(true)|bool
    - include_role: 
        name: cluster-cli
      when: ldap|default(true)|bool
 
- hosts: controller
  become: true
  tasks:
    - include_role: 
        name: mysql

- hosts: controller, slurm_backup
  become: true
  tasks: 
    - include_role:
        name: nfs-client
      vars:
        local_path: "{{ nfs_target_path }}"
        export_host: "{{ nfs_source_IP }}"
        export_path: "{{ nfs_source_path }} "
        options: "{{ nfs_options }}"
        lock: "none"
      when: add_nfs|default(false)|bool

- hosts: controller, slurm_backup
  become: true
  tasks: 
    - include_role: 
        name: sssd
      when: ldap|default(true)|bool

- hosts: controller, slurm_backup
  vars: 
    compute_node: false
  tasks: 
    - include_role: 
        name: metrics-exporter
      when: cluster_monitoring|default(false)|bool
        
- hosts: controller
  become: true
  tasks: 
    - include_role: 
        name: mgmt
    - include_role: 
        name: queue_write

- hosts: controller, slurm_backup
  become: true
  tasks: 
    - include_role: 
        name: fix_ldap
      when: ldap|default(true)|bool

- hosts: controller, slurm_backup
  vars:
    slurm_mode: 'controller'
    resize: false
    enroot_top_path: "{{ nvme_path }}/enroot/"
  tasks: 
    - include_role: 
        name: rack-aware
    - include_role: 
        name: spack
      when: spack|default(false)|bool
    - include_role: 
        name: slurm
      when: slurm|default(false)|bool

- hosts: monitoring
  tasks:     
    - include_role: 
        name: wait_for_cloud_init
    - include_role: 
        name: grafana
      when: cluster_monitoring|default(false)|bool and ( groups['monitoring'] | length > 0 ) 

- hosts: controller
  tasks: 
    - include_role: 
        name: grafana
      when: cluster_monitoring|default(false)|bool and ( groups['monitoring'] | length == 0 ) 

- hosts: controller, monitoring
  tasks: 
    - include_role: 
        name: prometheus
      when: cluster_monitoring|default(false)|bool

- hosts: controller, slurm_backup
  become: true
  vars:
    ansible_user: "{% if ansible_os_family == 'RedHat' %}opc{% else%}ubuntu{% endif %}"
    http_server_status: "configured"
  gather_facts: true
  roles: 
    - http_server