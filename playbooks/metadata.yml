---
- hosts: localhost
  become: true
  vars:
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
    http_server_status: "configuring"
    http_server_role: "compute"
  gather_facts: true
  tasks:
    - name: Update http server in configuring mode
      ansible.builtin.include_role:
        name: http_server

- hosts: localhost
  become: true
  vars:
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
    http_server_status: "configured"
    http_server_role: "compute"
  gather_facts: true
  tasks:
    - name: Update http server in configured mode
      ansible.builtin.include_role:
        name: http_server
