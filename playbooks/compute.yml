---
- name: Gather facts
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Gather facts before fact-dependent play vars
      ansible.builtin.include_role:
        name: gather-facts

- name: Install node basics like mgmt, ssh
  hosts: localhost
  become: true
  gather_facts: true
  vars:
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
  tasks:
    - name: Install mgmt
      ansible.builtin.include_role:
        name: mgmt
    - name: Install ssh
      ansible.builtin.include_role:
        name: ssh
    - name: Change hostname
      ansible.builtin.include_role:
        name: hostname
      when: change_hostname | default(false) | bool
    - name: Disable daily updates on Ubuntu, "hold" kernel, fix broken packages
      ansible.builtin.include_role:
        name: fix_broken
      when: ansible_facts['os_family'] == 'Debian'

- name: Run standard roles
  hosts: localhost
  become: true
  vars:
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
    http_server_status: "configuring"
    http_server_role: "compute"
  gather_facts: true
  roles:
    - oci-cloud-agent
    - http_server
    - privilege_group
    - oci-legacy
    - packages
    - firewall
    - oci-hostname
    - limits
    - boot-volume
    - mpivars
    - queue_read
    - oom-adjust

- name: Setup local disk, health checks
  hosts: localhost
  become: true
  gather_facts: true
  vars:
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
  tasks:
    - name: Configure local NVMe drives
      ansible.builtin.include_role:
        name: localdisk
      when: localdisk | default(true) | bool
    - name: Load the nvidia_peermem kernel module
      ansible.builtin.include_role:
        name: nvidia_peermem
    - name: Install health check scripts
      ansible.builtin.include_role:
        name: healthchecks

- name: Clean old files in tmp
  hosts: localhost
  become: true
  tasks:
    - name: Install systemd service to clean tmp
      ansible.builtin.include_role:
        name: clean_tmp

- name: Configure hyperthreading
  hosts: localhost
  become: true
  gather_facts: true
  tasks:
    - name: Install the hyperthreading controlling service
      ansible.builtin.include_role:
        name: hyperthreading
      when: not hyperthreading | default(true) | bool

- name: Configure NFS
  hosts: localhost
  become: true
  tasks:
    - name: Enable NFS home directories in SELinux
      ansible.builtin.include_role:
        name: home_nfs
      when: shared_home != "none"
    - name: Configure shared home directories via NFS
      ansible.builtin.include_role:
        name: nfs-client
      vars:
        local_path: "/home"
        export_host: "{{ controller_hostname }}"
        export_path: "/home"
        options: "defaults,noatime,bg,timeo=100,ac,actimeo=120,nocto,rsize=1048576,wsize=1048576,nolock,local_lock={{ lock }},mountproto=tcp,sec=sys,_netdev"
        lock: "all"
      when: shared_home == "nfs"
    - name: Configure shared home directories via FSS
      ansible.builtin.include_role:
        name: nfs-client
      vars:
        local_path: "/home"
        export_host: "{{ nfs_source_IP }}"
        export_path: "{% if create_fss == 'new' %}/home{% else %}{{ nfs_source_path }}/home{% endif %}"
        options: ""
        lock: "none"
      when: shared_home == "fss"
    - name: Configure the generic NFS client
      ansible.builtin.include_role:
        name: nfs-client
      vars:
        local_path: "{{ nfs_target_path }}"
        export_host: "{{ nfs_source_IP }}"
        export_path: "{{ nfs_source_path }} "
        options: "{{ nfs_options }}"
        lock: "none"
      when: add_nfs | default(false) | bool

- name: Set up sssd
  hosts: localhost
  become: true
  tasks:
    - name: Set up the Systems Security Services Demon
      ansible.builtin.include_role:
        name: sssd
      when: ldap | default(true) | bool

- name: Configure container setup
  hosts: localhost
  vars:
    enroot_top_path: "{{ nvme_path }}/enroot/"
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
  pre_tasks:
    - name: Prepare shared 3rdparty paths
      ansible.builtin.import_tasks: tasks/prepare_thirdparty_paths.yml
  tasks:
    - name: Configure Enroot/Pyxis/Container runtimes
      when: enroot | default(true) | bool
      block:
        - name: Install and configure Docker
          ansible.builtin.include_role:
            name: docker
        - name: Configure the AMD container runtime
          ansible.builtin.include_role:
            name: amd-container
          when: "'BM.GPU.MI' in shape"
        - name: Configure the NVIDIA container runtime
          ansible.builtin.include_role:
            name: nvidia-container
          when:
            - "'GPU' in shape"
            - "'BM.GPU.MI' not in shape"
        - name: Set up Enroot
          ansible.builtin.include_role:
            name: nvidia-enroot
    - name: Add nccl-conf role for RDMA clusters
      ansible.builtin.include_role:
        name: nccl-conf
      when: rdma_enabled | bool
    - name: Add imex role for GPU.GB shapes
      ansible.builtin.include_role:
        name: imex
      when: "'GPU.GB' in shape"

- name: Configure Lustre
  hosts: localhost
  pre_tasks:
    - name: Prepare shared 3rdparty paths
      ansible.builtin.import_tasks: tasks/prepare_thirdparty_paths.yml
  tasks:
    - name: Add lustre-client when LFS is added to the cluster
      ansible.builtin.include_role:
        name: lustre_client
        apply:
          environment:
            DEBIAN_FRONTEND: noninteractive
      vars:
        lustre_client:
          local_path: "{{ lfs_target_path }}"
          export_host: "{{ lfs_source_IP }}"
          options: "{{ lfs_options }}"
          export_path: "{{ lfs_source_path }}"
          lock: "none"
      when: add_lfs | default(false) | bool
    - name: Configure NHC
      ansible.builtin.include_role:
        name: nhc

- name: Configure object storage mount
  hosts: localhost
  gather_facts: true
  tasks:
    - name: Mount cluster bucket
      ansible.builtin.include_role:
        name: bucket-fs
      when: create_bucket | bool

- name: Run custom Ansible role
  hosts: localhost
  become: true
  gather_facts: true
  tasks:
    - name: Run custom test role
      ansible.builtin.include_role:
        name: custom

- name: Set up SLURM, spack, metrics exporter
  hosts: localhost
  vars:
    slurm_mode: "compute"
    enroot_top_path: "{{ nvme_path }}/enroot/"
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
    compute_node: true
  pre_tasks:
    - name: Collect cluster archiecture context
      ansible.builtin.import_tasks: tasks/collect_cluster_context.yml
    - name: Prepare shared 3rdparty paths
      ansible.builtin.import_tasks: tasks/prepare_thirdparty_paths.yml
  tasks:
    - name: Install rack aware helper scripts
      ansible.builtin.include_role:
        name: rack-aware
    - name: Set up Spack
      ansible.builtin.include_role:
        name: spack
      when: spack | default(false) | bool
    - name: Set up SLURM
      ansible.builtin.include_role:
        name: slurm
      when: slurm | default(false) | bool
    - name: Install metrics exporter
      ansible.builtin.include_role:
        name: metrics-exporter
      when: cluster_monitoring | default(false) | bool

- name: Launch the HTTP metadata server
  hosts: localhost
  become: true
  vars:
    ansible_user: "{% if ansible_facts['os_family'] == 'RedHat' %}opc{% else %}ubuntu{% endif %}"
    http_server_status: "configured"
    http_server_role: "compute"
  gather_facts: true
  roles:
    - http_server
