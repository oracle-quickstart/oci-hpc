- hosts: localhost
  become: true
  gather_facts: true
  tasks:
    - include_role:
        name: hostname
      when: change_hostname  | default(false) | bool
    - include_role:
        name: fix_broken
      when: ansible_os_family == 'Debian'

- hosts: localhost
  become: true
  vars:
    ansible_user: "{% if ansible_os_family == 'RedHat' %}opc{% else%}ubuntu{% endif %}"
    http_server_status: "configuring"
    http_server_role: "compute"
  gather_facts: true
  roles:
    - oci-cloud-agent
    - http_server
    - privilege_group
    - oci-legacy
    - packages
    - firewall
    - oci-hostname
    - ssh
    - limits
    - boot-volume
    - mpivars
    - queue_read

- hosts: localhost
  become: true
  gather_facts: true
  vars:
    ansible_user: "{% if ansible_os_family == 'RedHat' %}opc{% else%}ubuntu{% endif %}"
  tasks:
    - include_role:
        name: localdisk
      when: localdisk | default(true) | bool
    - include_role:
        name: nvidia_peermem
    - include_role:
        name: healthchecks

- hosts: localhost
  become: true
  gather_facts: true
  tasks:
    - include_role:
        name: hyperthreading
      when: not hyperthreading|default(true)|bool

- hosts: localhost
  become: true
  tasks:
    - include_role:
        name: home_nfs
      when: home_nfs|default(true)|bool or home_fss|bool
    - include_role:
        name: nfs-client
      vars:
        local_path: "/home"
        export_host: "{{ controller_hostname }}"
        export_path: "/home"
        options: "defaults,noatime,bg,timeo=100,ac,actimeo=120,nocto,rsize=1048576,wsize=1048576,nolock,local_lock={{ lock }},mountproto=tcp,sec=sys,_netdev"
        lock: "all"
      when: home_nfs|bool and (not home_fss|bool)
    - include_role:
        name: nfs-client
      vars:
        local_path: "/home"
        export_host: "{{ nfs_source_IP }}"
        export_path: "{% if create_fss|bool %}/home{% else%}{{nfs_source_path}}/home{% endif %}"
        options: ""
        lock: "none"
      when: home_nfs|bool and home_fss|bool
    - include_role:
        name: nfs-client
      vars:
        local_path: "{{ nfs_target_path }}"
        export_host: "{{ nfs_source_IP }}"
        export_path: "{{ nfs_source_path }} "
        options: "{{ nfs_options }}"
        lock: "none"
      when: add_nfs|default(false)|bool

- hosts: localhost
  become: true
  vars:
    enroot_top_path: "{{ nvme_path }}/enroot/"
    ansible_user: "{% if ansible_os_family == 'RedHat' %}opc{% else%}ubuntu{% endif %}"
  tasks:
    - include_role:
        name: docker
      when: enroot|default(true)|bool
    - include_role:
        name: nvidia-container
      when: enroot|default(true)|bool
    - include_role:
        name: nvidia-enroot
      when: enroot|default(true)|bool
    - include_role:
        name: tuned
    - include_role:
        name: nccl-conf
      when: cluster_network|bool

- hosts: localhost
  vars:
    slurm_mode: 'compute'
    download_path: "{{ nfs_target_path if create_fss | bool else ( cluster_nfs_path if cluster_nfs|bool else '/tmp')  }}"
    enroot_top_path: "{{ nvme_path }}/enroot/"
    ansible_user: "{% if ansible_os_family == 'RedHat' %}opc{% else%}ubuntu{% endif %}"
    compute_node: true
  tasks:
    - include_role:
        name: rack-aware
    - include_role:
        name: spack
      when: spack|default(false)|bool
    - include_role:
        name: metrics-exporter
      when: cluster_monitoring|default(false)|bool
    - include_role:
        name: slurm
      when: slurm|default(false)|bool

- hosts: localhost
  become: true
  vars:
    ansible_user: "{% if ansible_os_family == 'RedHat' %}opc{% else%}ubuntu{% endif %}"
    http_server_status: "configured"
    http_server_role: "compute"
  gather_facts: true
  roles: 
    - http_server