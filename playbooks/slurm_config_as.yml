---
- hosts: all
  gather_facts: true
  tasks:
    - debug:
        msg: "Gathering facts"
- hosts: compute, slurm_backup
  gather_facts: true
  vars:
    slurm_mode: "controller"
    enroot_top_path: "{{ nvme_path }}/enroot/"
  tasks:
    - include_role:
        name: slurm
      when: slurm | default(false) | bool
