---

- name: Check if Lustre in installed
  shell: "dpkg -l | grep lustre"
  register: lustre_installed
  ignore_errors: true

- name: Copy Lustre client installation script for Ubuntu
  copy:
    src: files/install_lustre_ubuntu.sh
    dest: /tmp/install_ubuntu.sh
    owner: root
    group: root
    mode: "0755"
  when: lustre_installed.rc != 0

- name: Check if Lustre filesystem is already mounted
  command: "mountpoint -q {{ local_path }}"
  failed_when: false
  changed_when: false
  register: mount_status

- name: Install Lustre client drivers using the downloaded script
  shell: /tmp/install_ubuntu.sh >> ubuntu-lustre-install.logs
  args:
    chdir: /tmp/
    creates: ubuntu-lustre-install.logs
  async: 600
  poll: 10
  when: mount_status.rc != 0 and lustre_installed.rc != 0

- name: Ensure Lustre configuration line is present in lnet.conf
  lineinfile:
    dest: /etc/modprobe.d/lnet.conf
    regexp: '^options lnet networks='
    line: "options lnet networks={{ (lnet_protocol | split('@'))[1] }}({{ ansible_facts['default_ipv4']['interface'] }})"
    create: true
    state: present
    mode: '0644'

- name: Create Lustre mount directory
  become: true
  file:
    path: "{{ local_path }}"
    state: directory
    owner: ubuntu
    group: "{{ privilege_group_name }}"
    mode: "0777"

- name: Update /etc/fstab for mounting Lustre filesystem with user defined options
  lineinfile:
    dest: /etc/fstab
    line: "{{ export_host }}{{ lnet_protocol }}:/{{ export_path }} {{ local_path }} lustre {{ options }} 0 0"
  when: options!=""

- name: Update /etc/fstab for  mounting Lustre filesystem with default options
  lineinfile:
    dest: /etc/fstab
    line: "{{ export_host }}{{ lnet_protocol }}:/{{ export_path }} {{ local_path }} lustre defaults,_netdev 0 0"
  when: options==""

- name: Mount Lustre as per the details updated above in /etc/fstab
  command: "mount {{ local_path }}"
  register: cmd_result
  failed_when: "cmd_result.rc != 0 and ('is already mounted' not in cmd_result.stderr)"
  changed_when: "cmd_result.rc == 0"

- name: Ensure user and group ownership of the mounted share directory is set correctly
  become: true
  file:
    path: "{{ local_path }}"
    state: directory
    owner: ubuntu
    group: "{{ privilege_group_name }}"
