---
- name: Create systemd unit dirs
  become: true
  ansible.builtin.file:
    name: "/opt/oci-hpc/healthchecks"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy files
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/oci-hpc/healthchecks/{{ item }}"
    force: false
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  with_items:
    - check_gpu_setup.py
    - active_healthcheck.py
    - active_HC.sbatch
    - gpu_bw_test.py
    - rdma_link_flapping.py
    - xid_checker.py
    - shared_logging.py
    - multi_node_active_HC.sbatch
    - multi_node_active_healthcheck.py
    - gpu_sdc_checker.py

- name: Download oci-mesh-pinger
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_distribution == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: "{{ mp_download_link_x86 }}"
    dest: "/tmp/{{ mp_filename }}"
  when: ('controller' in group_names) and ansible_architecture == "x86_64"

- name: Download oci-mesh-pinger
  ansible.builtin.get_url:
    url: "{{ mp_download_link_arm }}"
    dest: "/tmp/{{ mp_filename }}"
  when: ('controller' in group_names) and ansible_architecture == "aarch64" and ansible_distribution_major_version != "8"

- name: Untar meshpinger
  ansible.builtin.unarchive:
    src: "/tmp/{{ mp_filename }}"
    dest: "/opt/oci-hpc/healthchecks"
  when: ('controller' in group_names)

- name: Copy files
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/oci-hpc/healthchecks/{{ item }}"
    force: false
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  with_items:
    - run_meshpinger.sh
  when: ('controller' in group_names)

- name: Make sure meshpinger dependencies are installed.
  vars:
    package_name:
      - fping
      - jq
      - lshw
      - ethtool
    package_state: latest
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true

- name: Make sure healthcheck dependencies are installed.
  vars:
    package_name:
      - python3-psutil
      - python3-distro
    package_state: latest
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true

- name: Check for nvcc
  ansible.builtin.command: "nvcc --version"
  register: nvcc_cmd
  changed_when: false
  failed_when: false

- name: Parse CUDA major version from nvcc
  ansible.builtin.set_fact:
    cuda_major: "{{ (nvcc_cmd.stdout | regex_search('release ([0-9]+)\\.[0-9]+', '\\1')) | default(omit) }}"
  when: nvcc_cmd.rc == 0

- name: Fallback - check for nvidia-smi
  ansible.builtin.command: "nvidia-smi"
  register: smi_cmd
  changed_when: false
  failed_when: false
  when: cuda_major is not defined

- name: Parse CUDA major version from nvidia-smi
  ansible.builtin.set_fact:
    cuda_major: "{{ (smi_cmd.stdout | regex_search('CUDA Version: ([0-9]+)\\.[0-9]+', '\\1')) | default(omit) }}"
  when: cuda_major is not defined and smi_cmd.rc == 0

- name: Determine CuPy package name
  ansible.builtin.set_fact:
    cupy_pkg: >-
      {{
        ('cupy-cuda12x' + cupy_version_suffix) if (cuda_major | default('') | string) == '12' else
        ('cupy-cuda11x' + cupy_version_suffix) if (cuda_major | default('') | string) == '11' else
        ('cupy' + cupy_version_suffix)
      }}

- name: Show detected CUDA and chosen package
  ansible.builtin.debug:
    msg:
      - "Detected CUDA major: {{ cuda_major | default('unknown') }}"
      - "Installing package: {{ cupy_pkg }}"

- name: Install CuPy with pip
  ansible.builtin.pip:
    name:
      - "{{ cupy_pkg }}"
      - numpy
    state: latest

