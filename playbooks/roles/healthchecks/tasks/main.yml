---
- name: Create systemd unit dirs
  become: true
  ansible.builtin.file:
    name: "/opt/oci-hpc/healthchecks"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Copy files
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/oci-hpc/healthchecks/{{ item }}"
    force: false
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  with_items:
    - check_gpu_setup.py
    - active_healthcheck.py
    - active_HC.sbatch
    - gpu_bw_test.py
    - rdma_link_flapping.py
    - xid_checker.py
    - shared_logging.py
    - multi_node_active_HC.sbatch
    - multi_node_active_healthcheck.py
    - gpu_sdc_checker.py

- name: Download oci-mesh-pinger
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_distribution == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: "{{ mp_download_link_x86 }}"
    dest: "/tmp/{{ mp_filename }}"
  when: ('controller' in group_names) and ansible_architecture == "x86_64"

- name: Download oci-mesh-pinger
  ansible.builtin.get_url:
    url: "{{ mp_download_link_arm }}"
    dest: "/tmp/{{ mp_filename }}"
  when: ('controller' in group_names) and ansible_architecture == "aarch64" and ansible_distribution_major_version != "8"

- name: Untar meshpinger
  ansible.builtin.unarchive:
    src: "/tmp/{{ mp_filename }}"
    dest: "/opt/oci-hpc/healthchecks"
  when: ('controller' in group_names)

- name: Copy files
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/opt/oci-hpc/healthchecks/{{ item }}"
    force: false
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  with_items:
    - run_meshpinger.sh
  when: ('controller' in group_names)

- name: Make sure meshpinger dependencies are installed.
  vars:
    package_name:
      - fping
      - jq
      - lshw
      - ethtool
    package_state: latest
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true

- name: Make sure healthcheck dependencies are installed.
  vars:
    package_name:
      - python3-psutil
      - python3-distro
    package_state: latest
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true

- name: Check for nvidia-smi
  ansible.builtin.command: "nvidia-smi"
  register: smi_cmd
  changed_when: false
  failed_when: false

- name: Parse CUDA version from nvidia-smi
  ansible.builtin.set_fact:
    cuda_version: "{{ smi_cmd.stdout | regex_search('CUDA Version: ([0-9]+\\.[0-9]+)', '\\1') | first }}"
  when: smi_cmd.rc == 0

- name: Extract CUDA major version
  ansible.builtin.set_fact:
    cuda_major: "{{ cuda_version.split('.')[0] }}"
  when: cuda_version is defined

- name: Determine CuPy package
  ansible.builtin.set_fact:
    cupy_pkg: >-
      {{
        'cupy-cuda12x' if (cuda_major | default('') | string) == '12' else
        'cupy-cuda11x' if (cuda_major | default('') | string) == '11' else
        'cupy-cuda110' if (cuda_major | default('') | string) == '11' else
        'cupy'
      }}

- name: Show detected versions
  ansible.builtin.debug:
    msg:
      - "CUDA Version: {{ cuda_version | default('unknown') }}"
      - "CUDA Major: {{ cuda_major | default('unknown') }}"
      - "CuPy Package: {{ cupy_pkg }}"

- name: Update pip first
  ansible.builtin.pip:
    name:
      - pip
      - setuptools
      - wheel
    state: latest
    extra_args: "--upgrade"

- name: Install CuPy (attempt pre-built wheels)
  ansible.builtin.pip:
    name:
      - "{{ cupy_pkg }}"
      - numpy
    state: present
    extra_args: "--only-binary :all: --no-cache-dir -v"
  register: cupy_wheels
  failed_when: false
  async: 600
  poll: 15

- name: Install CuPy (from source if wheels failed)
  ansible.builtin.shell: |
    export CUPY_NUM_BUILD_JOBS=2
    export MAX_JOBS=2
    pip install {{ cupy_pkg }} numpy --no-cache-dir -v
  when: cupy_wheels.failed | default(false)
  async: 3600  # 1 hour for compilation
  poll: 60
  environment:
    CUPY_NUM_BUILD_JOBS: "2"
    MAX_JOBS: "2"
