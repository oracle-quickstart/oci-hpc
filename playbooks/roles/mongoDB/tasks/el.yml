---
- name: Ensure the MongoDB repository file is present
  copy:
    dest: /etc/yum.repos.d/mongodb-org-6.0.repo
    content: |
      [mongodb-org-6.0]
      name=MongoDB Repository
      baseurl=https://repo.mongodb.org/yum/redhat/$releasever/mongodb-org/6.0/x86_64/
      gpgcheck=1
      enabled=1
      gpgkey=https://www.mongodb.org/static/pgp/server-6.0.asc

- name: Make sure python OpenSSL and parallel ssh is installed
  vars:
    package_name:
      - nmap
      - mongodb-org
  include_role:
    name: safe_yum

- name: install pymongo latest version
  become: true
  pip:
    name: [pymongo]
    state: latest
    executable: pip3
  ignore_errors: yes

- name: Copying the Mongo Scraper config
  become: true
  template:
    src: nodes_update.py.j2
    dest: "/opt/oci-hpc/bin/nodes_update.py"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0775'  

- name: Copying the file to manually add a node to the queue
  become: true
  template:
    src: add_nodes_to_queue.py.j2
    dest: "/opt/oci-hpc/bin/add_nodes_to_queue.py"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0775'  

- name: Create systemd service unit file
  template:
    src: templates/systemd/node_updater.service
    dest: /etc/systemd/system/node_updater.service
    mode: '0644'

- name: Create systemd service unit file
  template:
    src: templates/systemd/node_updater.timer
    dest: /etc/systemd/system/node_updater.timer
    mode: '0644'

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Start and enable the service
  service:
    name: mongod
    state: started
    enabled: yes

- name: Start and enable the service
  service:
    name: node_updater.timer
    state: started