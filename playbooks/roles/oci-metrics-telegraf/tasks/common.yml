---
- name: Add InfluxData repository - for Telegraf
  become: true
  yum_repository:
    name: influxdata
    description: InfluxData Repository - Stable
    baseurl: https://repos.influxdata.com/stable/$basearch/main
    enabled: 1
    gpgcheck: 1
    gpgkey: https://repos.influxdata.com/influxdata-archive_compat.key
  when: ansible_facts['os_family'] == 'RedHat'

- name: Remove old InfluxData GPG key if exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings/influxdata.gpg
    state: absent
  when: ansible_facts['os_family'] == 'Debian'

- name: Download and install InfluxData GPG key
  become: true
  ansible.builtin.shell: |
    curl -fsSL https://repos.influxdata.com/influxdata-archive_compat.key | gpg --dearmor -o /etc/apt/keyrings/influxdata.gpg
    chmod 0644 /etc/apt/keyrings/influxdata.gpg
  when: ansible_facts['os_family'] == 'Debian'

- name: Manage InfluxData APT repositories - for Telegraf
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/influxdata.gpg] https://repos.influxdata.com/debian stable main"
    filename: influxdata
    state: present
    update_cache: false
  when: ansible_facts['os_family'] == 'Debian'

- name: Update apt cache for InfluxData repository only
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
  environment:
    APT_KEY_DONT_WARN_ON_DANGEROUS_USAGE: "1"
  when: ansible_facts['os_family'] == 'Debian'
  ignore_errors: true

- name: Install Telegraf
  vars:
    package_name:
      - telegraf
    package_state: latest
  include_role:
    name: safe_yum

- name: Force Telegraf gid 995
  become: true
  lineinfile:
    path: /etc/group
    state: present
    regexp: "^telegraf:x:(.*)$"
    line: "telegraf:x:995:"
    backrefs: true

- name: Force Telegraf uid 995
  become: true
  lineinfile:
    path: /etc/passwd
    state: present
    regexp: "^telegraf:x:(.*)$"
    line: "telegraf:x:995:995::/etc/telegraf:/bin/false"
    backrefs: true

- name: Copy telegraf.conf
  become: true
  copy:
    src: "telegraf.conf"
    dest: /etc/telegraf/telegraf.conf
    force: true
    owner: telegraf
    group: telegraf
    mode: "0755"

- name: Render Telegraf configuration files
  become: true
  template:
    src: "{{ item }}.j2"
    dest: /etc/telegraf/telegraf.d/{{ item }}
    force: true
    owner: telegraf
    group: telegraf
    mode: "0755"
  with_items:
    - filter.conf
    - input.conf
    - output.conf

- name: Render OCI Metric Python files
  become: true
  template:
    src: "{{ item }}.j2"
    dest: /usr/local/bin/{{ item }}
    force: true
    owner: telegraf
    group: telegraf
    mode: "0755"
  with_items:
    - oci_metrics_telegraf_input.py
    - oci_metrics_telegraf_filter.py
    - oci_metrics_telegraf_utils.py

- name: Add environment variable to file
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/telegraf
    line: PATH=/usr/local/bin:/usr/bin:/bin:$PATH
    owner: root
    group: root
    mode: "0644"

- name: Restart Telegraf
  become: true
  service:
    name: telegraf
    state: restarted
    enabled: true
