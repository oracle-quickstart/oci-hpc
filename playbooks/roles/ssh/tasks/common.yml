---
- name: Update ssh configuration
  copy: 
    src: files/ssh_config
    dest: /etc/ssh/ssh_config
    owner: root
    group: root
    mode: '0644'

- name: Install private ssh key on all nodes
  copy:
    dest: "/home/{{ ansible_user }}/.ssh/id_ed25519"
    src: "/config/key/cluster.key"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Install public ssh key on all nodes
  copy:
    dest: "/home/{{ ansible_user }}/.ssh/id_ed25519.pub"
    src: "/config/key/public"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'