---
- name: Check if Lustre is already installed on host
  ansible.builtin.shell: |
    set -o pipefail
    dpkg-query -W -f='${Package} ${db:Status-Abbrev}\n' \
      lustre-client-utils \
      lustre-client-modules-dkms \
      2>/dev/null \
      | awk '$2 == "ii" { installed += 1 } END { exit(installed == 2 ? 0 : 1) }'
  args:
    executable: /bin/bash
  register: lustre_client_installed
  ignore_errors: true

- name: Check if shared Lustre package bundle exists
  ansible.builtin.stat:
    path: "{{ lustre_client_tarball_path }}"
  register: lustre_client_built
  ignore_errors: true

- name: Fail if Lustre client is not installed and no shared package is available
  ansible.builtin.fail:
    msg: >-
      Lustre client is not installed and no shared package artifact was found at
      {{ lustre_client_tarball_path }}. Run the Lustre build phase first.
  when:
    - lustre_client_installed.rc != 0
    - not (lustre_client_built.stat.exists | default(false))

- name: Lustre client installation
  when:
    - lustre_client_installed.rc != 0
    - lustre_client_built.stat.exists | default(false)
  block:
    - name: Create temporary staging directory
      ansible.builtin.tempfile:
        state: directory
        prefix: lustre-client-
      register: lustre_client_staging_dir

    - name: Extract the lustre-client tarball
      ansible.builtin.unarchive:
        src: "{{ lustre_client_tarball_path }}"
        dest: "{{ lustre_client_staging_dir.path }}"

    - name: Install lustre-client on the host
      become: true
      ansible.builtin.shell: |
        deb_files=()
        mapfile -t deb_files < <(find {{ lustre_client_staging_dir.path }} -type f -name "*.deb" -not -path "*/.*")

        for pkg in "${deb_files[@]}";
        do
            apt-get install -y $(dpkg -I  "${pkg}" \
                                  | grep "^ Depends: " \
                                  | sed -E -e 's/,/ /g' -e 's/(linux-base|linux-image-oracle|linux-image-oracle-amd64|linux-image-oracle-arm64|linux-headers-oracle|linux-headers-amd64)//g' -e 's/[,\|]//g'  -e 's/ +/ /g' \
                                  | cut -f2 -d:)
        done

        for pkg in "${deb_files[@]}";
        do
            if ! (apt-get update --yes && dpkg --ignore-depends=linux-image-oracle,linux-headers-oracle,linux-headers-amd64,inux-image-oracle-amd64,linux-image-oracle-arm64,linux-headers-oracle,linux-headers-amd64 -i "${pkg}" && rm -f "${pkg}") then
                apt --fix-broken install -y
            fi
        done

        while fuser /var/{lib/{dpkg/{lock,lock-frontend},apt/lists},cache/apt/archives}/lock >/dev/null 2>&1; do
            echo "Waiting for dpkg/apt lock"
            sleep 1
        done

        command -v lnetctl >/dev/null 2>&1 && exit 0 || exit 1
      args:
        executable: /bin/bash
  always:
    - name: Remove the staging directory
      ansible.builtin.file:
        path: "{{ lustre_client_staging_dir.path }}"
        state: absent
      when: lustre_client_staging_dir.path is defined

- name: Ensure no extra ip rules are added by lustre
  become: true
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/lnet.conf
    line: "options ksocklnd skip_mr_route_setup=1"
    create: true
    state: present
    mode: "0644"

- name: Ensure the correct lnet options line is present in /etc/modprobe.d/lnet.conf
  become: true
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/lnet.conf
    line: "options lnet lnet_peer_discovery_disabled=1"
    state: present
    create: true

- name: Ensure Lustre configuration line is present in lnet.conf
  become: true
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/lnet.conf
    regexp: "^options lnet networks="
    line: "options lnet networks={{ (lustre_client_lnet_protocol | split('@'))[1] }}({{ ansible_facts['default_ipv4']['interface'] }})"
    create: true
    state: present
    mode: "0644"

- name: Mount Lustre filesystem
  become: true
  ansible.posix.mount:
    path: "{{ lustre_client.local_path }}"
    src: "{{ lustre_client.export_host }}{{ lustre_client_lnet_protocol }}:/{{ lustre_client.export_path }}"
    opts: "{{ lustre_client.options | default('defaults,_netdev', true) }}"
    fstype: lustre
    state: mounted

- name: Ensure user and group ownership of the mounted share directory is set correctly
  become: true
  ansible.builtin.file:
    path: "{{ lustre_client.local_path }}"
    state: directory
    owner: ubuntu
    group: "{{ privilege_group_name }}"
