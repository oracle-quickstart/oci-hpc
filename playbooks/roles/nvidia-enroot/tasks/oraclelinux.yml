---
- block:
    - name: Ensure /config/3rdparty exists
      ansible.builtin.file:
        path: /config/3rdparty/
        state: directory
        mode: "0755"

    - name: Check if required RPMs are already downloaded
      ansible.builtin.stat:
        path: "/config/3rdparty/{{ item | basename }}"
      register: rpm_files
      with_items:
        - "{{ enroot_file }}"
        - "{{ enroot_caps_file }}"

    - name: Download RPMs if not already present
      when: not item.stat.exists and ansible_facts['distribution_major_version'] != "8"
      ansible.builtin.get_url:
        url: "{{ item.item }}"
        dest: "/config/3rdparty/{{ item.item | basename }}"
        mode: "0755"
        owner: opc
        group: opc
      with_items: "{{rpm_files.results}}"
    - name: Download RPMs if not already present
      when: not item.stat.exists and ansible_facts['distribution_major_version'] == "8"
      environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
      ansible.builtin.get_url:
        url: "{{ item.item }}"
        dest: "/config/3rdparty/{{ item.item | basename }}"
        mode: "0755"
        owner: opc
        group: opc
      with_items: "{{rpm_files.results}}"

    - name: Install required packages
      vars:
        package_name:
          - zstd
          - "/config/3rdparty/{{ enroot_file | basename }}"
          - "/config/3rdparty/{{ enroot_caps_file | basename }}"
        package_repo: "epel,ol{{ ansible_facts['distribution_major_version'] }}_developer_EPEL"
        disable_gpg_check_var: true
      ansible.builtin.include_role:
        name: safe_yum

    # needs reboot
    - name: Update namespace.unpriv_enable=1 kernel parameters
      ansible.builtin.command: bash -c "sudo grubby --args="namespace.unpriv_enable=1" --update-kernel=`sudo grubby --default-kernel`"
    - name: Update user_namespace.enable=1 kernel parameters
      ansible.builtin.command: bash -c "sudo grubby --args="user_namespace.enable=1" --update-kernel=`sudo grubby --default-kernel`"
    - name: Set user.max_user_namespaces using sysctl
      ansible.posix.sysctl:
        name: user.max_user_namespaces
        value: "15076"
        sysctl_file: /etc/sysctl.d/81-enroot.conf
        reload: true

    - name: Check if enroot check RPMs are already downloaded
      ansible.builtin.stat:
        path: "/config/3rdparty/{{ enroot_check_file | basename }}"
      register: enroot_check_files

    - name: Download enroot-check
      ansible.builtin.get_url:
        url: "{{ enroot_check_file }}"
        dest: "/config/3rdparty"
        mode: "0755"
        owner: opc
        group: opc
      when: not enroot_check_files.stat.exists | bool and ansible_facts['distribution_major_version'] != "8"

    - name: Download enroot-check
      environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
      ansible.builtin.get_url:
        url: "{{ enroot_check_file }}"
        dest: "/config/3rdparty"
        mode: "0755"
        owner: opc
        group: opc
      when: not enroot_check_files.stat.exists | bool

    - name: Download enroot-check
      ansible.builtin.copy:
        src: "/config/3rdparty/{{ enroot_check_file | basename }}"
        dest: "/tmp"
        mode: "0755"
        owner: opc
        group: opc

    - name: Execute enroot-check_*.run
      ansible.builtin.command: bash -c "/tmp/enroot-check_*.run --verify"
    - ansible.builtin.set_fact:
        enroot_top_path_checked: "/etc/enroot/"
      when: " not 'nvme0n1' in hostvars[inventory_hostname].ansible_devices"

    - ansible.builtin.set_fact:
        enroot_top_path_checked: "{{ enroot_top_path }}"
      when: "'nvme0n1' in hostvars[inventory_hostname].ansible_devices"

    - name: Update ENROOT_RUNTIME_PATH
      ansible.builtin.lineinfile:
        dest: /etc/enroot/enroot.conf
        state: present
        regexp: "^#ENROOT_RUNTIME_PATH.*"
        line: "ENROOT_RUNTIME_PATH        {{ enroot_top_path_checked }}/enroot_runtime/user-$(id -u)"
        backup: true

    - name: Update ENROOT_DATA_PATH
      ansible.builtin.lineinfile:
        dest: /etc/enroot/enroot.conf
        state: present
        regexp: "^#ENROOT_DATA_PATH.*"
        line: "ENROOT_DATA_PATH        {{ enroot_top_path_checked }}/enroot_data/user-$(id -u)"
        backup: true

    - name: Update ENROOT_CACHE_PATH
      ansible.builtin.lineinfile:
        dest: /etc/enroot/enroot.conf
        state: present
        regexp: "^#ENROOT_CACHE_PATH.*"
        line: "ENROOT_CACHE_PATH        {{ enroot_top_path_checked }}/enroot_cache"
        backup: true

    - name: Update ENROOT_TEMP_PATH
      ansible.builtin.lineinfile:
        dest: /etc/enroot/enroot.conf
        state: present
        regexp: "^#ENROOT_TEMP_PATH.*"
        line: "ENROOT_TEMP_PATH        {{ enroot_top_path_checked }}/enroot_tmp"
        backup: true

    - name: Update ENROOT_SQUASH_OPTIONS
      ansible.builtin.lineinfile:
        dest: /etc/enroot/enroot.conf
        state: present
        regexp: "^#ENROOT_SQUASH_OPTIONS.*"
        line: "ENROOT_SQUASH_OPTIONS        -b 262144"
        backup: true

    - name: Update ENROOT_ROOTFS_WRITABLE
      ansible.builtin.lineinfile:
        dest: /etc/enroot/enroot.conf
        state: present
        regexp: "^#ENROOT_ROOTFS_WRITABLE.*"
        line: "ENROOT_ROOTFS_WRITABLE        yes"
        backup: true

    - name: Set permissions on {{enroot_top_path_checked}}
      become: true
      ansible.builtin.file:
        path: "{{ enroot_top_path_checked }}"
        state: directory
        owner: opc
        mode: "0777"
        group: "{{ privilege_group_name }}"
        recurse: false

    - name: Make sure all {{enroot_top_path_checked}} directories exist
      ansible.builtin.file:
        path: "{{ enroot_top_path_checked }}/{{ item }}"
        state: directory
        mode: "0777"
        owner: opc
        group: "{{ privilege_group_name }}"
        recurse: false
      with_items:
        - enroot_data
        - enroot_tmp
        - enroot_cache
        - enroot_runtime
