---
- name: Disable ufw
  ansible.builtin.service:
    name: ufw
    state: stopped
    enabled: false
  ignore_errors: true

# it still need update to iptables rules to accept traffic or else mpi traffic fails

- name: Copy off-iptables.sh
  ansible.builtin.copy:
    src: off-iptables.sh
    dest: "/tmp/off-iptables.sh"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Execute off-iptables.sh
  ansible.builtin.command: "sudo /tmp/off-iptables.sh"
