---
- name: Make sure clustershell is installed for node status script
  vars:
    package_repo: "ol{{ ansible_facts['distribution_major_version'] }}_developer_EPEL"
    package_name:
      - clustershell
      - bash-completion
    package_state: latest
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true
  when: ansible_facts['distribution'] == 'OracleLinux'

- name: Make sure clustershell is installed for node status script
  vars:
    package_name:
      - clustershell
      - bash-completion
    package_state: latest
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true
  when: ansible_facts['distribution'] != 'OracleLinux'

- name: Copy mgmt utility
  become: true
  ansible.builtin.template:
    src: templates/mgmt_remote.j2
    dest: "/usr/local/bin/mgmt"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0775"
  run_once: true

- name: Install mgmt bash completion
  become: true
  ansible.builtin.template:
    src: templates/mgmt.bash_completion.j2
    dest: "/etc/bash_completion.d/mgmt"
    owner: root
    group: root
    mode: "0644"
  run_once: true
