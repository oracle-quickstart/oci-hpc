---
- name: Make sure the /home directory exist
  file:
    path: "/config/mgmt"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

# - name: Git checkout
#   ansible.builtin.git:
#     repo: 'https://github.com/oracle-quickstart/oci-cluster-management'
#     dest: "/config/mgmt"

- name: Make sure clustershell is installed for node status script
  vars:
    package_name:
      - clustershell
    package_state: latest
  include_role:
    name: safe_yum
  ignore_errors: true

- name: install clustershell
  become: true
  pip:
    name: ['clustershell', 'sqlalchemy', 'rich', 'click']
    executable: /config/venv/bin/pip3
    state: latest
  ignore_errors: yes

- name: add alias for node status
  lineinfile:
    path: '/home/{{ ansible_user }}/.bashrc'
    line: alias mgmt="/config/venv/bin/python3 /config/mgmt/manage.py"
    state: present