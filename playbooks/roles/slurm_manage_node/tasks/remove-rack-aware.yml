---

- name: get RackLine
  shell: "scontrol show hostname `scontrol show topology {{remove_compute_info[item]}} | grep -v inactive- | grep -v Switches= | rev | cut -d \"=\" -f 1 | rev`"
  register: current_switch
  run_once: true
  delegate_to: 127.0.0.1
  with_items: "{{remove_compute_info}}"

- name: getNodes
  set_fact:
    nodes_on_switch: "{{nodes_on_switch | default({}) | combine({item.item : item.stdout_lines } ) }}"
  with_items: "{{current_switch.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout_lines | length ) > 0

- name: getNodes
  set_fact:
    nodes_on_switch: "{{nodes_on_switch | default({}) | combine({item.item : [] } ) }}"
  with_items: "{{current_switch.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout_lines | length ) == 0

- name: get SwitchNames
  shell: "scontrol show topology {{remove_compute_info[item]}} | grep -v inactive | grep -v Switches= | awk '{print $1}' | cut -d \"=\" -f 2"
  register: current_switchName
  run_once: true
  delegate_to: 127.0.0.1
  with_items: "{{remove_compute_info}}"

- name: get Switchname
  set_fact:
    switchnames: "{{switchnames | default({}) | combine({item.item : item.stdout} ) }}"
  with_items: "{{current_switchName.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout_lines | length ) > 0

- name: get Switchname
  set_fact:
    switchnames: "{{switchnames | default({}) | combine({item.item : \"\" }) }}"
  with_items: "{{current_switchName.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout_lines | length ) == 0

- name: get UpperSwitchNames
  shell: "scontrol show topology {{remove_compute_info[item]}} | grep -v inactive | grep Switches= | grep Level=1 | awk '{print $1}' | cut -d \"=\" -f 2"
  register: current_UpperSwitchName
  run_once: true
  delegate_to: 127.0.0.1
  with_items: "{{remove_compute_info}}"

- name: get UpperSwitchName
  set_fact:
    upperswitchnames: "{{upperswitchnames | default({}) | combine({item.item : item.stdout} ) }}"
  with_items: "{{current_UpperSwitchName.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout_lines | length ) > 0

- name: get UpperSwitchName
  set_fact:
    upperswitchnames: "{{upperswitchnames | default({}) | combine({item.item : \"\" }) }}"
  with_items: "{{current_UpperSwitchName.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout_lines | length ) == 0
  
- name: remove line from topology
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp: "SwitchName={{switchnames[remove_compute_info[item]]}}\\sNodes=.*"
    state: absent
  with_items: "{{remove_compute_info}}"
  ignore_unreachable: yes
  when: ( not switchnames[item] is match("inactive-.*") ) and ( ( nodes_on_switch[item] | length ) < 2 ) and ( switchnames[item] | length ) > 1
  run_once: true
  delegate_to: 127.0.0.1

- name: get other racks on switch
  shell: "scontrol show topology {{upperswitchnames[remove_compute_info[item]]}} | grep Switches= "
  register: racks_on_switch
  run_once: true
  delegate_to: 127.0.0.1
  with_items: "{{remove_compute_info}}"

- name: getRacks
  set_fact:
    racks_on_switch_dict: "{{racks_on_switch_dict | default({}) | combine({item.item : item.stdout.split('Switches=')[1].split(',') } ) }}"
  with_items: "{{racks_on_switch.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout | length ) > 0

- name: getRacks
  set_fact:
    racks_on_switch_dict: "{{racks_on_switch_dict | default({}) | combine({item.item : [] } ) }}"
  with_items: "{{racks_on_switch.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  when: ( item.stdout | length ) == 0

- name: change upper switch line from topology line
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp: "SwitchName={{upperswitchnames[remove_compute_info[item]]}}\\sSwitches.*"
    line: "SwitchName={{upperswitchnames[remove_compute_info[item]]}} Switches={{racks_on_switch_dict[remove_compute_info[item]] | difference([switchnames[remove_compute_info[item]]]) | join(',') }}"
    state: present
  with_items: "{{remove_compute_info}}"
  ignore_errors: yes
  when: ( not upperswitchnames[remove_compute_info[item]] is match("inactive-.*") ) and ( ( racks_on_switch_dict[remove_compute_info[item]] | difference([switchnames[remove_compute_info[item]]]) | length ) > 0 ) and ( upperswitchnames[remove_compute_info[item]] | length ) > 1 and ( nodes_on_switch[remove_compute_info[item]] | length ) < 2 
  run_once: true
  delegate_to: 127.0.0.1

- name: remove line from topology
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp:  "SwitchName={{upperswitchnames[remove_compute_info[item]]}}\\sSwitches.*"
    state: absent
  with_items: "{{remove_compute_info}}"
  ignore_unreachable: yes
  when: ( not upperswitchnames[remove_compute_info[item]] is match("inactive-.*") ) and ( ( racks_on_switch_dict[remove_compute_info[item]] | difference([switchnames[remove_compute_info[item]]]) | length ) == 0 ) and ( upperswitchnames[remove_compute_info[item]] | length ) > 1 and ( nodes_on_switch[remove_compute_info[item]] | length ) < 2 
  run_once: true
  delegate_to: 127.0.0.1

- name: generate nodes_on_switch_condensed
  shell: "scontrol show hostlistsorted {{nodes_on_switch[remove_compute_info[item]] | difference([remove_compute_info[item]]) | join(',')}}"
  register: switch_condensed
  with_items: "{{remove_compute_info}}"
  ignore_unreachable: yes
  when: ( not switchnames[remove_compute_info[item]] is match("inactive-.*") ) and ( ( nodes_on_switch[remove_compute_info[item]] | length ) > 1 ) and ( switchnames[remove_compute_info[item]] | length ) > 1
  run_once: true
  delegate_to: 127.0.0.1

- name: get condensed_Nodes
  set_fact:
    nodes_on_switch_condensed: "{{nodes_on_switch_condensed | default({}) | combine({item.item : item.stdout } ) }}"
  with_items: "{{switch_condensed.results}}"
  run_once: true
  delegate_to: 127.0.0.1
  ignore_errors: yes

- name: remove node from topology line
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp: "SwitchName={{switchnames[remove_compute_info[item]]}}\\sNodes.*"
    line: "SwitchName={{switchnames[remove_compute_info[item]]}} Nodes={{nodes_on_switch_condensed[remove_compute_info[item]]}}"
    state: present
  with_items: "{{remove_compute_info}}"
  ignore_errors: yes
  when: ( not switchnames[remove_compute_info[item]] is match("inactive-.*") ) and ( ( nodes_on_switch_condensed[remove_compute_info[item]] | length ) > 1 )
  run_once: true
  delegate_to: 127.0.0.1

- name: change Node Status
  become: true
  command: "scontrol delete nodename={{ remove_compute_info[item] }}"
  ignore_errors: true
  ignore_unreachable: True
  with_items: "{{remove_compute_info}}"
  delegate_to: 127.0.0.1
  when: ('controller' in group_names)

- name: move topology.conf on backup servers
  become: true
  copy:
    dest: '{{ slurm_conf_path }}/topology.conf'
    src: '{{ slurm_conf_path }}/topology.conf'
    force: yes
  register: topology_copied
  until: topology_copied is not failed
  retries: 10
  delay: 5
  when: ('slurm_backup' in group_names)
  
- name: Reconfigure Slurm for topology
  become: true
  command: "scontrol reconfigure"
  delegate_to: 127.0.0.1
  run_once: true