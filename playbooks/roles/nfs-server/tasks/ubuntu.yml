---
- name: Ensure NFS utilities are installed.
  vars:
    package_name:
      - nfs-kernel-server
  include_role:
    name: safe_yum

- name: Start NFS server
  service:
    name: nfs-kernel-server
    state: started
    enabled: true

- name: Ensure rpcbind is running as configured.
  service:
    name: rpcbind
    state: "{{ nfs_rpcbind_state }}"
    enabled: "{{ nfs_rpcbind_enabled }}"

- name: Create local storage directory
  file:
    path: "{{ local_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ privilege_group_name }}"

- name: Create exports.d
  file:
    path: /etc/exports.d
    owner: root
    group: root
    state: directory

- name: Create exports file
  register: nfs_config
  notify: Reload NFS
  template:
    src: exports.j2
    dest: "/etc/exports.d/{{ export_name }}.exports"

- name: Export folders
  command: "exportfs -ra"
