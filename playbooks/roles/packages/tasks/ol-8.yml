---
- name: Enable ol8_developer_EPEL repo
  ansible.builtin.command: yum-config-manager --enable ol8_developer_EPEL
- name: Make sure python OpenSSL and parallel ssh is installed
  vars:
    package_name:
      #- pyOpenSSL
      #- python2-cryptography
      - python3-oci-cli
      - pssh
      - pdsh
      - python3-pip
    package_state: latest
    package_repo: "ol8_developer_EPEL"
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true

- name: Upgrade Pip3
  become: true
  ansible.builtin.pip:
    name: [pip]
    state: latest
    executable: /usr/bin/pip3
  ignore_errors: true

- name: Upgrade Pip3
  become: true
  ansible.builtin.pip:
    name: [pip]
    state: latest
    executable: "/config/venv/{{ ansible_distribution }}_{{ ansible_distribution_version }}_{{ ansible_architecture }}/bin/pip3"
  ignore_errors: true

- name: Install oci-cli latest version
  become: true
  ansible.builtin.pip:
    name: [oci-cli]
    state: latest
    executable: "/config/venv/{{ ansible_distribution }}_{{ ansible_distribution_version }}_{{ ansible_architecture }}/bin/pip3"
  ignore_errors: true
  when: ('controller' in group_names)
