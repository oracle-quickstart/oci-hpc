---
- name: Ensure services are automatically restarted
  become: true
  ansible.builtin.replace:
    path: /etc/needrestart/needrestart.conf
    regexp: "#$nrconf{restart} = 'i';"
    replace: "$nrconf{restart} = 'a';"
- name: Make sure python OpenSSL and parallel ssh is installed
  vars:
    package_name:
      - python3-openssl
      - python3-cryptography
      - parted
      - pssh
      - pdsh
      - python3-netaddr
      - jq
      - python3-pip
    package_state: latest
  ansible.builtin.include_role:
    name: safe_yum
  ignore_errors: true

- name: Upgrade Pip3
  become: true
  ansible.builtin.pip:
    name: [pip]
    state: latest
    executable: /usr/bin/pip3
  ignore_errors: true
  when: ansible_facts['distribution_major_version'] | int < 24

- name: Install oci
  become: true
  ansible.builtin.pip:
    name: oci
    executable: /usr/bin/pip3
  ignore_errors: true
