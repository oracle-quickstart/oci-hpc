---
- name: get All nodes with this controller
  shell: "/config/venv/{{ansible_distribution}}_{{ansible_distribution_version}}_{{ansible_architecture}}/bin/python3 /config/mgmt/manage.py nodes list json"
  register: get_cluster_nodes_results

- name: Convert the Python script output to a list of dictionaries
  set_fact:
    query_results: "{{ get_cluster_nodes_results.stdout | from_json }}"

- name: Create an empty dir of all new compute nodes
  set_fact:
    new_compute_info: {}

- name: Create a dictionary from curl results of all new compute nodes
  set_fact:
    new_compute_info: "{{ new_compute_info  | default({}) | combine({item.ip_address: item}) }}"
  loop: "{{ query_results }}"
  when: item.role == "compute" and ( item.controller_status == "configuring" or item.controller_status == "reconfiguring" )

- name: Create an empty dir of all new compute nodes
  set_fact:
    new_hosts_info: {}

- name: Create a dictionary from curl results of all new compute nodes
  set_fact:
    new_hosts_info: "{{ new_hosts_info  | default({}) | combine({item.ip_address: item}) }}"
  loop: "{{ query_results }}"
  when: item.role != "compute" and ( item.controller_status == "configuring" or item.controller_status == "reconfiguring" )
- name: Create an empty dir of all new compute nodes
  set_fact:
    remove_compute_info: {}

- name: Create a dictionary from curl results of all new compute nodes
  set_fact:
    remove_compute_info: "{{ remove_compute_info  | default({}) | combine({item.ip_address: item}) }}"
  loop: "{{ query_results }}"
  when: item.role == "compute" and item.controller_status == "terminating"

- name: Create an empty dir of all new compute nodes
  set_fact:
    all_hosts_info: {}

- name: Create a dictionary from curl results of all new compute nodes
  set_fact:
    all_hosts_info: "{{ all_hosts_info  | default({}) | combine({item.ip_address: item}) }}"
  loop: "{{ query_results }}"
