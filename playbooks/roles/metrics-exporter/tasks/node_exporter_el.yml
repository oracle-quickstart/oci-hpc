---
- name: Map system architecture to suffix
  ansible.builtin.set_fact:
    arch_suffix: "{{ arch_map[ansible_facts['architecture']] }}"
  vars:
    arch_map:
      x86_64: amd64
      aarch64: arm64
  when: ansible_facts['os_family'] == 'RedHat'

- name: Create prometheus group on compute
  become: true
  ansible.builtin.group:
    name: prometheus
    state: present
    system: true

- name: Create user for prometheus
  become: true
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    state: present
    createhome: false
    shell: /usr/sbin/nologin
    append: true
    group: prometheus

- name: Create /var/lib/prometheus/node_exporter directory
  become: true
  ansible.builtin.file:
    path: "/var/lib/prometheus/node_exporter"
    state: directory
    owner: "prometheus"
    group: "prometheus"

- name: Check if file already exists
  ansible.builtin.stat:
    path: /config/3rdparty/node_exporter-{{ node_exporter }}.linux-{{ arch_suffix }}.tar.gz
  register: node_exporter_file
  delegate_to: 127.0.0.1
  run_once: true    

- name: Download node_exporter {{ node_exporter }}
  become: true
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter }}/node_exporter-{{ node_exporter }}.linux-{{ arch_suffix }}.tar.gz
    dest: /config/3rdparty/node_exporter-{{ node_exporter }}.linux-{{ arch_suffix }}.tar.gz
  when: not node_exporter_file.stat.exists | bool
  delegate_to: 127.0.0.1
  run_once: true    

- name: Extract node_exporter {{ node_exporter }}.linux-{{arch_suffix}}.tar.gz into /var/lib/prometheus/node_exporter/
  become: true
  ansible.builtin.unarchive:
    src: /config/3rdparty/node_exporter-{{ node_exporter }}.linux-{{ arch_suffix }}.tar.gz
    dest: /var/lib/prometheus/node_exporter/
    extra_opts: [--strip-components=1]
    remote_src: true

- name: Recursively change ownership of a /var/lib/prometheus/node_exporter/
  become: true
  ansible.builtin.file:
    path: /var/lib/prometheus/node_exporter
    state: directory
    recurse: true
    owner: prometheus
    group: prometheus

- name: Create a symbolic link node_exporter
  become: true
  ansible.builtin.file:
    src: /var/lib/prometheus/node_exporter/node_exporter
    dest: /usr/bin/node_exporter
    state: link

- name: Configure node_exporter service
  become: true
  ansible.builtin.copy:
    src: "node_exporter.service"
    dest: "/usr/lib/systemd/system/node_exporter.service"

- name: Run command deactivate selinux for node_exporter, chcon
  become: true
  ansible.builtin.command: chcon --reference=/bin/less /usr/bin/node_exporter

- name: Run command deactivate selinux for node_exporter, semanage
  become: true
  ansible.builtin.command: python3 /usr/sbin/semanage fcontext -a -t bin_t "/usr/bin/node_exporter"
  register: node_exporter
  failed_when: "node_exporter.rc != 0 and 'already defined' not in node_exporter.stderr"

- name: Start node_exporter.service
  become: true
  ansible.builtin.service:
    name: node_exporter.service
    state: restarted
    enabled: true