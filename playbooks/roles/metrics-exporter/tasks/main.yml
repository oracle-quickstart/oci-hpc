---
- name: Ensure metrics-exporter shared cache directory exists
  ansible.builtin.file:
    path: "{{ metrics_exporter_shared_path }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Ensure metrics-exporter go cache directories exist
  ansible.builtin.file:
    path: "{{ metrics_exporter_shared_path }}/go/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ metrics_exporter_target_architectures }}"
  delegate_to: localhost
  run_once: true

- name: Ensure node_exporter cache directories exist
  ansible.builtin.file:
    path: "{{ metrics_exporter_shared_path }}/node_exporter/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ metrics_exporter_target_architectures }}"
  delegate_to: localhost
  run_once: true

- name: Ensure dcgm-exporter cache directories exist
  ansible.builtin.file:
    path: "{{ metrics_exporter_shared_path }}/dcgm-exporter/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ metrics_exporter_target_architectures }}"
  delegate_to: localhost
  run_once: true

- ansible.builtin.include_tasks: node_exporter_el.yml
  when: ansible_facts['os_family'] == 'RedHat'

- ansible.builtin.include_tasks: node_exporter_ubuntu.yml
  when: ansible_facts['distribution'] == 'Ubuntu'

- ansible.builtin.include_tasks: dcgm_exporter.yml
  when: compute_node|bool and 'GPU' in shape and not 'BM.GPU.MI' in shape

- ansible.builtin.include_tasks: rdma_exporter.yml
  when: compute_node|bool and rdma_enabled|bool

- ansible.builtin.include_tasks: nvlink_exporter.yml
  when: compute_node|bool and 'GPU' in shape and not 'BM.GPU.MI' in shape

- ansible.builtin.include_tasks: custom_metrics.yml
  when: compute_node|bool and rdma_enabled|bool

- include_tasks: nvml_exporter.yml
  when: compute_node|bool and 'GPU' in shape

- include_tasks: pcie_faults.yml
  when: compute_node|bool and 'GPU' in shape

- include_tasks: nccl_profiler.yml
  when: compute_node|bool and 'GPU' in shape
# - ansible.builtin.include_tasks: critical_process_monitor.yml

- ansible.builtin.include_tasks: amd_metrics_exporter_el.yml
  when: compute_node|bool and ansible_facts['os_family'] == 'RedHat' and 'BM.GPU.MI' in shape

- ansible.builtin.include_tasks: amd_metrics_exporter_ubuntu.yml
  when: compute_node|bool and ansible_facts['distribution'] == 'Ubuntu' and 'BM.GPU.MI' in shape
