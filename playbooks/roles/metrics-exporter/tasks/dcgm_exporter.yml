---
- name: Install dependencies
  become: true
  ansible.builtin.package:
    name: "{{ dependencies }}"
    state: present

- name: Download Go tarball
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
  become: true
  ansible.builtin.get_url:
    url: "{{ go_url }}"
    dest: "/tmp/{{ go_tarball }}"

- name: Remove old Go installation
  become: true
  ansible.builtin.file:
    path: "{{ go_install_dir }}/go"
    state: absent

- name: Extract Go tarball
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/{{ go_tarball }}"
    dest: "{{ go_install_dir }}"
    remote_src: true

- name: Ensure Go binary path is in PATH
  become: true
  ansible.builtin.lineinfile:
    path: /etc/profile.d/go.sh
    line: "export PATH=$PATH:{{ go_path }}"
    create: true
    state: present

- name: Check if file already exists
  ansible.builtin.stat:
    path: /config/3rdparty/dcgm-exporter/{{ ansible_facts['distribution'] }}_{{ ansible_facts['distribution_version'] }}_{{ ansible_facts['architecture'] }}
  register: dcgm_exporter

- name: Get current DCGM version
  become: true
  ansible.builtin.shell:
    cmd: dcgmi -v | head -n 1 | cut -d':' -f2 | tr -d ' \n'
  register: dcgm_version
  when: not dcgm_exporter.stat.exists | bool

- name: Find DCGM Exporter releases
  become: true
  ansible.builtin.shell:
    cmd: curl -s https://api.github.com/repos/nvidia/dcgm-exporter/releases | jq -r '.[] | "\(.tag_name) \(.tarball_url)"'
  register: dcgm_exporter_releases
  when: not dcgm_exporter.stat.exists | bool

#- name: Extract major.minor version from DCGM version
#  set_fact:
#    dcgm_major_minor: "{{ dcgm_version.stdout | regex_replace('^(\\d+\\.\\d+)\\.\\d+$', '\\1') }}"

- name: Select appropriate DCGM Exporter version
  ansible.builtin.set_fact:
    dcgm_exporter_url: "{{ dcgm_exporter_releases.stdout_lines | select('search', dcgm_version.stdout) | first | split(' ') | last }}"
  when: not dcgm_exporter.stat.exists | bool

- name: Download DCGM Exporter tarball
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
  become: true
  ansible.builtin.get_url:
    url: "{{ dcgm_exporter_url }}"
    dest: "/config/3rdparty/dcgm-exporter.tar.gz"
  when: not dcgm_exporter.stat.exists | bool

- name: Extract DCGM Exporter tarball
  become: true
  ansible.builtin.unarchive:
    src: "/config/3rdparty/dcgm-exporter.tar.gz"
    dest: "/config/3rdparty"
    remote_src: true
  when: not dcgm_exporter.stat.exists | bool

- name: get directory
  ansible.builtin.shell: "ls -ltd /config/3rdparty/NVIDIA-dcgm-exporter-* | head -n 1 | awk '{print $9}'"
  register: dcgm_directory

- name: Build DCGM Exporter binary
  become: true
  ansible.builtin.command: make binary
  args:
    chdir: "{{ dcgm_directory.stdout }}"
  environment:
    PATH: "{{ go_path }}:{{ ansible_facts['env']['PATH'] }}"
  when: not dcgm_exporter.stat.exists | bool

- name: Install DCGM Exporter
  become: true
  ansible.builtin.command: make install
  args:
    chdir: "{{ dcgm_directory.stdout }}"
  environment:
    PATH: "{{ go_path }}:{{ ansible_facts['env']['PATH'] }}"

- name: Create systemd service for DCGM-Exporter
  become: true
  ansible.builtin.template:
    src: dcgm-exporter.service.j2
    dest: "{{ dcgm_service_path }}"

- name: Copy DCGM-Exporter counter configuration
  become: true
  ansible.builtin.copy:
    src: dcgm-counters.csv
    dest: "{{ dcgm_counter_config_path }}"

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start DCGM-Exporter service
  become: true
  ansible.builtin.systemd:
    name: dcgm-exporter
    enabled: true
    state: started
