---
- name: Install dependencies
  become: true
  ansible.builtin.package:
    name: "{{ dependencies }}"
    state: present

- name: Check cached Go tarballs once per architecture
  ansible.builtin.stat:
    path: "{{ metrics_exporter_shared_path }}/go/{{ item }}/go{{ go_version }}.linux-{{ binary_arch_map[item] }}.tar.gz"
  loop: "{{ metrics_exporter_target_architectures }}"
  register: go_cache_results
  delegate_to: localhost
  run_once: true

- name: Download missing Go tarballs once per architecture
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: "https://go.dev/dl/go{{ go_version }}.linux-{{ binary_arch_map[item.item] }}.tar.gz"
    dest: "{{ metrics_exporter_shared_path }}/go/{{ item.item }}/go{{ go_version }}.linux-{{ binary_arch_map[item.item] }}.tar.gz"
  delegate_to: localhost
  run_once: true
  loop: "{{ go_cache_results.results }}"
  when: not item.stat.exists | bool

- name: Remove old Go installation
  become: true
  ansible.builtin.file:
    path: "{{ go_install_dir }}/go"
    state: absent

- name: Extract Go tarball from shared storage
  become: true
  ansible.builtin.unarchive:
    src: "{{ go_cache_path }}"
    dest: "{{ go_install_dir }}"
    remote_src: true

- name: Ensure Go binary path is in PATH
  become: true
  ansible.builtin.lineinfile:
    path: /etc/profile.d/go.sh
    line: "export PATH=$PATH:{{ go_path }}"
    create: true
    state: present

- name: Check if dcgm-exporter file already exists
  ansible.builtin.stat:
    path: "{{ dcgm_build_path }}"
  register: dcgm_exporter

- name: Get current DCGM version
  become: true
  ansible.builtin.shell:
    cmd: dcgmi -v | head -n 1 | cut -d':' -f2 | tr -d ' \n'
  register: dcgm_version
  changed_when: false

- name: Extract DCGM major version
  ansible.builtin.set_fact:
    dcgm_major_version: "{{ dcgm_version.stdout.split('.')[0] }}"

- name: Fetch and cache DCGM Exporter releases
  ansible.builtin.shell:
    cmd: |
      if [ -f "{{ dcgm_release_cache_path }}" ]; then
        cat "{{ dcgm_release_cache_path }}"
      else
        releases=$(curl -s https://api.github.com/repos/nvidia/dcgm-exporter/releases | jq -r '.[] | "\(.tag_name) \(.tarball_url)"')
        tmp=$(mktemp "{{ metrics_exporter_shared_path }}/.dcgm-releases.XXXXXX")
        echo "$releases" > "$tmp"
        mv "$tmp" "{{ dcgm_release_cache_path }}"
        echo "$releases"
      fi
  register: dcgm_exporter_releases_result
  run_once: true
  when: not dcgm_exporter.stat.exists | bool

- name: Set DCGM Exporter releases fact
  ansible.builtin.set_fact:
    dcgm_exporter_releases:
      stdout_lines: "{{ dcgm_exporter_releases_result.stdout_lines | default([]) | select | list }}"
  when: not dcgm_exporter.stat.exists | bool

#- name: Extract major.minor version from DCGM version
#  set_fact:
#    dcgm_major_minor: "{{ dcgm_version.stdout | regex_replace('^(\\d+\\.\\d+)\\.\\d+$', '\\1') }}"

- name: Select appropriate DCGM Exporter version
  ansible.builtin.set_fact:
    dcgm_exporter_url: "{{ dcgm_exporter_releases.stdout_lines | select('search', dcgm_version.stdout) | first | split(' ') | last }}"
  when: not dcgm_exporter.stat.exists | bool

- name: Download DCGM Exporter tarball
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: "{{ dcgm_exporter_url }}"
    dest: "{{ dcgm_tarball_path }}"
  when: not dcgm_exporter.stat.exists | bool

- name: Ensure dcgm-exporter build directory exists
  ansible.builtin.file:
    path: "{{ dcgm_build_path }}"
    state: directory
    mode: "0755"
  when: not dcgm_exporter.stat.exists | bool

- name: Extract DCGM Exporter tarball
  ansible.builtin.unarchive:
    src: "{{ dcgm_tarball_path }}"
    dest: "{{ dcgm_build_path }}"
    extra_opts:
      - "--strip-components=1"
    remote_src: true
  when: not dcgm_exporter.stat.exists | bool

- name: Build DCGM Exporter binary
  ansible.builtin.command: make binary
  args:
    chdir: "{{ dcgm_build_path }}"
  environment:
    PATH: "{{ go_path }}:{{ ansible_facts['env']['PATH'] }}"
  when: not dcgm_exporter.stat.exists | bool

- name: Install DCGM Exporter
  become: true
  ansible.builtin.command: make install
  args:
    chdir: "{{ dcgm_build_path }}"
  environment:
    PATH: "{{ go_path }}:{{ ansible_facts['env']['PATH'] }}"

- name: Create systemd service for DCGM-Exporter
  become: true
  ansible.builtin.template:
    src: dcgm-exporter.service.j2
    dest: "{{ dcgm_service_path }}"

- name: Template DCGM-Exporter counter configuration
  become: true
  ansible.builtin.template:
    src: dcgm-counters.csv.j2
    dest: "/etc/dcgm-counters.csv"

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start DCGM-Exporter service
  become: true
  ansible.builtin.systemd:
    name: dcgm-exporter
    enabled: true
    state: started
