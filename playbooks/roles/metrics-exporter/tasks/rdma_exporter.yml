---
- name: Install prometheus_client python package
  vars: 
    package_name: 
      - python3-prometheus-client
    package_state: present
    package_cache: true
  include_role: 
    name: safe_yum

- name: Install prometheus_client python package
  ansible.builtin.pip:
    name: prometheus_client 
    executable: /config/venv/bin/pip3
  become: yes

- name: Copy service file to scripts directory
  copy:
    src: rdma_counters_exporter.py
    dest: /usr/local/bin
    mode: 0755
  become: yes

- name: Render systemd service file
  become: true
  template: 
    src: rdma-exporter.service.j2
    dest: /etc/systemd/system/rdma-exporter.service
    force: yes
    backup: yes
    owner: prometheus
    group: prometheus
    mode: 0755

- name: Restart rdma exporter
  become: true
  service:
    name: rdma-exporter
    state: restarted
    enabled: yes
