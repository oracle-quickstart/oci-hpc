---
- name: Copy service file to scripts directory
  ansible.builtin.copy:
    src: critical_process_monitor.py
    dest: /usr/local/bin
    mode: "0755"
  become: true

- name: Render systemd service file
  become: true
  ansible.builtin.template:
    src: critical-process-monitor.service.j2
    dest: /etc/systemd/system/critical-process-monitor.service
    force: true
    backup: true
    owner: prometheus
    group: prometheus
    mode: "0744"

- name: Restart critical process monitor exporter
  become: true
  ansible.builtin.service:
    name: critical-process-monitor
    state: restarted
    enabled: true