- name: Create prometheus group on compute
  become: true
  ansible.builtin.group:
    name: prometheus
    state: present
    system: true

- name: Create prometheus user on compute
  become: true
  ansible.builtin.user:
    name: prometheus
    comment: "prometheus user"
    group: prometheus
    createhome: false # Optional: depending on if you want to create a home directory

- name: Create /var/lib/prometheus/node_exporter directory
  become: true
  ansible.builtin.file:
    path: "/var/lib/prometheus/node_exporter"
    state: directory
    owner: "prometheus"
    group: "prometheus"

- name: Check cached node_exporter tarballs once per architecture
  ansible.builtin.stat:
    path: "{{ metrics_exporter_shared_path }}/node_exporter/{{ item }}/node_exporter-{{ node_exporter }}.linux-{{ binary_arch_map[item] }}.tar.gz"
  loop: "{{ metrics_exporter_target_architectures }}"
  register: node_exporter_cache_results
  delegate_to: 127.0.0.1
  run_once: true

- name: Download missing node_exporter tarballs once per architecture
  ansible.builtin.get_url:
    url: >-
      https://github.com/prometheus/node_exporter/releases/download/v{{
      node_exporter }}/node_exporter-{{ node_exporter }}.linux-{{
      binary_arch_map[item.item] }}.tar.gz
    dest: >-
      {{ metrics_exporter_shared_path }}/node_exporter/{{ item.item
      }}/node_exporter-{{ node_exporter }}.linux-{{
      binary_arch_map[item.item] }}.tar.gz
  delegate_to: 127.0.0.1
  run_once: true
  loop: "{{ node_exporter_cache_results.results }}"
  when: not item.stat.exists | bool

- name: Extract node_exporter {{ node_exporter }} into /var/lib/prometheus/node_exporter/
  become: true
  ansible.builtin.unarchive:
    src: "{{ node_exporter_tarball_path }}"
    dest: "/var/lib/prometheus/node_exporter/"
    extra_opts: ["--strip-components=1"]
    remote_src: true

- name: Recursively change ownership of /var/lib/prometheus/node_exporter/
  become: true
  ansible.builtin.file:
    path: /var/lib/prometheus/node_exporter
    state: directory
    recurse: true
    owner: prometheus
    group: prometheus

- name: Create a symbolic link for node_exporter
  become: true
  ansible.builtin.file:
    src: /var/lib/prometheus/node_exporter/node_exporter
    dest: /usr/bin/node_exporter
    state: link

- name: Configure node_exporter service
  become: true
  ansible.builtin.copy:
    src: "node_exporter.service"
    dest: "/etc/systemd/system/node_exporter.service"

- name: Start and enable node_exporter service
  become: true
  ansible.builtin.systemd:
    name: node_exporter.service
    state: restarted
    enabled: true
