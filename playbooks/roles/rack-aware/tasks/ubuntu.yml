- name: Install required packages
  vars: 
    package_name: 
      - pssh
    package_state: present
    package_cache: true
  include_role: 
    name: safe_yum

- name: install pssh and parallel-ssh
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  pip:
    name: ['pssh', 'parallel-ssh']
    executable: "/config/venv/{{ansible_distribution}}_{{ansible_distribution_version}}_{{ansible_architecture}}/bin/pip3"
    state: latest
  ignore_errors: true

- name: Make sure /opt/oci-hpc/bin/ exists
  become: true
  file:
    path: /opt/oci-hpc/bin/
    state: directory
    recurse: true
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ privilege_group_name }}"

- name: Copy node_ordering_by_rack.py
  block:
    - name: copy node_ordering_by_rack.py
      become: true
      copy:
        src: node_ordering_by_rack.py
        dest: /opt/oci-hpc/bin/
        owner: "{{ ansible_user }}"
        group: "{{privilege_group_name}}"
        mode: '0755'
  rescue:
    - name: copy node_ordering_by_rack.py
      become: true
      copy:
        src: node_ordering_by_rack.py
        dest: /opt/oci-hpc/bin/
        owner: "{{ ansible_user }}"
        group: "{{privilege_group_name}}"
        mode: '0755'
      ignore_errors: true
  