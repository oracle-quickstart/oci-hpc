---
- name: Check whether slurm user exists
  getent:
    database: passwd
    key: slurm
  register: localdisk_slurm_user
  failed_when: false
  changed_when: false

- name: Create slurm-tmp directory if slurm user exists
  file:
    path: /mnt/localdisk/slurm-tmp
    state: directory
    owner: slurm
    group: slurm
    mode: '0755'
  ignore_errors: true
  when: localdisk_slurm_user.ansible_facts.getent_passwd.slurm is defined
