---
- name: add grafana repository
  become: true
  yum_repository: 
    name: grafana
    description: grafana
    baseurl: https://packages.grafana.com/oss/rpm
    repo_gpgcheck: 1
    enabled: 1
    gpgcheck: 1
    gpgkey: https://packages.grafana.com/gpg.key
    sslverify: 1
    sslcacert: /etc/pki/tls/certs/ca-bundle.crt

- name: Install grafana and tempo
  vars: 
    package_name: 
      - grafana
      - tempo
    package_state: present
  include_role: 
    name: safe_yum

- name: Start and enable Grafana service
  become: true
  service: 
    name: grafana-server
    state: restarted
    enabled: true

- name: Setup Grafana
  include_tasks: setup_grafana.yml