
- name: Check if the Grafana token file exists
  stat:
    path: "{{ grafana_service_account.token_file }}"
  register: grafana_token_file_stat_result

- name: Change admin default password
  uri:
    url: "http://localhost:3000/api/user/password"
    method: PUT
    user: "{{ grafana_security.admin_user }}"
    password: "{{ grafana_security.default_admin_password }}"
    force_basic_auth: true
    body_format: json
    status_code: [200]
    body:
      oldPassword: "{{ grafana_security.default_admin_password }}"
      newPassword: "{{ grafana_initial_creds | b64decode }}"
      confirmNew: "{{ grafana_initial_creds | b64decode }}"
  register: service_account_result
  retries: 3
  delay: 3
  when: not grafana_token_file_stat_result.stat.exists

