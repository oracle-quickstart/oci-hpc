---
- name: Resolve arch/jsonnet filenames
  ansible.builtin.set_fact:
    arch_suffix: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
    jsonnet_arch: "{{ 'x86_64' if ansible_architecture == 'x86_64' else 'arm64' }}"
    jsonnet_file: "go-jsonnet_Linux_{{ jsonnet_arch }}.tar.gz"

- name: Download latest jb
  become: true
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_distribution == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v0.6.0/jb-linux-{{arch_suffix}}
    dest: /usr/local/bin/jb
    mode: '0755'

- name: Download latest jsonnet
  become: true
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_distribution == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: https://github.com/google/go-jsonnet/releases/download/v0.21.0/{{ jsonnet_file }}
    dest: /tmp/{{ jsonnet_file }}

- name: Extract jsonnet
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/{{ jsonnet_file }}"
    dest: /usr/local/bin
    remote_src: true
    mode: '0755'
    extra_opts: ["--strip-components=1"]
    creates: /usr/local/bin/jsonnet

- name: Delete existing build directory
  become: true
  file:
    path: "{{ dashboard_build_dir }}"
    state: absent

- name: Create temporary build directory
  ansible.builtin.file:
    path: "{{ dashboard_build_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ user }}"
    group: "{{ user }}"

- name: Copy dashboard source files to build directory
  copy:
    src: "{{ item }}"
    dest: "{{ dashboard_build_dir }}"
    owner: "{{ user }}"
    group: "{{ user }}"
  loop:
    - cluster-level-variables.libsonnet
    - cluster-level.jsonnet
    - command-center-variables.libsonnet
    - command-center.jsonnet
    - g.libsonnet
    - gauge-panel.libsonnet
    - gauge-panel-util.libsonnet
    - gpu-health.jsonnet
    - gpu-metrics-single-variables.libsonnet
    - gpu-metrics-single.jsonnet
    - host-metrics-single-variables.libsonnet
    - host-metrics-single.jsonnet
    - multi-node-variables.libsonnet
    - multi-node.jsonnet
    - nccl-traces.jsonnet
    - oci-block-variables.libsonnet
    - oci-block.jsonnet
    - oci-drg-variables.libsonnet
    - oci-drg.jsonnet
    - oci-fastconnect-variables.libsonnet
    - oci-fastconnect.jsonnet
    - oci-fss-variables.libsonnet
    - oci-fss.jsonnet
    - oci-igw-variables.libsonnet
    - oci-igw.jsonnet
    - oci-lustre-variables.libsonnet
    - oci-lustre.jsonnet
    - oci-natgw-variables.libsonnet
    - oci-natgw.jsonnet
    - oci-sgw-variables.libsonnet
    - oci-sgw.jsonnet
    - oci-vcn-variables.libsonnet
    - oci-vcn.jsonnet
    - slurm-dashboard.jsonnet
    - slurm-variables.libsonnet
    - stat-health-panel.libsonnet
    - stat-panel-single.libsonnet
    - stat-panel.libsonnet
    - statetimeline-panel.libsonnet
    - storage-metrics.jsonnet
    - storage-metrics-variables.libsonnet
    - table-panel.libsonnet
    - timeseries-panel.libsonnet


- name: Build dashboards with Jsonnet
  become: true  
  ansible.builtin.shell: |
    /usr/local/bin/jb init
    /usr/local/bin/jb install {{ grafonnet_gen_repo_url }}
    /usr/local/bin/jb install {{ grafonnet_lib_repo_url }}
    /usr/local/bin/jsonnet -J vendor cluster-level.jsonnet -o cluster-level.json
    /usr/local/bin/jsonnet -J vendor command-center.jsonnet -o command-center.json
    /usr/local/bin/jsonnet -J vendor gpu-metrics-single.jsonnet -o gpu-metrics-single.json
    /usr/local/bin/jsonnet -J vendor gpu-health.jsonnet -o gpu-health.json
    /usr/local/bin/jsonnet -J vendor host-metrics-single.jsonnet -o host-metrics-single.json
    /usr/local/bin/jsonnet -J vendor multi-node.jsonnet -o multi-node.json
    /usr/local/bin/jsonnet -J vendor nccl-traces.jsonnet -o nccl-traces.json
    /usr/local/bin/jsonnet -J vendor oci-block.jsonnet -o oci-block.json
    /usr/local/bin/jsonnet -J vendor oci-drg.jsonnet -o oci-drg.json
    /usr/local/bin/jsonnet -J vendor oci-fastconnect.jsonnet -o oci-fastconnect.json
    /usr/local/bin/jsonnet -J vendor oci-fss.jsonnet -o oci-fss.json
    /usr/local/bin/jsonnet -J vendor oci-igw.jsonnet -o oci-igw.json
    /usr/local/bin/jsonnet -J vendor oci-lustre.jsonnet -o oci-lustre.json
    /usr/local/bin/jsonnet -J vendor oci-natgw.jsonnet -o oci-natgw.json
    /usr/local/bin/jsonnet -J vendor oci-sgw.jsonnet -o oci-sgw.json
    /usr/local/bin/jsonnet -J vendor oci-vcn.jsonnet -o oci-vcn.json
    /usr/local/bin/jsonnet -J vendor slurm-dashboard.jsonnet -o slurm-dashboard.json
    /usr/local/bin/jsonnet -J vendor storage-metrics.jsonnet -o storage-metrics.json
  environment:
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
  args:
    chdir: "{{ dashboard_build_dir }}"

- name: Ensure /opt/oci-hpc/monitoring exists
  become: true
  file:
    path: "/opt/oci-hpc/monitoring"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Save generated dashboard
  copy:
    src: "{{ dashboard_build_dir }}/{{ item }}"
    dest: "/opt/oci-hpc/monitoring/{{ item }}"
    remote_src: true
  loop:
    - cluster-level.json
    - command-center.json
    - gpu-health.json
    - gpu-metrics-single.json
    - host-metrics-single.json
    - multi-node.json
    - nccl-traces.json
    - oci-block.json
    - oci-drg.json
    - oci-fastconnect.json
    - oci-fss.json
    - oci-igw.json
    - oci-lustre.json
    - oci-natgw.json
    - oci-sgw.json
    - oci-vcn.json    
    - slurm-dashboard.json
    - storage-metrics.json

- name: Import Grafana dashboards
  community.grafana.grafana_dashboard:
    grafana_url: http://localhost:3000
    grafana_api_key: "{{ grafana_api_token }}"
    state: present
    commit_message: Updated by ansible
    overwrite: true
    path: "{{ dashboard_build_dir }}/{{ item }}"
  loop:
    - cluster-level.json
    - command-center.json
    - gpu-health.json
    - gpu-metrics-single.json
    - host-metrics-single.json
    - multi-node.json
    - nccl-traces.json
    - oci-block.json
    - oci-drg.json
    - oci-fastconnect.json
    - oci-fss.json
    - oci-igw.json
    - oci-lustre.json
    - oci-natgw.json
    - oci-sgw.json
    - oci-vcn.json
    - slurm-dashboard.json
    - storage-metrics.json