---
- name: Install git
  vars:
    package_name:
      - git
    package_state: present
  include_role:
    name: safe_yum

- name: Map system architecture to suffix
  set_fact:
    arch_suffix: "{{ arch_map[ansible_facts['architecture']] }}"
  vars:
    arch_map:
      x86_64: amd64
      aarch64: arm64

- name: Map system architecture to suffix
  set_fact:
    jsonnet_file: "go-jsonnet_Linux_{{ arch_map[ansible_facts['architecture']] }}.tar.gz"
  vars:
    arch_map:
      x86_64: x86_64
      aarch64: arm64

- name: Download jb
  become: true
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: https://github.com/jsonnet-bundler/jsonnet-bundler/releases/download/v0.6.0/jb-linux-{{ arch_suffix }}
    dest: /usr/local/bin/jb
    mode: "0755"

- name: Download jsonnet
  become: true
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_facts['distribution'] == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: https://github.com/google/go-jsonnet/releases/download/v0.21.0/{{ jsonnet_file }}
    dest: /tmp

- name: Extract jsonnet
  become: true
  unarchive:
    src: /tmp/{{ jsonnet_file }}
    dest: /usr/local/bin
    mode: "0755"
    remote_src: true

- name: Delete existing build directory
  file:
    path: "{{ dashboard_build_dir }}"
    state: absent

- name: Create temporary build directory
  ansible.builtin.file:
    path: "{{ dashboard_build_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ user }}"
    group: "{{ user }}"

- name: Copy dashboard source files to build directory
  copy:
    src: "{{ item }}"
    dest: "{{ dashboard_build_dir }}"
    owner: "{{ user }}"
    group: "{{ user }}"
  loop:
    - cluster-level-variables.libsonnet
    - cluster-level.jsonnet
    - command-center-variables.libsonnet
    - command-center.jsonnet
    - g.libsonnet
    - gauge-panel.libsonnet
    - gauge-panel-util.libsonnet
    - amd-gpu-health.jsonnet
    - amd-gpu-metrics-single-variables.libsonnet
    - amd-gpu-metrics-single.jsonnet
    - nvidia-gpu-health.jsonnet
    - nvidia-gpu-metrics-single-variables.libsonnet
    - nvidia-gpu-metrics-single.jsonnet
    - nvidia-gpu-throttling.jsonnet
    - amd-gpu-throttling.jsonnet
    - gpu-throttling-overview.jsonnet
    - host-metrics-single-variables.libsonnet
    - host-metrics-single.jsonnet
    - node-health-table-variables.libsonnet
    - health-by-node-agg-counts.jsonnet
    - health-by-node-matrix.jsonnet
    - multi-node-variables.libsonnet
    - multi-node.jsonnet
    - nccl-traces.jsonnet
    - node-by-health-matrix.jsonnet
    - oci-block-variables.libsonnet
    - oci-block.jsonnet
    - oci-drg-variables.libsonnet
    - oci-drg.jsonnet
    - oci-fastconnect-variables.libsonnet
    - oci-fastconnect.jsonnet
    - oci-fss-variables.libsonnet
    - oci-fss.jsonnet
    - oci-igw-variables.libsonnet
    - oci-igw.jsonnet
    - oci-lustre-variables.libsonnet
    - oci-lustre.jsonnet
    - oci-natgw-variables.libsonnet
    - oci-natgw.jsonnet
    - oci-sgw-variables.libsonnet
    - oci-sgw.jsonnet
    - oci-vcn-variables.libsonnet
    - oci-vcn.jsonnet
    - oci-variables.libsonnet
    - oci-dashboard.jsonnet
    - slurm-dashboard.jsonnet
    - slurm-variables.libsonnet
    - stat-health-panel.libsonnet
    - stat-panel-single.libsonnet
    - stat-panel.libsonnet
    - statetimeline-panel.libsonnet
    - storage-metrics.jsonnet
    - storage-metrics-variables.libsonnet
    - table-panel.libsonnet
    - timeseries-panel.libsonnet
    - Makefile
  retries: 10
  delay: 10
  until: copy_result is not failed
  register: copy_result

- name: Build dashboard with Jsonnet
  ansible.builtin.shell: |
    /usr/local/bin/jb init
    /usr/local/bin/jb install {{ grafonnet_gen_repo_url }}
    /usr/local/bin/jb install {{ grafonnet_lib_repo_url }}
    /usr/local/bin/jsonnet -J vendor cluster-level.jsonnet -o cluster-level.json
    /usr/local/bin/jsonnet -J vendor command-center.jsonnet -o command-center.json
    /usr/local/bin/jsonnet -J vendor amd-gpu-metrics-single.jsonnet -o amd-gpu-metrics-single.json
    /usr/local/bin/jsonnet -J vendor amd-gpu-health.jsonnet -o amd-gpu-health.json
    /usr/local/bin/jsonnet -J vendor nvidia-gpu-metrics-single.jsonnet -o nvidia-gpu-metrics-single.json
    /usr/local/bin/jsonnet -J vendor nvidia-gpu-health.jsonnet -o nvidia-gpu-health.json
    /usr/local/bin/jsonnet -J vendor nvidia-gpu-throttling.jsonnet -o nvidia-gpu-throttling.json
    /usr/local/bin/jsonnet -J vendor amd-gpu-throttling.jsonnet -o amd-gpu-throttling.json
    /usr/local/bin/jsonnet -J vendor gpu-throttling-overview.jsonnet -o gpu-throttling-overview.json
    /usr/local/bin/jsonnet -J vendor host-metrics-single.jsonnet -o host-metrics-single.json
    /usr/local/bin/jsonnet -J vendor health-by-node-agg-counts.jsonnet -o health-by-node-agg-counts.json
    /usr/local/bin/jsonnet -J vendor health-by-node-matrix.jsonnet -o health-by-node-matrix.json
    /usr/local/bin/jsonnet -J vendor multi-node.jsonnet -o multi-node.json
    /usr/local/bin/jsonnet -J vendor nccl-traces.jsonnet -o nccl-traces.json
    /usr/local/bin/jsonnet -J vendor node-by-health-matrix.jsonnet -o node-by-health-matrix.json
    /usr/local/bin/jsonnet -J vendor oci-block.jsonnet -o oci-block.json
    /usr/local/bin/jsonnet -J vendor oci-drg.jsonnet -o oci-drg.json
    /usr/local/bin/jsonnet -J vendor oci-fastconnect.jsonnet -o oci-fastconnect.json
    /usr/local/bin/jsonnet -J vendor oci-fss.jsonnet -o oci-fss.json
    /usr/local/bin/jsonnet -J vendor oci-igw.jsonnet -o oci-igw.json
    /usr/local/bin/jsonnet -J vendor oci-lustre.jsonnet -o oci-lustre.json
    /usr/local/bin/jsonnet -J vendor oci-natgw.jsonnet -o oci-natgw.json
    /usr/local/bin/jsonnet -J vendor oci-sgw.jsonnet -o oci-sgw.json
    /usr/local/bin/jsonnet -J vendor oci-vcn.jsonnet -o oci-vcn.json
    /usr/local/bin/jsonnet -J vendor oci-dashboard.jsonnet -o oci-dashboard.json
    /usr/local/bin/jsonnet -J vendor slurm-dashboard.jsonnet -o slurm-dashboard.json
    /usr/local/bin/jsonnet -J vendor storage-metrics.jsonnet -o storage-metrics.json
  args:
    chdir: "{{ dashboard_build_dir }}"

- name: Ensure /opt/oci-hpc/monitoring exists
  become: true
  file:
    path: "/opt/oci-hpc/monitoring"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Save generated dashboard
  copy:
    src: "{{ dashboard_build_dir }}/{{ item }}"
    dest: "/opt/oci-hpc/monitoring/{{ item }}"
    remote_src: true
  loop:
    - cluster-level.json
    - command-center.json
    - amd-gpu-health.json
    - amd-gpu-metrics-single.json
    - amd-gpu-throttling.json
    - nvidia-gpu-health.json
    - nvidia-gpu-metrics-single.json
    - nvidia-gpu-throttling.json
    - gpu-throttling-overview.json
    - host-metrics-single.json
    - health-by-node-agg-counts.json
    - health-by-node-matrix.json
    - multi-node.json
    - nccl-traces.json
    - node-by-health-matrix.json
    - oci-block.json
    - oci-drg.json
    - oci-fastconnect.json
    - oci-fss.json
    - oci-igw.json
    - oci-lustre.json
    - oci-natgw.json
    - oci-sgw.json
    - oci-vcn.json
    - oci-dashboard.json
    - slurm-dashboard.json
    - storage-metrics.json

# Preserve the order in order to show the dashboards in non-alphabetic
# functional order.
- name: Import Grafana dashboards
  community.grafana.grafana_dashboard:
    grafana_url: http://localhost:3000
    grafana_api_key: "{{ grafana_api_token }}"
    state: present
    commit_message: Updated by ansible
    overwrite: true
    path: "{{ dashboard_build_dir }}/{{ item }}"
  loop:
    - command-center.json
    - cluster-level.json
    - multi-node.json
    - host-metrics-single.json
    - storage-metrics.json
    - health-by-node-agg-counts.json
    - health-by-node-matrix.json
    - node-by-health-matrix.json
    - amd-gpu-health.json
    - amd-gpu-metrics-single.json
    - amd-gpu-throttling.json
    - nvidia-gpu-health.json
    - nvidia-gpu-metrics-single.json
    - nvidia-gpu-throttling.json
    - gpu-throttling-overview.json
    - oci-vcn.json
    - oci-block.json
    - oci-igw.json
    - oci-natgw.json
    - oci-sgw.json
    - oci-drg.json
    - oci-fss.json
    - oci-lustre.json
    - oci-fastconnect.json
    - slurm-dashboard.json
    - nccl-traces.json
