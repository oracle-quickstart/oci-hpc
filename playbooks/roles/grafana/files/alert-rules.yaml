                uid: DATASOURCE_UID
              editorMode: code
              expr: (node_systemd_unit_state{hostname!~".*controller*|.*login*|.*backup*", state="failed",  name=~"ssh.service|sssd.service|node_exporter.service|nvidia-dcgm.service|slurmd.service|nvidia-persistenced.service|nvlink-exporter.service|nvml-exporter.service|dcgm-exporter.service|wpa_supplicant-wired@rdma.*.service"} or node_systemd_unit_state{state="failed", name="nvidia-fabricmanager.service", shape!~".*A10.*"})
              hide: false
              instant: true
              intervalMs: 60000
              legendFormat: "{{ hostname }}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              intervalMs: 60000
              maxDataPoints: 43200
              refId: B
              type: threshold
        dashboardUid: ""
        panelId: 0
        noDataState: KeepLast
        execErrState: KeepLast
        for: 15m
        annotations:
          summary: Check and restart failed critical services on compute node.
        isPaused: false
        notification_settings:
          receiver: ons-webhook
          repeat_interval: 24h
  - orgId: 1
    name: GPU and RDMA Related Critical Errors requiring system reboot or repair
    folder: Critical
