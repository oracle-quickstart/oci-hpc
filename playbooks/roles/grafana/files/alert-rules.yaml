apiVersion: 1
contactPoints:
  - orgId: 1
    name: ons-webhook
    receivers:
    - uid: ons
      type: webhook
      settings:
        url: http://localhost:5000/grafana-webhook
        httpMethod: POST
policies:
    - orgId: 1
      receiver: ons-webhook
      group_by:
        - grafana_folder
        - alertname
        - hostname
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
groups:
  - orgId: 1
    name: Host Related Warnings or Events (non-GPU and non-RDMA) which may cause cluster instability
    folder: Warning
    interval: 5m
    rules:
      - uid: cpu-10pct
        title: Low CPU Free on Controller/Login Node
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: DATASOURCE_UID
            model:
              datasource:
                type: prometheus
                uid: DATASOURCE_UID
              editorMode: code
              expr: avg by (hostname) (irate(node_cpu_seconds_total{mode="idle", hostname=~".*controller|.*login"}[5m])) * 100
              hide: false
              instant: true
              intervalMs: 60000
              legendFormat: "{{ hostname }}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 10
                      - 0
                    type: lt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              intervalMs: 60000
              maxDataPoints: 43200
              refId: B
              type: threshold
        dashboardUid: ""
        panelId: 0
        noDataState: KeepLast
        execErrState: KeepLast
        for: 15m
        annotations:
          summary: Investigate and free up CPU on controller or login node.
        isPaused: false
        notification_settings:
          receiver: ons-webhook
          repeat_interval: 24h
      - uid: controller-node-critical-service-down
        title: One or more critical services failed on controller.
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: DATASOURCE_UID
            model:
              datasource:
                type: prometheus
                uid: DATASOURCE_UID
              editorMode: code
              expr: node_systemd_unit_state{hostname=~".*controller*|.*backup*", state="failed", name=~"mariadb.service|ssh.service|sssd.service|slurmctld.service|slurmrestd.service|slapd.service|slurm-exporter.service|node_exporter.service|oci-rdma-faults-exporter.service|oci-fss-exporter.service"}
              hide: false
              instant: true
              intervalMs: 60000
              legendFormat: "{{ hostname }}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              intervalMs: 60000
              maxDataPoints: 43200
              refId: B
              type: threshold
        dashboardUid: ""
        panelId: 0
        noDataState: KeepLast
        execErrState: KeepLast
        for: 15m
        annotations:
          summary: Check and restart failed critical services on controller.
        isPaused: false
        notification_settings:
          receiver: ons-webhook
          repeat_interval: 24h
      - uid: login-node-critical-service-down
        title: One or more critical services failed on login node.
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: DATASOURCE_UID
            model:
              datasource:
                type: prometheus
                uid: DATASOURCE_UID
              editorMode: code
              expr: node_systemd_unit_state{hostname=~".*login*", state="failed", name=~"ssh.service|sssd.service|node_exporter.service"}
              hide: false
              instant: true
              intervalMs: 60000
              legendFormat: "{{ hostname }}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              intervalMs: 60000
              maxDataPoints: 43200
              refId: B
              type: threshold
        dashboardUid: ""
        panelId: 0
        noDataState: KeepLast
        execErrState: KeepLast
        for: 15m
        annotations:
          summary: Check and restart failed critical services on login node.
        isPaused: false
        notification_settings:
          receiver: ons-webhook
          repeat_interval: 24h
      - uid: compute-node-critical-service-down
        title: One or more critical services failed on compute nodes.
        condition: B
