              datasource:
                type: prometheus
                uid: DATASOURCE_UID
              editorMode: code
              expr: node_filesystem_avail_bytes{mountpoint="/"}
              hide: false
              instant: true
              intervalMs: 60000
              legendFormat: "{{ hostname }} {{ mountpoint }}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 50000000000
                      - 0
                    type: lt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: avg
                  type: query
              datasource:
                name: Expression
                type: __expr__
                uid: __expr__
              expression: A
              hide: false
              intervalMs: 60000
              maxDataPoints: 43200
              refId: B
              type: threshold
        dashboardUid: ""
        panelId: 0
        noDataState: KeepLast
        execErrState: KeepLast
