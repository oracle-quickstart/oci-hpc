---
# tasks file for openldap
- name: Create /etc/opt/oci-hpc/passwords/openldap
  become: true
  file:
    path: /etc/opt/oci-hpc/passwords/openldap
    state: directory
    owner: opc
    mode: 0770
    group: opc
    recurse: true

- name: Install dependencies (OL7, OL8, OL9)
  vars:
    package_name: >-
      {{
        'policycoreutils-python' if ansible_distribution_major_version == '7' else
        'policycoreutils-python-utils'
      }}
    package_state: present
  include_role:
    name: safe_yum

- block:
    - name: Install OpenLDAP servers (OL8)
      ansible.builtin.yum:
        name: https://vault.centos.org/centos/8/PowerTools/{{ansible_architecture}}/os/Packages/openldap-servers-2.4.46-18.el8.{{ansible_architecture}}.rpm
        state: present
        disable_gpg_check: true
  when: ansible_distribution_major_version == '8'

- name: Install OpenLDAP packages (OL7, OL8, OL9)
  vars:
    package_name: >-
      {{
        openldap_packages if ansible_distribution_major_version == '7' else
        openldap_packages_ol8 if ansible_distribution_major_version == '8' else
        openldap_packages_ol9
      }}
  include_role:
    name: safe_yum

- name: Create sysconfig-slapd
  ansible.builtin.copy:
    content: ""
    dest: /etc/sysconfig/slapd
    mode: 0644
  when: ansible_distribution_major_version in ["8", "9"]

- name: Generate and Get OpenLDAP root password
  set_fact:
    openldap_root_pwd: "{{ lookup('password',
                          '/etc/opt/oci-hpc/passwords/openldap/root.txt
                           chars=ascii_letters,digits,hexdigits') }}"

- name: Hash OpenLDAP root password
  command: slappasswd -h {SSHA} -s {{ openldap_root_pwd }}
  register: openldap_root_pwd_hash
  changed_when: false

- name: Create Python virtual environment with system site packages
  command: "python3 -m venv /config/venv/{{ansible_distribution}}_{{ansible_distribution_version}}_{{ansible_architecture}} --system-site-packages"
  when: ansible_distribution_major_version != "8"
  
- name: Selinux fcontext on files
  sefcontext:
    target: "{{ openldap_server_conf_path }}(/.*)?"
    setype: slapd_db_t
  when: ansible_selinux.status == "enabled"

- name: Adjust OpenLDAP server TLS configuration
  lineinfile:
    path: "{{ openldap_server_defaults_file }}"
    regexp: '^SLAPD_URLS='
    line: 'SLAPD_URLS="{{ openldap_endpoints }}"'

- name: Adjust OpenLDAP client TLS configuration
  lineinfile:
    path: '/etc/openldap/ldap.conf'
    line: 'TLS_CACERT /etc/openldap/certs/cluster-ca.crt'

- name: Enable OpenLDAP service
  systemd:
    name: slapd
    enabled: true

- name: Get /etc/openldap/slapd.d status
  stat:
    path: '/etc/openldap/slapd.d'
  register: default_openldap_path

- name: Add cluster CA certificate to /etc/openldap/certs
  copy:
    src: '{{ openldap_tls_cacrt }}'
    dest: '/etc/openldap/certs/'

- name: Ensure OpenLDAP has access to the ssl certificates
  user:
    name: '{{ openldap_default_user }}'
    groups: '{{ ssl_cert_group }}'

- block:
    - name: Install and upgrade pip
      pip:
        name: pip
        extra_args: --upgrade
        executable: /usr/bin/pip3  

    - name: Install ldap3 and click
      pip:
        name: ['ldap3', 'click']
        executable: /usr/bin/pip3  

    - name: update /etc/openldap/ldap.conf
      lineinfile:
        dest: /etc/openldap/ldap.conf
        line: TLS_REQSAN allow
  when: ansible_distribution_major_version in ["8", "9"]

- name: Ensure OpenLDAP data directory exists
  file:
    path: "{{ openldap_server_dir_path }}"
    state: directory
    owner: "{{ openldap_default_user }}"
    group: "{{ openldap_default_group }}"
    setype: slapd_db_t
    seuser: system_u

- name: Start OpenLDAP service
  systemd:
    name: slapd
    state: started
    enabled: true

- block:
    - name: Copy OpenLDAP schemas for OL7
      copy:
        src: "{{ item }}"
        dest: "/etc/openldap/schema/"
        owner: "{{ openldap_default_user }}"
        group: "{{ openldap_default_group }}"
        mode: "0644"
      with_items:
        - rfc2307bis.ldif
        - autoinc.ldif
        - local_schema.ldif

    - name: Render OpenLDAP configuration templates for OL7
      template:
        src: "{{ item.src }}"
        dest: "/tmp/{{ item.dest }}"
        owner: "{{ openldap_default_user }}"
        group: "{{ openldap_default_group }}"
        mode: "0644"
      with_items:
        - { src: "config.ldif.j2", dest: "config.ldif" }
        - { src: "el_local.ldif.j2", dest: "local.ldif" }
    
    - name: Copy other OpenLDAP schemas for OL7
      copy:
        src: "{{ item.src }}"
        dest: "/tmp/{{ item.dest }}"
        owner: "{{ openldap_default_user }}"
        group: "{{ openldap_default_group }}"
        mode: "0644"
      with_items:
        - { src: "el_ppolicy.ldif", dest: "ppolicy.ldif" }
        - { src: "el_memberof.ldif", dest: "memberof.ldif" }
  when: ansible_distribution_major_version == "7"

- block:
    - name: Copy OpenLDAP schemas (OL8 or OL9)
      copy:
        src: "{{ item }}"
        dest: "/etc/openldap/schema/"
        owner: "{{ openldap_default_user }}"
        group: "{{ openldap_default_group }}"
        mode: "0644"
      with_items:
        - rfc2307bis.ldif
        - autoinc.ldif
        - local_schema.ldif

    - name: Copy `ppolicy.ldif` only for OL9
      copy:
        src: "el_ppolicy_ol8.ldif"
        dest: "/etc/openldap/schema/ppolicy.ldif"
        owner: "{{ openldap_default_user }}"
        group: "{{ openldap_default_group }}"
        mode: "0644"
      when: ansible_distribution_major_version == "9"

    - name: Copy `memberof.ldif` schemas (OL8 or OL9)
      copy:
        src: "el_memberof_ol8.ldif"
        dest: "/tmp/memberof.ldif"
        owner: "{{ openldap_default_user }}"
        group: "{{ openldap_default_group }}"
        mode: "0644"
      when: ansible_distribution_major_version in ["8", "9"]

    - name: Render OpenLDAP configuration templates (OL8 or OL9)
      template:
        src: "{{ item.src }}"
        dest: "/tmp/{{ item.dest }}"
        owner: "{{ openldap_default_user }}"
        group: "{{ openldap_default_group }}"
        mode: "0644"
      with_items:
        - { src: "config.ldif.j2", dest: "config.ldif" }
        - { src: "{{ 'el_local_ol9.ldif.j2' if ansible_distribution_major_version == '9' else 'el_local_ol8.ldif.j2' }}", dest: "local.ldif" }
  when: ansible_distribution_major_version in ["8", "9"]

- name: Find matching files
  ansible.builtin.find:
    paths: "/etc/openldap/slapd.d/cn=config/cn=schema/"
    patterns: "cn=*{{ item }}.ldif"
    file_type: file
  register: openldap_schemas_output
  with_items: '{{ openldap_schemas }}'

- name: Load OpenLDAP schemas and configs (OL7, OL8, OL9)
  command: ldapadd -c -Y EXTERNAL -H ldapi:/// -Q -f /etc/openldap/schema/{{ item.item }}.ldif
  with_items: "{{ openldap_schemas_output.results }}"
  when: item.files | length == 0
  ignore_errors: true

- name: Load OpenLDAP global configuration (OL7, OL8, OL9)
  command: ldapmodify -c -Y EXTERNAL -H ldapi:/// -Q -f /tmp/config.ldif
  args:
    creates: "/etc/openldap/slapd.d/cn=config.ldif"
  notify: Restart openldap

- name: Load OpenLDAP local configuration ol7
  command: ldapmodify -c -Y EXTERNAL -H ldapi:/// -Q -f /tmp/{{ item }}
  args:
    creates: '/etc/openldap/slapd.d/cn=config/olcDatabase={?}hdb/olcOverlay={0}memberof.ldif'
  with_items:
    - config.ldif
    - local.ldif
    - ppolicy.ldif
    - memberof.ldif
  notify: Restart openldap
  when: ansible_distribution_major_version == '7'

- name: Restart openldap
  service:
    name: slapd
    state: restarted
    enabled: true
  when: ansible_distribution_major_version in ["8", "9"]

- name: Load OpenLDAP local configuration (OL8, OL9)
  command: ldapmodify -c -Y EXTERNAL -H ldapi:/// -Q -f /tmp/{{ item }}
  args:
    creates: "/etc/openldap/slapd.d/cn=config/olcDatabase={?}mdb/olcOverlay={0}memberof.ldif"
  with_items:
    - config.ldif
    - local.ldif
    - memberof.ldif
  notify: Restart openldap
  when: ansible_distribution_major_version in ["8", "9"]

- name: Check local schemas
  command: ldapsearch -H ldapi:// -Y EXTERNAL -b "dc=local" "cn=pwdDefaultPolicy,ou=Policies,dc=local"
  register: ldapsearch
  failed_when: false
  changed_when: false

- name: Load OpenLDAP local schema
  command: >
    ldapadd -x -H ldaps:// -D "cn=manager,dc=local" -w {{ openldap_root_pwd }}
                         -f /etc/openldap/schema/local_schema.ldif
  ignore_errors: true
  when: ldapsearch.rc == 32

- meta: flush_handlers