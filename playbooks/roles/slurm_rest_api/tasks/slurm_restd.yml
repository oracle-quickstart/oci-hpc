# ==================== Unified Python via venv (all OS) ====================
- name: Set unified Python/venv paths
  set_fact:
    py_ver: "3.11.9"
    pyenv_root: "/opt/pyenv"
    venv_dir: "/opt/oci-hpc/venv"
    vpy: "{{ venv_dir }}/bin/python"
    vpip: "{{ venv_dir }}/bin/pip"

# ---- Build prerequisites for compiling CPython ----
# Ubuntu 22/24
- name: Install build deps (Ubuntu)
  apt:
    name:
      - make
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - wget
      - curl
      - llvm
      - libncursesw5-dev
      - xz-utils
      - tk-dev
      - libxml2-dev
      - libxmlsec1-dev
      - libffi-dev
      - liblzma-dev
      - git
      - default-jre
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
  become: true

# OL8 / OL9
- name: Choose Java package on OL/RHEL
  set_fact:
    java_pkg: "{{ 'java-17-openjdk' if (ansible_distribution == 'OracleLinux' and (ansible_distribution_major_version|int) >= 9) else 'java-11-openjdk' }}"
  when: ansible_os_family == "RedHat"

- name: Install build deps (OL/RHEL)
  dnf:
    name:
      - gcc
      - gcc-c++
      - make
      - zlib-devel
      - bzip2
      - bzip2-devel
      - readline-devel
      - sqlite
      - sqlite-devel
      - openssl-devel
      - tk-devel
      - libffi-devel
      - xz-devel
      - findutils
      - git
      - "{{ java_pkg }}"
    state: present
  when: ansible_os_family == "RedHat"
  become: true

# ---- Install pyenv system-wide (idempotent) ----
- name: Ensure pyenv root exists
  file:
    path: "{{ pyenv_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install/Update pyenv
  git:
    repo: "https://github.com/pyenv/pyenv.git"
    dest: "{{ pyenv_root }}"
    version: master
    update: no
  become: true

# ---- Build the chosen Python with pyenv (idempotent) ----
- name: Check if Python {{ py_ver }} already installed by pyenv
  stat:
    path: "{{ pyenv_root }}/versions/{{ py_ver }}/bin/python"
  register: pyenv_py
  become: true

- name: Build Python {{ py_ver }} via pyenv
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"
    pyenv install -s "{{ py_ver }}"
  args:
    executable: /bin/bash
  when: not pyenv_py.stat.exists
  become: true

# ---- Create venv from the unified Python (idempotent) ----
- name: Ensure venv directory exists
  file:
    path: "{{ venv_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Create venv if missing
  shell: |
    "{{ pyenv_root }}/versions/{{ py_ver }}/bin/python" -m venv "{{ venv_dir }}"
  args:
    creates: "{{ venv_dir }}/bin/activate"
    executable: /bin/bash
  become: true

# ==================== NVM / OpenAPI Generator ====================
# (unchanged logic; we only add robust cert env for OL and JAVA_HOME detection)

- name: Download NVM install script
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_distribution == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: "{{ nvm_install_url }}"
    dest: /tmp/nvm_install.sh
    mode: '0755'
  become: true

- name: Check if NVM is already installed
  stat:
    path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  register: nvm_exists

- name: Execute NVM install script
  shell: "/tmp/nvm_install.sh"
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_env.HOME }}"
  when: not nvm_exists.stat.exists

- name: Check if Node.js is already installed via NVM
  shell: |
    set -e
    source ~/.nvm/nvm.sh
    nvm list --no-colors | grep -c "lts" || true
  args:
    executable: /bin/bash
  register: node_lts_check
  changed_when: false
  failed_when: false

- name: Install Node LTS and latest npm
  shell: |
    source ~/.nvm/nvm.sh
    nvm install --lts
    nvm install-latest-npm
  args:
    executable: /bin/bash
  when: node_lts_check.rc != 0 or (node_lts_check.stdout | int) == 0

# ---- Java home detection for openapi-generator-cli ----
- name: Detect JAVA_HOME from current java on PATH
  shell: |
    set -e
    JAVA_BIN="$(command -v java || true)"
    if [ -n "$JAVA_BIN" ]; then
      readlink -f "$JAVA_BIN" | awk -F'/bin/java' '{print $1}'
    fi
  args:
    executable: /bin/bash
  register: java_home_cmd
  changed_when: false
  failed_when: false

- name: Set JAVA_HOME fact (may be empty)
  set_fact:
    JAVA_HOME: "{{ (java_home_cmd.stdout | default('')) | trim }}"

- name: Check if OpenAPI generator CLI is already installed
  shell: |
    set -e
    source ~/.nvm/nvm.sh
    npm list -g @openapitools/openapi-generator-cli || true
  args:
    executable: /bin/bash
  register: openapi_cli_check
  changed_when: false
  failed_when: false
  environment:
    JAVA_HOME: "{{ JAVA_HOME }}"
    PATH: "{{ (JAVA_HOME|length > 0) | ternary(JAVA_HOME ~ '/bin:' ~ ansible_env.PATH, ansible_env.PATH) }}"

- name: Install OpenAPI generator CLI via npm (and select version)
  shell: |
    source ~/.nvm/nvm.sh
    npm install -g @openapitools/openapi-generator-cli
    openapi-generator-cli version-manager set 7.10.0 --openapitools /tmp/openapitools.json
  args:
    executable: /bin/bash
  when: openapi_cli_check.rc != 0
  environment:
    JAVA_HOME: "{{ JAVA_HOME }}"
    PATH: "{{ (JAVA_HOME|length > 0) | ternary(JAVA_HOME ~ '/bin:' ~ ansible_env.PATH, ansible_env.PATH) }}"

# ==================== slurmrestd service ====================
- name: Create the slurmrestd group
  become: true
  ansible.builtin.group:
    name: slurmrestd
    system: yes
    state: present

- name: Create slurmrestd user
  become: true
  user:
    comment: "Slurmrestd user"
    name: slurmrestd
    system: yes
    shell: /usr/sbin/nologin
    create_home: no
    group: slurmrestd
    state: present

- name: Render slurmrestd systemd service file
  become: true
  template:
    src: slurmrestd.service.j2
    dest: /etc/systemd/system/slurmrestd.service
    owner: root
    group: root
    mode: "0644"

- name: Start slurmrestd service
  become: true
  service:
    name: slurmrestd
    daemon_reload: true
    state: restarted
    enabled: yes