- name: Set OS ID
  set_fact:
    os_id: "{{ 'ol' if ansible_distribution == 'OracleLinux' else 'centos' if ansible_distribution == 'CentOS' else ansible_distribution | lower }}"

- name: Set unified venv paths
  set_fact:
    venv_dir: "/config/venv/{{ os_id | capitalize }}_{{ ansible_distribution_version }}_{{ ansible_architecture }}/oci"

- name: Render slurm-exporter python script
  template:
    src: slurm-exporter.py.j2
    dest: /usr/local/bin/slurm-exporter.py
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: "0744"
  become: true

- name: Render slurm-exporter systemd service
  template:
    src: slurm-exporter.service.j2
    dest: /etc/systemd/system/slurm-exporter.service
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: "0644"
  become: true

- name: Start/enable slurm-exporter
  service:
    name: slurm-exporter
    daemon_reload: true
    state: restarted
    enabled: yes
  become: true