---
- name: Set python version variables
  set_fact:
    python_version: >-
      {% if ansible_distribution == 'OracleLinux' and ansible_distribution_major_version == '8' %}3.8
      {% elif ansible_distribution == 'OracleLinux' and ansible_distribution_major_version == '9' %}3.9
      {% elif ansible_distribution == 'Ubuntu' and ansible_distribution_major_version == '22' %}3.10
      {% elif ansible_distribution == 'Ubuntu' and ansible_distribution_major_version == '24' %}3.12
      {% else %}3{% endif %}
    python_executable: "/usr/bin/python{{ python_version }}"
    pip_executable: "/usr/bin/pip{{ python_version }}"

- name: Install prometheus_client python package
  ansible.builtin.pip:
    name: prometheus_client 
    executable: "{{ pip_executable }}"
  become: true

- name: Install ujson python package
  ansible.builtin.pip:
    name: ujson 
    executable: "{{ pip_executable }}"
  become: true

- name: Render slurm-exporter python script
  become: true
  template: 
    src: slurm-exporter.py.j2
    dest: /usr/local/bin/slurm-exporter.py
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: 0744

- name: Render slurm-exporter systemd service file
  become: true
  template: 
    src: slurm-exporter.service.j2
    dest: /etc/systemd/system/slurm-exporter.service
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: 0744

- name: start slurm-exporter service
  become: true
  service:
    name: slurm-exporter
    daemon_reload: true
    state: restarted
    enabled: yes