---
# ----------------- Detect venv Python -----------------
- name: Detect UV venv Python executable
  shell: |
    source /etc/os-release
    vid=$(echo $VERSION | awk -F. '{print $1}')
    export UV_INSTALL_DIR=/config/venv/${ID^}_${VERSION_ID}_$(uname -m)/
    echo "${UV_INSTALL_DIR}/oci/bin/python"
  args:
    executable: /bin/bash
  register: venv_python_detect
  changed_when: false

- name: Set Python facts from venv
  set_fact:
    python_executable: "{{ venv_python_detect.stdout | trim }}"
    pip_cmd: "{{ venv_python_detect.stdout | trim }} -m pip"

- name: Verify venv Python exists
  stat:
    path: "{{ python_executable }}"
  register: venv_python_stat
  failed_when: not venv_python_stat.stat.exists

- name: Get Python version from venv
  command: "{{ python_executable }} --version"
  register: python_version_output
  changed_when: false

- name: Display detected Python
  debug:
    msg: "Using Python: {{ python_executable }} ({{ python_version_output.stdout }})"

# ----------------- NVM / Node / OpenAPI Generator -----------------

- name: Download NVM install script
  environment: "{{ {'SSL_CERT_FILE': '/etc/pki/tls/certs/ca-bundle.crt', 'REQUESTS_CA_BUNDLE': '/etc/pki/tls/certs/ca-bundle.crt'} if ansible_distribution == 'OracleLinux' else {} }}"
  ansible.builtin.get_url:
    url: "{{ nvm_install_url }}"
    dest: /tmp/nvm_install.sh
    mode: '0755'
  become: true
  when: not ansible_env.HOME is undefined

- name: Check if NVM is already installed
  stat:
    path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  register: nvm_exists

- name: Execute NVM install script
  shell: "/tmp/nvm_install.sh"
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_env.HOME }}"
  when: not nvm_exists.stat.exists

- name: Check if Node.js is already installed via NVM
  shell: |
    set -e
    source ~/.nvm/nvm.sh
    nvm list --no-colors | grep -c "lts" || true
  args:
    executable: /bin/bash
  register: node_lts_check
  changed_when: false
  failed_when: false

- name: Install Node LTS and latest npm
  shell: |
    source ~/.nvm/nvm.sh
    nvm install --lts
    nvm install-latest-npm
  args:
    executable: /bin/bash
  when: node_lts_check.rc != 0 or (node_lts_check.stdout | int) == 0

# ----------------- OpenAPI Generator CLI via npm -----------------

- name: Check if OpenAPI generator CLI is already installed
  shell: |
    set -e
    source ~/.nvm/nvm.sh
    npm list -g @openapitools/openapi-generator-cli || true
  args:
    executable: /bin/bash
  register: openapi_cli_check
  changed_when: false
  failed_when: false

- name: Install OpenAPI generator CLI via npm (and select version)
  shell: |
    source ~/.nvm/nvm.sh
    npm install -g {{ openapi_generator_cli_pkg }}
    openapi-generator-cli version-manager set {{ openapi_generator_jar_version }}
  args:
    executable: /bin/bash
  when: openapi_cli_check.rc != 0

- name: Wait for jar download to complete
  pause:
    seconds: 5
  when: openapi_cli_check.rc != 0

- name: Find the openapi-generator jar
  find:
    paths: "{{ ansible_env.HOME }}/.nvm"
    patterns: "{{ openapi_generator_jar_version }}.jar"
    file_type: file
    recurse: true
  register: openapi_jar_find

- name: Debug - Show jar search results
  debug:
    msg: "Found {{ openapi_jar_find.matched }} jar files: {{ openapi_jar_find.files | map(attribute='path') | list }}"

- name: Fail if jar not found
  fail:
    msg: "OpenAPI Generator jar version {{ openapi_generator_jar_version }} not found in {{ ansible_env.HOME }}/.nvm"
  when: openapi_jar_find.matched == 0

- name: Ensure OpenAPI download directory exists
  file:
    path: "{{ openapi_download_path }}"
    state: directory
    mode: '0755'
  become: true

- name: Copy openapi-generator jar to local path
  copy:
    remote_src: true
    src: "{{ openapi_jar_find.files[0].path }}"
    dest: "{{ openapi_download_path }}/openapi-generator.jar"
    mode: '0644'
  become: true
  when: openapi_jar_find.matched > 0

- name: Verify jar file exists and is readable
  stat:
    path: "{{ openapi_download_path }}/openapi-generator.jar"
  register: jar_stat
  failed_when: not jar_stat.stat.exists

- name: Debug - Show jar file info
  debug:
    msg: "Jar file: {{ openapi_download_path }}/openapi-generator.jar ({{ jar_stat.stat.size }} bytes)"

# ----------------- JWT + OpenAPI Spec -----------------

- name: Generate JWT token
  command: "scontrol token lifespan=31556926"
  become_user: "{{ slurm_user }}"
  register: jwt_token_result

- name: Save JWT token to file
  copy:
    content: "{{ jwt_token_result.stdout }}"
    dest: "{{ slurm_jwt_token_path }}"
    owner: "{{ slurm_user }}"
    group: "{{ slurm_group }}"
    mode: "0600"
  become: true

- name: Read JWT token from file
  slurp:
    src: "{{ slurm_jwt_token_path }}"
  register: jwt_token_file
  become: true

- name: Set JWT token fact
  set_fact:
    slurm_jwt_token: "{{ (jwt_token_file.content | b64decode).split('=')[1] }}"

- name: Fetch Slurm API versions
  ansible.builtin.uri:
    url: "{{ slurm_rest_api_spec_url }}"
    return_content: true
    headers:
      X-SLURM-USER-NAME: "{{ slurm_user }}"
      X-SLURM-USER-TOKEN: "{{ slurm_jwt_token }}"
  register: api_response

- name: Extract all version strings
  ansible.builtin.set_fact:
    version_strings: >-
      {{ api_response.content | regex_findall('slurm_v([0-9]+)_get_jobs') }}

- name: Set highest version string
  ansible.builtin.set_fact:
    slurm_api_version: >-
      {{ version_strings | max | string }}

- name: Ensure OpenAPI download dir
  file:
    path: "{{ openapi_download_path }}"
    state: directory

- name: Download Slurm OpenAPI spec
  uri:
    url: "{{ slurm_rest_api_spec_url }}"
    dest: "{{ openapi_download_path }}/{{ slurm_rest_api_spec_filename }}"
    headers:
      X-SLURM-USER-NAME: "{{ slurm_user }}"
      X-SLURM-USER-TOKEN: "{{ slurm_jwt_token }}"
  become: true

# ----------------- Generate SDK -----------------

- name: Ensure SDK output directory
  file:
    path: "{{ sdk_output_dir }}"
    state: directory

- name: Generate Slurm python SDK from OpenAPI
  shell: |
    java -jar {{ openapi_download_path }}/openapi-generator.jar generate \
      -g python \
      -i {{ openapi_download_path }}/{{ slurm_rest_api_spec_filename }} \
      -o {{ sdk_output_dir }}/
  args:
    chdir: "{{ sdk_output_dir }}"

# ----------------- Build & install SDK wheel using venv -----------------

- name: Build slurm sdk python wheel using venv
  shell: |
    {{ python_executable }} setup.py bdist_wheel
  args:
    chdir: "{{ sdk_output_dir }}"
    executable: /bin/bash

- name: Install slurm sdk wheel into venv
  shell: |
    {{ pip_cmd }} install --force-reinstall --upgrade dist/*.whl
  args:
    chdir: "{{ sdk_output_dir }}"
    executable: /bin/bash

- name: Verify SDK installation
  command: "{{ pip_cmd }} show openapi-client"
  register: sdk_verify
  changed_when: false
  failed_when: sdk_verify.rc != 0

- name: Display SDK installation info
  debug:
    msg: "{{ sdk_verify.stdout_lines }}"