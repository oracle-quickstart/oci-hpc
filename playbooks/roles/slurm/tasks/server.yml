---
- name: Generate password for DB user and save it to /etc/trinity/passwords
  set_fact:
    tmp_pwd: '{{ lookup("password",
                           "/etc/opt/oci-hpc/passwords/mysql/slurmdbd.txt
                            chars=ascii_letters,digits,hexdigits") }}'

- name: Get password for DB user from /etc/trinity/passwords)
  set_fact:
    slurmdbd_sql_pwd: '{{ lookup("password",
                           "/etc/opt/oci-hpc/passwords/mysql/slurmdbd.txt
                            chars=ascii_letters,digits,hexdigits") }}'

- name: Install PyMySQL
  vars: 
    package_name:
      - python3-PyMySQL
    package_repo: "{{slurm_repos}}"
    package_state: present
  include_role: 
    name: safe_yum
  when: ansible_os_family == 'RedHat'

- name: Install libmariadb-dev
  vars: 
    package_name:
      - libmariadb-dev
    package_state: present
  include_role: 
    name: safe_yum
  when: ansible_os_family == 'Debian'

- name: install SLURM server packages Ubuntu
  vars:
    package_name: '{{ slurm_server_packages }}'
    package_state: present
  include_role:
    name: safe_yum
  when: ansible_os_family == 'Debian'

- name: install SLURM server packages RedHat
  vars: 
    package_name: '{{ slurm_server_packages }}'
    disable_gpg_check_var: True
  include_role: 
    name: safe_yum
  when: ansible_os_family == 'RedHat'

- name: Render systemd units for slurm and slurmdbd
  become: true
  template:
    src: 'systemd/{{ item }}.service.j2'
    dest: '/lib/systemd/system/{{ item }}.service'
    backup: true
  with_items:
    - slurmdbd
    - slurmctld

- name: Create systemd unit dirs
  become: true
  file:
    name: '/etc/systemd/system/{{ item }}.service.d'
    state: directory
  with_items:
    - munge
    - slurmdbd
    - slurmctld

- name: Render systemd units for slurm, slurmdbd and munge
  become: true
  template:
    src: 'systemd/{{ item }}.service.d/unit.conf.j2'
    dest: '/etc/systemd/system/{{ item }}.service.d/unit.conf'
    backup: true
  with_items:
    - munge
    - slurmdbd
    - slurmctld

- block:
    - name: Create {{ slurm_nfs_path }}/spool/slurm
      become: true
      file:
        name: "{{ slurm_nfs_path }}/spool/slurm"
        state: directory
        owner: 'slurm'
        group: 'slurm'
        mode: '0750'
        recurse: true

    - name: Create munge.key
      become: true
      command: 'dd if=/dev/urandom bs=1 count=1024 of={{ munge_conf_path }}/munge.key'
      args:
        creates: '{{ munge_conf_path }}/munge.key'

    - name: Set munge.key permissions
      become: true
      file:
        name: '{{ munge_conf_path }}/munge.key'
        state: file
        owner: munge
        group: munge
        mode: 0400
      notify: restart munge

    - name: copy munge.key
      become: true
      shell:
        cmd: "cp {{ munge_conf_path }}/munge.key /config/key/munge.key"
    - name: set permissions
      become: true
      shell:
        cmd: chown {{ ansible_user }}:{{ ansible_user }} /config/key/munge.key
    
- name: Create DB for accounting
  become: true
  mysql_db:
      config_file: '/root/.my.cnf'
      name: '{{ slurm_db_name }}'
      state: present

- name: Create DB user for accounting
  become: true
  mysql_user:
      config_file: '/root/.my.cnf'
      name: '{{ slurm_db_user }}'
      password: '{{ slurmdbd_sql_pwd }}'
      priv: '{{ slurm_db_name }}.*:ALL'
      state: present

- name: Copy cgroup file
  become: true
  copy:
    src: '{{ cgroup_conf_file }}'
    dest: '{{ slurm_conf_path }}/cgroup.conf'
    force: no
    owner: slurm
    group: slurm
  
- name: copy resume and suspend script 
  become: true
  copy: 
    src: "{{item}}"
    dest: /etc/slurm/
    owner: slurm
    group: slurm
    mode: '0700'
  with_items:
    - resume.sh
    - suspend.sh
  

- name: Generate slurmdbd.conf
  become: true
  template: 
    src: '{{ slurmdbd_conf_file }}'
    dest: '{{ slurm_conf_path }}/slurmdbd.conf'
    mode: '0600'
    owner: slurm
    group: slurm
    backup: true

- name: Create empty GRES.conf
  become: true
  lineinfile:
    path: "{{ slurm_conf_path }}/gres.conf"
    regexp: "#GRES.conf"
    line: "#GRES.conf"
    state: present
    create: true

- name: Generate slurm.conf
  become: true
  template: 
    src: '{{ slurm_conf_file }}'
    dest: '{{ slurm_conf_path }}/slurm.conf'
    mode: '0644'
    backup: true
    owner: slurm
    group: slurm
  notify: restart slurm server

- name: Generate topology.conf
  become: true
  template: 
    src: topology.conf.j2
    dest: '{{ slurm_conf_path }}/topology.conf'
    mode: '0644'
    force: no
    owner: slurm
    group: slurm
  register: initial_topology
  run_once: true
  notify: reconfigure slurm

- name: run handlers
  meta: flush_handlers

- name: create empty directory
  set_fact:
    nodesname_dict: "{{ nodesname_dict | default({}) }}"

- name: Generate a list of types to check
  vars:
    temp_list: "{% for instancetype in item.instance_types %}{% if not instancetype.permanent %}{{instancetype.hostname_convention}}-[1-{{instancetype.max_number_nodes}}],{% endif %}{% endfor %}"
  set_fact:
    nodesname_dict: "{{ nodesname_dict | combine({ item.name: temp_list[:-1] }, recursive=True) }}"
  with_items: "{{queues}}"

- name: Check if shapes need to be added
  become: true
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp: "SwitchName={{item.name}}:inactive\\sNodes.*"
    state: absent
  check_mode: true
  with_items: "{{queues}}"
  run_once: true
  register: shape_added
  when: not initial_topology.changed and nodesname_dict[item.name] | length > 0

- name: Add new shapes to existing topology.conf
  become: true
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp: "SwitchName={{item.item.name}}:inactive\\sNodes.*"
    line: "SwitchName={{item.item.name}}:inactive Nodes={{nodesname_dict[item.item.name]}}"
    state: present
  with_items: "{{shape_added.results}}"
  run_once: true
  when: not initial_topology.changed and nodesname_dict[item.item.name] | length > 0 and not ( item.changed | bool)

- name: Check if shapes need to be added
  become: true
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp: "SwitchName={{item.name}}\\sSwitches.*"
    state: absent
  check_mode: true
  with_items: "{{queues}}"
  run_once: true
  register: switch_added
  when: not initial_topology.changed and nodesname_dict[item.name] | length > 0
  notify: reconfigure slurm

- name: Add new shapes to existing topology.conf, Upper Switch
  become: true
  lineinfile:
    path: "{{ slurm_conf_path }}/topology.conf"
    regexp: "SwitchName={{item.item.name}}\\sSwitches.*"
    line: "SwitchName={{item.item.name}} Switches={{item.item.name}}:inactive"
    state: present
  with_items: "{{switch_added.results}}"
  run_once: true
  when: not initial_topology.changed and nodesname_dict[item.item.name] | length > 0 and not ( item.changed | bool)
  notify: reconfigure slurm