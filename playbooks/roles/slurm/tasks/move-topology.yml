---
- name: Move topology.yaml on backup servers
  become: true
  ansible.builtin.copy:
    dest: "{{ slurm_conf_path }}/topology.yaml"
    src: "{{ slurm_conf_path }}/topology.yaml"
    force: true
  register: topology_copied
  until: topology_copied is not failed
  retries: 10
  delay: 5
  delegate_to: "{{ slurm_backup_hostname }}"
  when: (groups['slurm_backup']| length ) > 0 | bool
