---
- name: Remove from the gres.conf file on the controller.
  become: true
  ansible.builtin.blockinfile:
    path: "{{ slurm_conf_path }}/gres.conf"
    marker: "### {mark} {{ item.value.hostname }}"
    state: absent
  delegate_to: 127.0.0.1
  when: item.value.shape in ["BM.GPU.MI300X.8", "BM.GPU.MI355X-v0.8", "BM.GPU.MI355X.8", "BM.GPU.MI355X-v1.8"]
  with_items: "{{ remove_compute_info | dict2items }}"

- name: Set variable based on Slurm version
  ansible.builtin.set_fact:
    slurm_topology_syntax: >-
      {% set major = slurm_version.split('.')[0]|int %}
      {% if major < 25 %}{% else %}Node={% endif %}

- name: Remove nodes from current topology before adding them
  block:
    - name: Debug
      ansible.builtin.debug:
        var: remove_compute_info
    - name: Create a list of hostnames to remove
      ansible.builtin.set_fact:
        hostnames_list: "{{ remove_compute_info | dict2items | map(attribute='value.hostname') | list }}"
    - name: Debug
      ansible.builtin.debug:
        var: hostnames_list

 # get Info from the Rack Switches
    - name: Get RackLine
      ansible.builtin.shell: "scontrol show hostname `scontrol show topology {{slurm_topology_syntax}}{{ item }} | grep Level=0 | rev | cut -d \"=\" -f 1 | rev`"
      register: current_switch
      run_once: true
      with_items: "{{ hostnames_list }}"

    - name: GetNodes
      ansible.builtin.set_fact:
        rem_nodes_on_switch: "{{ rem_nodes_on_switch | default({}) | combine({item.item: item.stdout_lines}) }}"
      with_items: "{{ current_switch.results }}"
      run_once: true
      when: ( item.stdout_lines | length ) > 0

    - name: GetNodes
      ansible.builtin.set_fact:
        rem_nodes_on_switch: "{{ rem_nodes_on_switch | default({}) | combine({item.item: []}) }}"
      with_items: "{{ current_switch.results }}"
      run_once: true
      when: (item.stdout_lines | length) == 0

    - name: Get SwitchNames
      ansible.builtin.shell: "scontrol show topology {{slurm_topology_syntax}}{{ item }} | grep Level=0 | awk '{print $1}' | cut -d \"=\" -f 2"
      register: current_switchName
      run_once: true
      with_items: "{{ hostnames_list }}"

    - name: Get Switchname
      ansible.builtin.set_fact:
        rem_switchnames_dict: "{{ rem_switchnames_dict | default({}) | combine({item.item: item.stdout}) }}"
      with_items: "{{ current_switchName.results }}"
      run_once: true
      when: (item.stdout_lines | length) > 0

    - name: Get Switchname
      ansible.builtin.set_fact:
        rem_switchnames_dict: "{{ rem_switchnames_dict | default({}) | combine({item.item: \"\"}) }}"
      with_items: "{{ current_switchName.results }}"
      run_once: true
      when: (item.stdout_lines | length) == 0

    - name: Build a dict of the racks including nodes to remove
      ansible.builtin.set_fact:
        rem_racks_dict: "{{ rem_racks_dict | default({}) | combine({rem_switchnames_dict[item]: rem_nodes_on_switch[item]}) }}"
      with_items: "{{ hostnames_list }}"
      run_once: true

    - name: Create an empty rem_racks_dict list
      ansible.builtin.set_fact:
        rem_racks_dict: "{{ rem_racks_dict | default({}) }}"
      run_once: true

    - name: Build a list of unique rem_switchnames
      ansible.builtin.set_fact:
        rem_switchnames: "{{ rem_racks_dict.keys() | default([]) | list | unique }}"
      run_once: true

 # get Info from the Network Block Switches

    - name: Get Network Block line
      ansible.builtin.shell: "scontrol show hostname `scontrol show topology {{slurm_topology_syntax}}{{ item }} | grep Level=1 | rev | cut -d \"=\" -f 1 | rev`"
      register: current_nb
      run_once: true
      with_items: "{{ hostnames_list }}"

    - name: GetSwitches
      ansible.builtin.set_fact:
        rem_switches_on_nb: "{{ rem_switches_on_nb | default({}) | combine({item.item: item.stdout_lines}) }}"
      with_items: "{{ current_nb.results }}"
      run_once: true
      when: (item.stdout_lines | length) > 0

    - name: GetSwitches
      ansible.builtin.set_fact:
        rem_switches_on_nb: "{{ rem_switches_on_nb | default({}) | combine({item.item: []}) }}"
      with_items: "{{ current_nb.results }}"
      run_once: true
      when: (item.stdout_lines | length) == 0

    - name: Get NetworkBlock Name
      ansible.builtin.shell: "scontrol show topology {{slurm_topology_syntax}}{{ item }} | grep Switches= | grep Level=1 | awk '{print $1}' | cut -d \"=\" -f 2"
      register: current_NetworkBlockName
      run_once: true
      with_items: "{{ hostnames_list }}"

    - name: Get NetworkBlock Name
      ansible.builtin.set_fact:
        rem_rem_networkblocknames_dict: "{{ rem_rem_networkblocknames_dict | default({}) | combine({item.item: item.stdout}) }}"
      with_items: "{{ current_NetworkBlockName.results }}"
      run_once: true
      when: (item.stdout_lines | length) > 0

    - name: Get NetworkBlock Name
      ansible.builtin.set_fact:
        rem_rem_networkblocknames_dict: "{{ rem_rem_networkblocknames_dict | default({}) | combine({item.item: \"\"}) }}"
      with_items: "{{ current_NetworkBlockName.results }}"
      run_once: true
      when: (item.stdout_lines | length) == 0

    - name: Build a dict of the nbs including nodes to remove
      ansible.builtin.set_fact:
        rem_nb_dict: "{{ rem_nb_dict | default({}) | combine({rem_rem_networkblocknames_dict[item]: rem_switches_on_nb[item]}) }}"
      with_items: "{{ hostnames_list }}"
      run_once: true

    - name: Create an empty rem_nb_dict list
      ansible.builtin.set_fact:
        rem_nb_dict: "{{ rem_nb_dict | default({}) }}"
      run_once: true

    - name: Build a list of unique rem_switchnames
      ansible.builtin.set_fact:
        rem_networkblocknames: "{{ rem_nb_dict.keys() | default([]) | list | unique }}"
      run_once: true

 # get Info from the Cluster Switches

    - name: Get Cluster line
      ansible.builtin.shell: "scontrol show hostname `scontrol show topology {{slurm_topology_syntax}}{{ item }} | grep Level=2 | rev | cut -d \"=\" -f 1 | rev`"
      register: current_cluster
      run_once: true
      with_items: "{{ hostnames_list }}"

    - name: GetNBs
      ansible.builtin.set_fact:
        nb_on_cluster: "{{ nb_on_cluster | default({}) | combine({item.item: item.stdout_lines}) }}"
      with_items: "{{ current_cluster.results }}"
      run_once: true
      when: (item.stdout_lines | length) > 0

    - name: GetNBs
      ansible.builtin.set_fact:
        nb_on_cluster: "{{ nb_on_cluster | default({}) | combine({item.item: []}) }}"
      with_items: "{{ current_cluster.results }}"
      run_once: true
      when: (item.stdout_lines | length) == 0

    - name: Get Cluster Name
      ansible.builtin.shell: "scontrol show topology {{slurm_topology_syntax}}{{ item }} | grep Switches= | grep Level=2 | awk '{print $1}' | cut -d \"=\" -f 2"
      register: current_ClusterName
      run_once: true
      with_items: "{{ hostnames_list }}"

    - name: Get Cluster Name
      ansible.builtin.set_fact:
        rem_clusternames_dict: "{{ rem_clusternames_dict | default({}) | combine({item.item: item.stdout}) }}"
      with_items: "{{ current_ClusterName.results }}"
      run_once: true
      when: (item.stdout_lines | length) > 0

    - name: Get Cluster Name
      ansible.builtin.set_fact:
        rem_clusternames_dict: "{{ rem_clusternames_dict | default({}) | combine({item.item: \"\"}) }}"
      with_items: "{{ current_ClusterName.results }}"
      run_once: true
      when: (item.stdout_lines | length) == 0

    - name: Build a dict of the clusters including nodes to remove
      ansible.builtin.set_fact:
        rem_cluster_dict: "{{ rem_cluster_dict | default({}) | combine({rem_clusternames_dict[item]: nb_on_cluster[item]}) }}"
      with_items: "{{ hostnames_list }}"
      run_once: true

    - name: Create an empty rem_cluster_dict
      ansible.builtin.set_fact:
        rem_cluster_dict: "{{ rem_cluster_dict | default({}) }}"
      run_once: true

    - name: Build a list of unique rem_switchnames
      ansible.builtin.set_fact:
        rem_clusternames: "{{ rem_cluster_dict.keys() | list | unique }}"
      run_once: true

    - name: Debug rem_switchnames
      ansible.builtin.debug:
        var: rem_switchnames

    - name: Debug rem_racks_dict
      ansible.builtin.debug:
        var: rem_racks_dict

    - name: Debug rem_networkblocknames
      ansible.builtin.debug:
        var: rem_networkblocknames

    - name: Debug rem_nb_dict
      ansible.builtin.debug:
        var: rem_nb_dict

    - name: Debug rem_clusternames
      ansible.builtin.debug:
        var: rem_clusternames

    - name: Debug rem_cluster_dict
      ansible.builtin.debug:
        var: rem_cluster_dict

# Find which Racks need to be removed
# List all racks from the hosts to remove and check if theyre are nodes left

    - name: Create empty list
      ansible.builtin.set_fact:
        switchname_to_remove: []
      run_once: true

    - name: Create a list of rem_switchnames to remove
      ansible.builtin.set_fact:
        switchname_to_remove: "{{ switchname_to_remove | default([]) + [item] | unique }}"
      with_items: "{{ rem_switchnames }}"
      when: ((rem_racks_dict[item] | difference(hostnames_list) | length) < 1)
      run_once: true

    - name: Remove line from topology
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sNodes=.*"
        state: absent
      with_items: "{{ switchname_to_remove }}"
      run_once: true
      notify: Reconfigure slurm

    - name: Generate rem_nodes_on_switch_condensed
      ansible.builtin.command: "scontrol show hostlistsorted {{ rem_racks_dict[item] | difference(hostnames_list) | join(',') }}"
      register: switch_condensed
      with_items: "{{ rem_switchnames }}"
      when: ((rem_racks_dict[item] | difference(hostnames_list) | length) > 0)
      run_once: true

    - name: Get condensed_Nodes
      ansible.builtin.set_fact:
        rem_nodes_on_switch_condensed: "{{ rem_nodes_on_switch_condensed | default({}) | combine({item.item: item.stdout}) }}"
      with_items: "{{ switch_condensed.results }}"
      when: ((rem_racks_dict[item.item] | difference(hostnames_list) | length) > 0)
      run_once: true
      ignore_errors: true

    - name: Debug rem_nodes_on_switch_condensed
      ansible.builtin.debug:
        var: rem_nodes_on_switch_condensed
      when: rem_nodes_on_switch_condensed is defined
    - name: Remove node from line
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sNodes.*"
        line: "SwitchName={{ item }} Nodes={{ rem_nodes_on_switch_condensed[item] }}"
        state: present
      with_items: "{{ rem_switchnames }}"
      ignore_errors: true
      when: ((rem_racks_dict[item] | difference(hostnames_list) | length) > 0)
      run_once: true
      notify: Reconfigure slurm

# Find which Network Blocks need to be removed
# List all Network Blocks from the hosts to remove and check if theyre are racks left

    - name: Create empty list
      ansible.builtin.set_fact:
        rem_networkblocknames_to_remove: []
      run_once: true

    - name: Create a list of rem_networkblocknames to remove
      ansible.builtin.set_fact:
        rem_networkblocknames_to_remove: "{{ rem_networkblocknames_to_remove | default([]) + [item] | unique }}"
      with_items: "{{ rem_networkblocknames }}"
      when: ((rem_nb_dict[item] | difference(switchname_to_remove) | length) < 1)
      run_once: true

    - name: Remove line from topology
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sSwitches=.*"
        state: absent
      with_items: "{{ rem_networkblocknames_to_remove }}"
      run_once: true
      notify: Reconfigure slurm

    - name: Get condensed_Nodes
      ansible.builtin.set_fact:
        racks_on_nb_condensed: "{{ racks_on_nb_condensed | default({}) | combine({item: rem_nb_dict[item] | difference(switchname_to_remove) | join(',')}) }}"
      with_items: "{{ rem_networkblocknames }}"
      when: ((rem_nb_dict[item] | difference(switchname_to_remove) | length) > 0)
      run_once: true
      ignore_errors: true

    - name: Debug racks_on_nb_condensed
      ansible.builtin.debug:
        var: racks_on_nb_condensed

    - name: Remove node from line
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sSwitches.*"
        line: "SwitchName={{ item }} Switches={{ racks_on_nb_condensed[item] }}"
        state: present
      with_items: "{{ rem_networkblocknames }}"
      ignore_errors: true
      when: ((rem_nb_dict[item] | difference(switchname_to_remove) | length) > 0)
      run_once: true
      notify: Reconfigure slurm

# Find which Network Blocks need to be removed
# List all Network Blocks from the hosts to remove and check if theyre are racks left

    - name: Create empty list
      ansible.builtin.set_fact:
        clusternames_to_remove: []
      run_once: true

    - name: Create a list of clusternames to remove
      ansible.builtin.set_fact:
        clusternames_to_remove: "{{ clusternames_to_remove | default([]) + [item] | unique }}"
      with_items: "{{ rem_clusternames }}"
      when: ((rem_cluster_dict[item] | difference(rem_networkblocknames_to_remove) | length) < 1)
      run_once: true

    - name: Remove line from topology
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sSwitches=.*"
        state: absent
      with_items: "{{ clusternames_to_remove }}"
      run_once: true
      notify: Reconfigure slurm

    - name: Get condensed_Nodes
      ansible.builtin.set_fact:
        nbs_on_cluster_condensed: "{{ nbs_on_cluster_condensed | default({}) | combine({item: rem_cluster_dict[item] | difference(rem_networkblocknames_to_remove)
          | join(',')}) }}"
      with_items: "{{ rem_clusternames }}"
      when: ((rem_cluster_dict[item] | difference(rem_networkblocknames_to_remove) | length) > 0)
      run_once: true
      ignore_errors: true

    - name: Debug nbs_on_cluster_condensed
      ansible.builtin.debug:
        var: nbs_on_cluster_condensed

    - name: Remove node from line
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sSwitches.*"
        line: "SwitchName={{ item }} Switches={{ nbs_on_cluster_condensed[item] }}"
        state: present
      with_items: "{{ rem_clusternames }}"
      ignore_errors: true
      when: ((rem_cluster_dict[item] | difference(rem_networkblocknames_to_remove) | length) > 0)
      run_once: true
      notify: Reconfigure slurm

- name: Add nodes to current topology if they are on-demand
  block:
    - name: Check if the node's partition has an inactive switch in topology
      ansible.builtin.shell: "cat {{ slurm_conf_path }}/topology.conf | grep 'SwitchName={{ item.value.slurm_partition }}:inactive'"
      register: partition_has_inactive
      delegate_to: 127.0.0.1
      run_once: true
      with_items: "{{ remove_compute_info | dict2items }}"
      ignore_errors: true

    - name: Check if the node is already in the inactive switch
      ansible.builtin.shell: "sudo scontrol show topology {{slurm_topology_syntax}}{{ item.item.value.hostname }} | grep Switches= | grep {{ item.item.value.slurm_partition }}:inactive"
      register: ondemand_nodes
      run_once: true
      with_items: "{{ partition_has_inactive.results }}"
      when: item.rc == 0
      ignore_errors: true

    - name: Build list of nodes that need to be added to inactive switch
      ansible.builtin.set_fact:
        ondemand_node_dict: "{{ ondemand_node_dict | default({}) | combine({item.item.item.value.hostname: item.item.item.value}) }}"
      with_items: "{{ ondemand_nodes.results }}"
      when:
        - item.item.rc == 0
        - item.rc != 0 or (item.stdout | length) == 0

    - name: Add nodes to current topology if they need to be added to inactive
      when: ondemand_node_dict is defined and ondemand_node_dict.keys() | length > 0
      block:
      # Build dictionaries of cluster the list of nodes.

        - name: Build dictionary of racks to add
          ansible.builtin.set_fact:
            rack_dict: "{{ rack_dict | default({}) | combine({rack_name: (rack_dict[rack_name] | default([])) + [ondemand_node_dict[item].hostname] | unique}) }}"
          vars:
            rack_name: "{{ ondemand_node_dict[item].slurm_partition }}:inactive"
          with_items: "{{ ondemand_node_dict.keys() | list }}"

        - name: Get list of parent clusters to update
          ansible.builtin.set_fact:
            parent_clusters: "{{ parent_clusters | default([]) | union([ondemand_node_dict[item].slurm_partition]) | unique }}"
          with_items: "{{ ondemand_node_dict.keys() | list }}"

        - name: Get current nodes in Switch
          ansible.builtin.shell: "cat {{ slurm_conf_path }}/topology.conf | grep \"SwitchName={{ item }} \""
          register: nodes_in_switch
          delegate_to: 127.0.0.1
          run_once: true
          with_items: "{{ rack_dict.keys() | list }}"
          ignore_errors: true

        - name: Get current nodes in Switch hostlist
          vars:
            switch_line: "{{ item.stdout }}"
            nodes_part: "{{ switch_line.split('Nodes=')[1] }}"
            switch_list_condensed: "{{ nodes_part.split('Switches=')[0].strip() }}"
          ansible.builtin.command: "scontrol show hostname {{ switch_list_condensed }}"
          register: switch_hostlist
          delegate_to: 127.0.0.1
          with_items: "{{ nodes_in_switch.results }}"
          when: item.rc == 0

        - name: Get hostlist if switch exists
          ansible.builtin.command: "scontrol show hostlistsorted {{ item.stdout_lines | union(rack_dict[item.item.item] | list | unique) | join(',') }}"
          register: rack_hostlist1
          delegate_to: 127.0.0.1
          with_items: "{{ switch_hostlist.results }}"
          run_once: true
          when: item.item.rc == 0

        - name: Get hostlist if switch does not exists
          ansible.builtin.command: "scontrol show hostlistsorted {{ rack_dict[item.item.item] | list | unique | join(',') }}"
          register: rack_hostlist2
          delegate_to: 127.0.0.1
          with_items: "{{ switch_hostlist.results }}"
          run_once: true
          when: item.item.rc > 0

        - name: Get Nodes on switch if switch exists
          ansible.builtin.set_fact:
            nodes_on_switches: "{{ nodes_on_switches | default({}) | combine({item.item.item.item: item.stdout}) }}"
          with_items: "{{ rack_hostlist1.results }}"
          run_once: true
          delegate_to: 127.0.0.1
          when: item.item.item.rc == 0

        - name: Get Nodes on switch if switch does not exists
          ansible.builtin.set_fact:
            nodes_on_switches: "{{ nodes_on_switches | default({}) | combine({item.item.item.item: item.stdout}) }}"
          with_items: "{{ rack_hostlist2.results }}"
          run_once: true
          delegate_to: 127.0.0.1
          when: item.item.item.rc > 0

        - name: Add the nodes in the rack switches
          become: true
          ansible.builtin.lineinfile:
            path: "{{ slurm_conf_path }}/topology.conf"
            regexp: "SwitchName={{ item.item.item }}\\s+Nodes.*"
            line: "SwitchName={{ item.item.item }} Nodes={{ nodes_on_switches[item.item.item] }}"
            state: present
          run_once: true
          with_items: "{{ switch_hostlist.results }}"
          delegate_to: 127.0.0.1
          notify: Reconfigure slurm

        # Update parent switches to remove references to now-empty sub-switches
        - name: Check if parent cluster has any active sub-switches with nodes
          ansible.builtin.shell: |
            # Check if there are any non-inactive sub-switches for this partition that have nodes
            grep "^SwitchName={{ item }}:" {{ slurm_conf_path }}/topology.conf | grep -v ":inactive" | grep "Nodes=" | grep -v "^$" || echo "NO_ACTIVE_NODES"
          register: parent_active_switches
          delegate_to: 127.0.0.1
          run_once: true
          with_items: "{{ parent_clusters }}"
          changed_when: false

        - name: Update parent switch to only reference inactive when no active nodes exist
          become: true
          ansible.builtin.lineinfile:
            path: "{{ slurm_conf_path }}/topology.conf"
            regexp: "^SwitchName={{ item.item }}\\s+Switches.*"
            line: "SwitchName={{ item.item }} Switches={{ item.item }}:inactive"
            state: present
          run_once: true
          with_items: "{{ parent_active_switches.results }}"
          delegate_to: 127.0.0.1
          when: item.stdout == "NO_ACTIVE_NODES"
          notify: Reconfigure slurm
        - name: Update parent switch to reference both inactive and active when active nodes exist
          become: true
          ansible.builtin.shell: |
            # Get all child switches for this partition
            children=$(grep "^SwitchName={{ item.item }}:" {{ slurm_conf_path }}/topology.conf | sed 's/SwitchName=\([^ ]*\) .*/\1/' | tr '\n' ',' | sed 's/,$//')
            if [ -n "$children" ]; then
              # Update the parent switch line
              sed -i "s|^SwitchName={{ item.item }}\\s\\+Switches=.*|SwitchName={{ item.item }} Switches=$children|" {{ slurm_conf_path }}/topology.conf
            fi
          with_items: "{{ parent_active_switches.results }}"
          delegate_to: 127.0.0.1
          when: item.stdout != "NO_ACTIVE_NODES"
          notify: Reconfigure slurm


- name: Change Node Status
  become: true
  ansible.builtin.command: "scontrol delete nodename={{ item }}"
  ignore_errors: true
  with_items: "{{ hostnames_list }}"
  when: ('controller' in group_names)

- name: Reconfigure slurm
  become: true
  ansible.builtin.command: "scontrol reconfigure"
  register: result
  until: result is not failed
  retries: 5
  delay: 5
