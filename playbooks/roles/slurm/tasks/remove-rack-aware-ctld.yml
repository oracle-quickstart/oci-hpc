---
- name: Remove from the gres.conf file on the controller.
  become: true
  ansible.builtin.blockinfile:
    path: "{{ slurm_conf_path }}/gres.conf"
    marker: "### {mark} {{ remove_compute_info[item].hostname }}"
    state: absent
  when: "'GPU' in remove_compute_info[item].shape"
  with_items: "{{ remove_compute_info }}"

- name: Remove nodes from current topology
  block:
    - name: Create a list of hostnames to remove
      ansible.builtin.set_fact:
        hostnames_list: "{{ remove_compute_info | dict2items | map(attribute='value.hostname') | list }}"

    - name: Get RackLine
      ansible.builtin.shell: "scontrol show hostname `scontrol show topology {{item}} | grep -v Switches= | rev | cut -d \"=\" -f 1 | rev`"
      register: current_switch
      run_once: true
      with_items: "{{hostnames_list}}"

    - name: GetNodes
      ansible.builtin.set_fact:
        nodes_on_switch: "{{ nodes_on_switch | default({}) | combine({item.item: item.stdout_lines}) }}"
      with_items: "{{current_switch.results}}"
      run_once: true
      when: ( item.stdout_lines | length ) > 0

    - name: GetNodes
      ansible.builtin.set_fact:
        nodes_on_switch: "{{ nodes_on_switch | default({}) | combine({item.item: []}) }}"
      with_items: "{{current_switch.results}}"
      run_once: true
      when: ( item.stdout_lines | length ) == 0

    - name: Get SwitchNames
      ansible.builtin.shell: "scontrol show topology {{item}} | grep -v Switches= | awk '{print $1}' | cut -d \"=\" -f 2"
      register: current_switchName
      run_once: true
      with_items: "{{hostnames_list}}"

    - name: Get Switchname
      ansible.builtin.set_fact:
        switchnames: "{{ switchnames | default({}) | combine({item.item: item.stdout}) }}"
      with_items: "{{current_switchName.results}}"
      run_once: true
      when: ( item.stdout_lines | length ) > 0

    - name: Get Switchname
      ansible.builtin.set_fact:
        switchnames: "{{ switchnames | default({}) | combine({item.item: \"\"}) }}"
      with_items: "{{current_switchName.results}}"
      run_once: true
      when: ( item.stdout_lines | length ) == 0

    - name: Get UpperSwitchNames
      ansible.builtin.shell: "scontrol show topology {{item}} | grep Switches= | grep Level=1 | awk '{print $1}' | cut -d \"=\" -f 2"
      register: current_UpperSwitchName
      run_once: true
      with_items: "{{hostnames_list}}"

    - name: Get UpperSwitchName
      ansible.builtin.set_fact:
        upperswitchnames: "{{ upperswitchnames | default({}) | combine({item.item: item.stdout}) }}"
      with_items: "{{current_UpperSwitchName.results}}"
      run_once: true
      when: ( item.stdout_lines | length ) > 0

    - name: Get UpperSwitchName
      ansible.builtin.set_fact:
        upperswitchnames: "{{ upperswitchnames | default({}) | combine({item.item: \"\"}) }}"
      with_items: "{{current_UpperSwitchName.results}}"
      run_once: true
      when: ( item.stdout_lines | length ) == 0

    - name: Create a list of hostnames to remove
      ansible.builtin.set_fact:
        switchname_to_remove: "{{ switchname_to_remove | default([]) + [switchnames[item]] | unique }}"
      with_items: "{{hostnames_list}}"
      when: ( ( nodes_on_switch[item] | difference(hostnames_list) | length ) < 2 ) and ( switchnames[item] | length ) > 1
      run_once: true

    - name: Create a list of hostnames to remove
      ansible.builtin.set_fact:
        switchname_to_remove: "{{ switchname_to_remove | default([]) | unique }}"
      run_once: true

    - name: Remove line from topology
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sNodes=.*"
        state: absent
      with_items: "{{switchname_to_remove}}"
      run_once: true

    - name: Get other racks on switch
      ansible.builtin.shell: "scontrol show topology {{upperswitchnames[item]}} | grep Switches= "
      register: racks_on_switch
      run_once: true
      with_items: "{{hostnames_list}}"
      ignore_errors: true

    - name: GetRacks
      ansible.builtin.set_fact:
        racks_on_switch_dict: "{{ racks_on_switch_dict | default({}) | combine({item.item: item.stdout.split('Switches=')[1].split(',')}) }}"
      with_items: "{{racks_on_switch.results}}"
      run_once: true
      when: ( item.stdout | length ) > 0

    - name: GetRacks
      ansible.builtin.set_fact:
        racks_on_switch_dict: "{{ racks_on_switch_dict | default({}) | combine({item.item: []}) }}"
      with_items: "{{racks_on_switch.results}}"
      run_once: true
      when: ( item.stdout | length ) == 0

    - name: Change upper switch line from topology line
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ upperswitchnames[item] }}\\sSwitches.*"
        line: "SwitchName={{ upperswitchnames[item] }} Switches={{ racks_on_switch_dict[item] | difference(switchname_to_remove) | join(',') }}"
        state: present
      with_items: "{{hostnames_list}}"
      ignore_errors: true
      when: ( racks_on_switch_dict[item] | difference(switchname_to_remove) | length ) > 0 and ( upperswitchnames[item] | length ) > 1
      run_once: true

    - name: Remove line from topology
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ upperswitchnames[item] }}\\sSwitches.*"
        state: absent
      with_items: "{{hostnames_list}}"
      when: ( ( racks_on_switch_dict[item] | difference(switchname_to_remove) | length ) == 0 ) and ( upperswitchnames[item] | length ) > 1
      run_once: true

    - name: Generate nodes_on_switch_condensed
      ansible.builtin.command: "scontrol show hostlistsorted {{nodes_on_switch[item] | difference(hostnames_list) | join(',')}}"
      register: switch_condensed
      with_items: "{{hostnames_list}}"
      when: ( ( nodes_on_switch[item] | difference(hostnames_list) | length ) > 0 ) and ( switchnames[item] | length ) > 1
      run_once: true

    - name: Get condensed_Nodes
      ansible.builtin.set_fact:
        nodes_on_switch_condensed: "{{ nodes_on_switch_condensed | default({}) | combine({item.item: item.stdout}) }}"
      with_items: "{{switch_condensed.results}}"
      when: ( ( nodes_on_switch[item.item] | difference(hostnames_list) | length ) > 0 ) and ( switchnames[item.item] | length ) > 1
      run_once: true
      ignore_errors: true

    - name: Remove node from topology line
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ switchnames[item] }}\\sNodes.*"
        line: "SwitchName={{ switchnames[item] }} Nodes={{ nodes_on_switch_condensed[item] }}"
        state: present
      with_items: "{{hostnames_list}}"
      ignore_errors: true
      when: ( ( nodes_on_switch[item] | difference(hostnames_list) | length ) > 0 ) and ( switchnames[item] | length ) > 1
      run_once: true

- name: Add nodes to current topology if they are on-demand
  block:
    - name: Check if the node is on-demand
      ansible.builtin.shell: "sudo scontrol show topology {{remove_compute_info[item].hostname}} | grep Switches= | grep {{remove_compute_info[item].cluster_name}}:inactive"
      register: ondemand_nodes
      run_once: true
      with_items: "{{remove_compute_info}}"
      ignore_errors: true

    - name: Build empty list of on-demand nodes
      ansible.builtin.set_fact:
        ondemand_node_dict: "{{ ondemand_node_dict | default({}) }}"
      with_items: "{{ ondemand_nodes.results }}"
      when: ( item.stdout | length ) == 0

    - name: Build list of on-demand nodes
      ansible.builtin.set_fact:
        ondemand_node_dict: "{{ ondemand_node_dict | default({}) | combine({item.item: remove_compute_info[item.item]}) }}"
      with_items: "{{ ondemand_nodes.results }}"
      when: ( item.stdout | length ) > 0

    - name: Build dictionary of unique switches names
      ansible.builtin.set_fact:
        cluster_names: "[]"
      run_once: true

    - name: Build dictionary of unique switches names
      ansible.builtin.set_fact:
        cluster_names: "{{ (cluster_names | default([]) + [ondemand_node_dict[item].cluster_name]) | list }}"
      with_items: "{{ ondemand_node_dict }}"

    - name: Build dictionary of unique switches names
      ansible.builtin.set_fact:
        unique_switches_with_hostnames: "{}"
      run_once: true

    - name: Build dictionary of unique switches names
      ansible.builtin.set_fact:
        unique_switches_with_hostnames: "{{ unique_switches_with_hostnames | default({}) | combine({pair_key: (unique_switches_with_hostnames[pair_key] | default([]))
          + [ondemand_node_dict[item].hostname]}) }}"
      vars:
        pair_key: "{{ ondemand_node_dict[item].cluster_name }}:inactive"
      with_items: "{{ ondemand_node_dict }}"

    - name: Get rackIDs for all compute nodes
      ansible.builtin.set_fact:
        racks_to_add_temp: "{{ ondemand_node_dict[item].cluster_name }}:inactive"
      with_items: "{{ ondemand_node_dict }}"
      run_once: true
      register: racks_to_add_temp_results

    - name: Make a list of racks to add
      ansible.builtin.set_fact: racks_to_add="[]"
      run_once: true
      when: unique_switches_with_hostnames == "{}"

    - name: Make a list of racks to add
      ansible.builtin.set_fact: racks_to_add="{{unique_switches_with_hostnames.keys()}}"
      run_once: true
      when: unique_switches_with_hostnames != "{}"

    - name: Get current nodes in Switch
      ansible.builtin.shell: "cat {{ slurm_conf_path }}/topology.conf | grep \"{{item}}\" | grep Nodes="
      register: nodes_in_switch
      delegate_to: 127.0.0.1
      run_once: true
      with_items: "{{racks_to_add}}"
      ignore_errors: true

    - name: Get current nodes in Switch hostlist
      vars:
        switch_list_condensed: "{{ item.stdout.split('Nodes=')[1] }}"
      ansible.builtin.command: "scontrol show hostname {{switch_list_condensed }}"
      register: switch_hostlist
      delegate_to: 127.0.0.1
      with_items: "{{nodes_in_switch.results}}"
      when: item.rc == 0

    - name: Get hostlist if switch exists
      ansible.builtin.command: "scontrol show hostlistsorted {{ item.stdout_lines | union (unique_switches_with_hostnames[item.item.item] | list) | join(',') }}"
      register: rack_hostlist1
      delegate_to: 127.0.0.1
      with_items: "{{switch_hostlist.results}}"
      run_once: true
      when: item.item.rc == 0

    - name: Get hostlist if switch does not exists
      ansible.builtin.command: "scontrol show hostlistsorted {{ unique_switches_with_hostnames[item.item.item] | list | join(',') }}"
      register: rack_hostlist2
      delegate_to: 127.0.0.1
      with_items: "{{switch_hostlist.results}}"
      run_once: true
      when: item.item.rc > 0

    - name: Get Nodes on switch if switch exists
      ansible.builtin.set_fact:
        nodes_on_switches: "{{ nodes_on_switches | default({}) | combine({item.item.item.item: item.stdout}) }}"
      with_items: "{{rack_hostlist1.results}}"
      run_once: true
      delegate_to: 127.0.0.1
      when: item.item.item.rc== 0

    - name: Get Nodes on switch if switch does not exists
      ansible.builtin.set_fact:
        nodes_on_switches: "{{ nodes_on_switches | default({}) | combine({item.item.item.item: item.stdout}) }}"
      with_items: "{{rack_hostlist2.results}}"
      run_once: true
      delegate_to: 127.0.0.1
      when: item.item.item.rc > 0

    - name: Add the nodes in the rack switches
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item.item.item }}\\sNodes.*"
        line: "SwitchName={{ item.item.item }} Nodes={{ nodes_on_switches[item.item.item] }}"
        state: present
      run_once: true
      with_items: "{{switch_hostlist.results}}"
      delegate_to: 127.0.0.1
      notify: Reconfigure slurm

    - name: Create empty list of racks
      ansible.builtin.set_fact:
        racks_left_list: "{{ racks_left_list | default({}) | combine({item: []}) }}"
      with_items: "{{cluster_names}}"

    - name: Get Racks from topology.conf
      ansible.builtin.shell: "cat {{ slurm_conf_path }}/topology.conf | grep Nodes= | grep \"SwitchName={{item}}:\" | awk '{print $1}' | sed 's/SwitchName=//' | tr
        '\n' ',' | sed 's/,$/\\n/'"
      register: racks_left
      run_once: true
      delegate_to: 127.0.0.1
      ignore_errors: true
      with_items: "{{cluster_names}}"

    - name: Create list of racks
      ansible.builtin.set_fact:
        racks_left_list: "{{ racks_left_list | combine({item.item: item.stdout_lines}) }}"
      with_items: "{{racks_left.results}}"

    - name: Debug list of racks
      ansible.builtin.debug:
        var: racks_left_list
      with_items: "{{racks_left.results}}"

    - name: Update Rack switches for the cluster
      become: true
      ansible.builtin.lineinfile:
        path: "{{ slurm_conf_path }}/topology.conf"
        regexp: "SwitchName={{ item }}\\sSwitches.*"
        line: "SwitchName={{ item }} Switches={{ racks_left_list[item] | join(',') }}"
        state: present
      run_once: true
      delegate_to: 127.0.0.1
      notify: Reconfigure slurm
      when: racks_left_list[item] | length > 0
      with_items: "{{cluster_names}}"

- name: Change Node Status
  become: true
  ansible.builtin.command: "scontrol delete nodename={{ item }}"
  ignore_errors: true
  with_items: "{{hostnames_list}}"
  when: ('controller' in group_names)

- name: Reconfigure slurm
  become: true
  ansible.builtin.command: "scontrol reconfigure"
  register: result
  until: result is not failed
  retries: 5
  delay: 5
