---
slurm_conf_path: "/etc/slurm"
slurm_log_path: "/var/log/slurm"
slurm_exec: "/usr"
slurm_conf_file: slurm.conf.j2
slurmdbd_conf_file: slurmdbd.conf.j2

cgroup_conf_file: cgroup.conf

munge_packages:
  - munge
  - munge-libs
  - munge-devel

slurm_all_packages:
  - "slurm-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-devel-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-contribs-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-perlapi-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-torque-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-openlava-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-slurmctld-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-slurmdbd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-pam_slurm-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-libpmi-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-slurmd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-sackd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "slurm-slurmrestd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

slurm_common_packages:
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-devel-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-contribs-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-perlapi-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-torque-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-openlava-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

slurm_server_packages:
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-slurmctld-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-slurmdbd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-slurmrestd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

slurm_compute_packages:
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-pam_slurm-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-libpmi-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-slurmd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

slurm_backup_server_packages:
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-slurmctld-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-pam_slurm-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-libpmi-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-slurmd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

slurm_login_packages:
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-pam_slurm-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-libpmi-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-sackd-{{slurm_version}}.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

pmix_download_packages:
  - "pmix-4.2.9-1.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "pmix-devel-4.2.9-1.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

pmix_packages:
  - "{{ slurm_nfs_path }}/slurm_rpms/pmix-4.2.9-1.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/pmix-devel-4.2.9-1.el{{ansible_distribution_major_version}}.{{ansible_architecture}}.rpm"

slurm_repos: "{% if ansible_distribution_major_version == '8' %}ol8_developer_EPEL,ol8_codeready_builder{% elif ansible_distribution_major_version == '9' %}ol9_developer_EPEL,ol9_codeready_builder{%
  else%}epel,ol7_developer_EPEL{% endif %}"
