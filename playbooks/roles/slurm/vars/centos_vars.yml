  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-centos-libpmi-{{ slurm_version }}.el7.{{ ansible_facts['architecture'] }}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/slurm-centos-sackd-{{ slurm_version }}.el7.{{ ansible_facts['architecture'] }}.rpm"

pmix_download_packages:
  - "pmix-centos-3.2.4-1.el{{ ansible_facts['distribution_major_version'] }}.{{ ansible_facts['architecture'] }}.rpm"
  - "pmix-centos-devel-3.2.4-1.el{{ ansible_facts['distribution_major_version'] }}.{{ ansible_facts['architecture'] }}.rpm"

pmix_packages:
  - "{{ slurm_nfs_path }}/slurm_rpms/pmix-centos-3.2.4-1.el{{ ansible_facts['distribution_major_version'] }}.{{ ansible_facts['architecture'] }}.rpm"
  - "{{ slurm_nfs_path }}/slurm_rpms/pmix-centos-devel-3.2.4-1.el{{ ansible_facts['distribution_major_version'] }}.{{ ansible_facts['architecture'] }}.rpm"
