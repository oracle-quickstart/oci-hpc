
- name: restart slurm server
  become: true
  service:
    name: '{{ item }}'
    state: restarted
    enabled: true
  with_items:
    - slurmdbd
    - slurmctld
  register: result
  until: result is not failed
  retries: 5
  delay: 5

- name: restart slurm
  become: true
  service: 
    name: '{{ item }}'
    state: restarted
    enabled: true
  with_items: 
    - slurmd
  register: result
  until: result is not failed
  retries: 5
  delay: 5

- name: restart munge
  become: true
  service:
    name: munge
    state: restarted
    enabled: true

- name: reconfigure slurm
  become: true
  command: "scontrol reconfigure"
  delegate_to: 127.0.0.1
  register: result
  until: result is not failed
  retries: 5
  delay: 5