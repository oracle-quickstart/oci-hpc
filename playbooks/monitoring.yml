- hosts: all,!monitoring
  gather_facts: true
  tasks: 
    - include_role: 
        name: metrics-exporter
      when: cluster_monitoring|default(false)|bool

- hosts: monitoring
  gather_facts: true
  tasks: 
    - include_role: 
        name: grafana
      when: cluster_monitoring|default(false)|bool and ( groups['monitoring'] | length > 0 ) 

- hosts: controller
  tasks: 
    - include_role: 
        name: grafana
      when: cluster_monitoring|default(false)|bool and ( groups['monitoring'] | length == 0 ) 

- hosts: monitoring
  tasks: 
    - include_role: 
        name: oci-metrics-telegraf
      when: cluster_monitoring|default(false)|bool and ( groups['monitoring'] | length > 0 ) and ( (metrics_stream_ocid | default('')) | length > 0 )

- hosts: controller
  tasks: 
    - include_role: 
        name: oci-metrics-telegraf
      when: cluster_monitoring|default(false)|bool and ( groups['monitoring'] | length == 0 ) and ( (metrics_stream_ocid | default('')) | length > 0 )

- hosts: all,!monitoring
  gather_facts: true
  vars:
    initial: true
  tasks: 
    - include_role: 
        name: prometheus
      when: cluster_monitoring|default(false)|bool