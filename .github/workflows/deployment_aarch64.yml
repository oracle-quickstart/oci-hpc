name: deployment_slurm_aarch64

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  # This job deploys with a custom Ubuntu 22.04 image and a ubuntu user with FSS, slurm backup, mysql service on aarch 64 (compute + controller + monitoring + login + slurm_backup)
  deploy_ubuntu_fss_backup_all_aarch64:
    # The type of runner that the job will run on
    runs-on: ubuntu-fss-aarch64
    env:
      TF_VAR_controller_username: "ubuntu"
      TF_VAR_compute_username: "ubuntu"
      TF_VAR_login_username: "ubuntu"
      TF_VAR_monitoring_username: "ubuntu"
      TF_VAR_unsupported_controller_image: "ocid1.image.oc1.eu-milan-1.aaaaaaaa2r7e7xnv2wwtpniggand36hrz7m6dzgc4mrhsz47tzhfv2pkrjbq"
      TF_VAR_unsupported_login_image: "ocid1.image.oc1.eu-milan-1.aaaaaaaa2r7e7xnv2wwtpniggand36hrz7m6dzgc4mrhsz47tzhfv2pkrjbq"
      TF_VAR_unsupported_monitoring_image: "ocid1.image.oc1.eu-milan-1.aaaaaaaa2r7e7xnv2wwtpniggand36hrz7m6dzgc4mrhsz47tzhfv2pkrjbq"
      TF_VAR_image_ocid: "ocid1.image.oc1.eu-milan-1.aaaaaaaa2r7e7xnv2wwtpniggand36hrz7m6dzgc4mrhsz47tzhfv2pkrjbq"
      avoid_waiting_for_delete_target: "true"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
     
      - name: creating working directory, cd and copy files
        run: |
          mkdir ${{ github.sha }}
          for file in *;do test "$file" != "${{ github.sha }}" && cp -r "$file" "${{ github.sha }}/";done
          cd ${{ github.sha }}

      # Runs a single command using the runners shell
      - name: get terraform version
        run: terraform --version

      # Runs a set of commands using the runners shell
      - name: Setup and execute terraform apply
        run: |
          cp .github/workflows/provider_testing.tf provider.tf
          cp .github/workflows/versions_testing.tf versions.tf
          cp .github/workflows/public_ip.tf public_ip.tf
          cp .github/workflows/terraform_testing_fss_aarch64.tfvars terraform.tfvars   
          terraform init
          terraform apply --auto-approve

      - &wait_for_nodes
        name: Wait for nodes to be configured (max 30 minutes)
        run: |
          ssh -o "StrictHostKeyChecking no" $(cat public_ip.txt) -T 'bash -s' <<'EOF'
          start_time=$(date +%s)
          timeout=$((30 * 60))  # 30 minutes

          while true; do
              export out_mgmt=$(mgmt nodes list \
                  --fields role=compute \
                  --columns hostname,compute_status,controller_status \
                  --format json)
              n_nodes=$(jq -r -n 'env.out_mgmt | fromjson | length')
              if [[ "$n_nodes" == "2" ]]; then
                  all_ready=$(jq -r -n 'env.out_mgmt | fromjson
                        | all(.[]; .compute_status == "configured")')
                  if [[ "$all_ready" == "true" ]]; then
                      echo "✅ All nodes are configured!"
                      break
                  fi
              fi    

              now=$(date +%s)
              elapsed=$((now - start_time))
              if (( elapsed > timeout )); then
                  echo "❌ Timeout reached: nodes did not configure within 30 minutes."
                  jq -r -n 'env.out_mgmt
                      | fromjson | .[]
                      | .hostname + ": " + .compute_status'
                  exit 1
              fi

              echo "⏳ Waiting for 2 nodes to configure (elapsed: ${elapsed}s)..."
              jq -r -n 'env.out_mgmt
                  | fromjson | .[]
                  | .hostname + ": " + .compute_status'
              sleep 10
          done
          EOF

      - &run_sinfo
        name: Run sinfo
        run: ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T 'bash -c sinfo'

      - &check_nodes
        name: Check there are 2 nodes in Slurm
        id: srun
        run: |
          set +e
          ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T 'bash -c "timeout 30 srun -vvv -N 2 hostname"'
          exitcode="$?"
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit "$exitcode"

      - &termination_status
        name: Status of srun termination
        if: ${{ success() || steps.srun.conclusion == 'failure' }}
        run: |
          if [[ "${{ steps.srun.outputs.exitcode }}" == "124" ]]; then
                  echo "srun reached timeout with exit code 124!"
          elif [[ "${{ steps.srun.outputs.exitcode }}" == "0" ]]; then
                  echo "Success!"
          else
                  echo "error happened with exit code $exitcode"
          fi    
      - &mgmt
        name: Check mgmt is there and working
        run: ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T 'bash -c "mgmt --help"'

      - &get_logs
        name: Get all logs in /config/logs
        if: always()
        run: |
          ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T bash --noprofile --norc << 'EOF'
          for f in /config/logs/*; do
              echo -e "#######$f#######\n" "$(cat $f)\n"
          done
          EOF

      - &destroy
        name: Execute terraform destroy
        if: always()
        run: terraform destroy --auto-approve

      - name: go up one directory
        if: always()
        run: |
          cd ..
                      
  # This job deploys with a custom Ubuntu 22.04 image and a ubuntu user without FSS on aarch 64 (compute) and x86 (controller + monitoring + login)
  deploy_ubuntu_mix_aarch64_x86:
    # The type of runner that the job will run on
    runs-on: ubuntu-aarch64
    env:
      TF_VAR_controller_username: "ubuntu"
      TF_VAR_compute_username: "ubuntu"
      TF_VAR_login_username: "ubuntu"
      TF_VAR_monitoring_username: "ubuntu"
      TF_VAR_unsupported_controller_image: "ocid1.image.oc1.eu-milan-1.aaaaaaaauqe4u3kafdrml5hjx6i6ylw454wkg72meruqhqehogp2jtv5dgwq"
      TF_VAR_unsupported_login_image: "ocid1.image.oc1.eu-milan-1.aaaaaaaauqe4u3kafdrml5hjx6i6ylw454wkg72meruqhqehogp2jtv5dgwq"
      TF_VAR_unsupported_monitoring_image: "ocid1.image.oc1.eu-milan-1.aaaaaaaauqe4u3kafdrml5hjx6i6ylw454wkg72meruqhqehogp2jtv5dgwq"
      TF_VAR_image_ocid: "ocid1.image.oc1.eu-milan-1.aaaaaaaa2r7e7xnv2wwtpniggand36hrz7m6dzgc4mrhsz47tzhfv2pkrjbq"
      avoid_waiting_for_delete_target: "true"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
     
      - name: creating working directory, cd and copy files
        run: |
          mkdir ${{ github.sha }}
          for file in *;do test "$file" != "${{ github.sha }}" && cp -r "$file" "${{ github.sha }}/";done
          cd ${{ github.sha }}

      # Runs a single command using the runners shell
      - name: get terraform version
        run: terraform --version

      # Runs a set of commands using the runners shell
      - name: Setup and execute terraform apply
        run: |
          cp .github/workflows/provider_testing.tf provider.tf
          cp .github/workflows/versions_testing.tf versions.tf
          cp .github/workflows/public_ip.tf public_ip.tf
          cp .github/workflows/terraform_testing_aarch64.tfvars terraform.tfvars   
          terraform init
          terraform apply --auto-approve

      - *wait_for_nodes

      - *run_sinfo

      - *check_nodes
      - *termination_status
      - *mgmt

      - *get_logs

      - *destroy

      - name: go up one directory
        if: always()
        run: |
          cd ..
