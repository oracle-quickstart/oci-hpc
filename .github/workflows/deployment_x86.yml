      - *mgmt

      - *get_logs

      - *destroy

      - name: go up one directory
        if: always()
        run: |
          cd ..

  deploy_OL9:
    # The type of runner that the job will run on
    runs-on: ol9
    needs: check_ansible_lint
    env:
      TF_VAR_ssh_key: ${{ secrets.PUBLIC_SSH_KEY }}
      TF_VAR_current_user_ocid: ${{ secrets.USER_OCID }}
