name: deployment_slurm_x86

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "master"]
  pull_request:
    branches: [ "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  check_ansible_lint:
    runs-on: ubuntu-latest
    steps:
    - name: Wait for Ansible Lint to complete
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "=========================================="
        echo "DEBUG: Starting Ansible Lint check"
        echo "=========================================="
        echo "Repository: ${{ github.repository }}"
        echo "Event name: ${{ github.event_name }}"
        echo "github.sha: ${{ github.sha }}"
        echo "github.event.pull_request.head.sha: ${{ github.event.pull_request.head.sha }}"
        echo "=========================================="
        
        # Use the correct SHA based on event type
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Using PR head SHA: $COMMIT_SHA"
        else
          COMMIT_SHA="${{ github.sha }}"
          echo "Using github.sha: $COMMIT_SHA"
        fi
        
        echo "=========================================="
        
        for i in {1..60}; do
          echo ""
          echo "--- Attempt $i/60 ---"
          
          # Make the API call with the correct SHA
          echo "Making API call to GitHub for commit: $COMMIT_SHA"
          full_response=$(gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/commits/$COMMIT_SHA/check-runs)
          
          echo "API call completed successfully"
          
          # Show the FULL raw response
          echo ""
          echo "Full API response:"
          echo "$full_response" | jq '.'
          
          # Show total count
          echo ""
          total_count=$(echo "$full_response" | jq -r '.total_count')
          echo "Total check runs: $total_count"
          
          if [ "$total_count" -gt 0 ]; then
            # Show all check run names
            echo ""
            echo "All check runs found:"
            echo "$full_response" | jq -r '.check_runs[] | .name'
            
            # Show all check runs with their status
            echo ""
            echo "Check runs with status:"
            echo "$full_response" | jq -r '.check_runs[] | "\(.name): status=\(.status), conclusion=\(.conclusion)"'
          fi
          
          # Filter for ansible_lint specifically
          echo ""
          echo "Looking for 'ansible_lint' check run..."
          status=$(echo "$full_response" | jq -r '.check_runs[] | select(.name == "ansible_lint") | .conclusion')
          
          echo "Status value: '$status'"
          
          # Check the status
          if [ "$status" == "success" ]; then
            echo ""
            echo "=========================================="
            echo "✅ Ansible Lint passed!"
            echo "=========================================="
            exit 0
          elif [ "$status" == "failure" ]; then
            echo ""
            echo "=========================================="
            echo "❌ Ansible Lint failed!"
            echo "=========================================="
            exit 1
          elif [ -n "$status" ] && [ "$status" != "null" ]; then
            echo ""
            echo "=========================================="
            echo "❌ Ansible Lint completed with status: $status"
            echo "=========================================="
            exit 1
          fi
          
          echo "⏳ Ansible Lint still running or not started yet (total checks found: $total_count)..."
          echo "Waiting 10 seconds before next check..."
          sleep 10
        done
        
        echo ""
        echo "=========================================="
        echo "❌ Timeout: Ansible Lint did not complete within 10 minutes"
        echo "=========================================="
        exit 1
  #This job deploys with a custom OL image and a opc user
  deploy_OL8:
    # The type of runner that the job will run on
    runs-on: ol8
    needs: check_ansible_lint
    env:
      # Variables with OL8 custom image OCID
      TF_VAR_ssh_key: ${{ secrets.PUBLIC_SSH_KEY }}
      TF_VAR_current_user_ocid: ${{ secrets.USER_OCID }}
      TF_VAR_tenancy_ocid: ${{ secrets.TENANCY_OCID }}
      TF_VAR_targetCompartment: ${{ secrets.COMPARTMENT_OCID }}
      TF_VAR_vcn_compartment: ${{ secrets.COMPARTMENT_OCID }}      
      TF_VAR_controller_username: "opc"
      TF_VAR_compute_username: "opc"
      TF_VAR_unsupported_controller_image: ${{ secrets.OL8_X86_PARIS }}
      TF_VAR_image_ocid: ${{ secrets.OL8_X86_PARIS }}
      avoid_waiting_for_delete_target: "true"

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Wait for Ansible Lint to complete
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
     
      - name: creating working directory, cd and copy files
        run: |
          mkdir ${{ github.sha }}
          for file in *;do test "$file" != "${{ github.sha }}" && cp -r "$file" "${{ github.sha }}/";done
          cd ${{ github.sha }}

      # Runs a single command using the runners shell
      - name: get terraform version
        run: terraform --version

      # Runs a set of commands using the runners shell
      - name: Setup and execute terraform apply
        run: |
          cp .github/workflows/provider_testing.tf provider.tf
          cp .github/workflows/versions_testing.tf versions.tf
          cp .github/workflows/public_ip.tf public_ip.tf
          cp .github/workflows/terraform_testing.tfvars terraform.tfvars
          terraform init
          terraform apply --auto-approve

      - &wait_for_nodes
        name: Wait for nodes to be configured (max 30 minutes)
        run: |
          ssh -o "StrictHostKeyChecking no" $(cat public_ip.txt) -T 'bash -s' <<'EOF'
          start_time=$(date +%s)
          timeout=$((30 * 60))  # 30 minutes

          while true; do
              export out_mgmt=$(mgmt nodes list \
                  --fields role=compute \
                  --columns hostname,compute_status,controller_status \
                  --format json)
              n_nodes=$(jq -r -n 'env.out_mgmt | fromjson | length')
              if [[ "$n_nodes" == "2" ]]; then
                  all_ready=$(jq -r -n 'env.out_mgmt | fromjson
                        | all(.[]; .compute_status == "configured")')
                  if [[ "$all_ready" == "true" ]]; then
                      echo "✅ All nodes are configured!"
                      break
                  fi
              fi    

              now=$(date +%s)
              elapsed=$((now - start_time))
              if (( elapsed > timeout )); then
                  echo "❌ Timeout reached: nodes did not configure within 30 minutes."
                  jq -r -n 'env.out_mgmt
                      | fromjson | .[]
                      | .hostname + ": " + .compute_status'
                  exit 1
              fi

              echo "⏳ Waiting for 2 nodes to configure (elapsed: ${elapsed}s)..."
              jq -r -n 'env.out_mgmt
                  | fromjson | .[]
                  | .hostname + ": " + .compute_status'
              sleep 10
          done
          EOF

      - &run_sinfo
        name: Run sinfo
        run: ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T 'bash -c sinfo'

      - &check_nodes
        name: Check there are 2 nodes in Slurm
        id: srun
        run: |
          set +e
          ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T 'bash -c "timeout 30 srun -vvv -N 2 hostname"'
          exitcode="$?"
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit "$exitcode"

      - &termination_status
        name: Status of srun termination
        if: ${{ success() || steps.srun.conclusion == 'failure' }}
        run: |
          if [[ "${{ steps.srun.outputs.exitcode }}" == "124" ]]; then
                  echo "srun reached timeout with exit code 124!"
          elif [[ "${{ steps.srun.outputs.exitcode }}" == "0" ]]; then
                  echo "Success!"
          else
                  echo "error happened with exit code $exitcode"
          fi    
      - &mgmt
        name: Check mgmt is there and working
        run: ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T 'bash -c "mgmt --help"'

      - &get_logs
        name: Get all logs in /config/logs
        if: always()
        run: |
          ssh -o "StrictHostKeyChecking no" `cat public_ip.txt` -T bash --noprofile --norc << 'EOF'
          for f in /config/logs/*; do
              echo -e "#######$f#######\n" "$(cat $f)\n"
          done
          EOF

      - &destroy
        name: Execute terraform destroy
        if: always()
        run: terraform destroy --auto-approve

      - name: go up one directory
        if: always()
        run: |
          cd ..  

  # This job deploys with a custom Ubuntu 22.04 image and a ubuntu user
  deploy_Ubuntu:
    # The type of runner that the job will run on
    runs-on: ubuntu
    needs: check_ansible_lint    
    env:
