              - ${monitoring_shape}
              - "VM.Standard.E5.Flex"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard.E6.Flex"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard.A1.Flex"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard.A2.Flex"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard3.Flex"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard3.Flex"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard.x86.Generic"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard.Intel.Generic"
            - eq:
              - ${monitoring_shape}
              - "VM.Standard.AMD.Generic"
        - and: 
            - ${monitoring_custom_memory}
            - ${monitoring_node}
    required: true

  monitoring_boot_volume_size:
    type: integer
    required: true
    minimum: 50
    title: "Size of the boot volume in GB"
    default: 512
    visible:  ${monitoring_node}

  use_OCI_generated_container:
    type: boolean
    title: "Point to an existing OCIR"
    default : true
    required: true

  use_existing_auth_token:
    type: boolean
    title: "Use existing auth token"
    default : "false"
    description: "Use existing auth token to authenticate to registry."
    required: true
    visible:
      not:
        - ${use_OCI_generated_container}

  auth_token:
    title: "Auth token"
    type: password
    default : ""
    description: "Auth token as a string."
    required: true
    visible:
      and:
        - ${use_existing_auth_token}
        - not:
            - ${use_OCI_generated_container}

  home_region:
    type: oci:identity:region:name 
    title: "Home Region"
    default: ${region}
    required: true
    description: "Home region to generate Auth Token."
    visible:
      and:
      - not: 
        - ${use_existing_auth_token}        
      - not: 
        - ${use_OCI_generated_container}

  use_existing_registry:
    type: boolean
    title: "Use existing registry"
    default : "false"
    description: "Use existing registry to push serverless function."
    required: true
    visible:
      not: 
        - ${use_OCI_generated_container}

  registry_id:
    type: string
    title: "OCID of existing registry"
    default : ""
    description: "OCID of existing registry."
    required: true
    visible:
      and:
        - ${use_existing_registry}
        - not: 
          - ${use_OCI_generated_container}

  add_lfs:
    type: boolean
    title: "Add Lustre Filesystem"
    default: false
    description: "If chosing an existing Lustre filesystem, it should pre-exist and be in the same subnet as the GPU/HPC compute nodes."
    visible: true

  create_lfs:
    type: enum
    title: "Create Lustre Filesystem"
    enum:
      - "existing"
      - "new"
    default: "new"
    description: "For Lustre, leave options field as-is unless you require specific options."
    visible:
      and:
        - ${add_lfs}

  lfs_compartment:
    title: "Lustre File System Compartment"
    description: "Compartment for provisioning Lustre File System."
    type: oci:identity:compartment:id
    default: ${targetCompartment}
    required: true
    visible:
      and:
        - ${add_lfs}
        - eq:
          - ${create_lfs}
          - "new"

  lfs_ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${lfs_compartment}
    visible:
      and:
        - ${add_lfs}
        - eq:
          - ${create_lfs}
          - "new"
    default: ${ad}
    description: "Availability Domain (should be the same as CPU/GPU compute instances for best performance)."
    title: "LFS Availability Domain"
    required: true

  lfs_capacity_in_gbs:
    type: integer
    required: true
    minimum: 31200
    title: "Size of Lustre Filesystem share in GBs (Should be in multiples of 10400)"
    default: 31200
    visible:
      and:
        - ${add_lfs}
        - eq:
          - ${create_lfs}
          - "new"

  lfs_perf_tier:
    type: enum
    required: true
    title: "Lustre Performance Tier"
    enum:
      - "MBPS_PER_TB_125"
      - "MBPS_PER_TB_250"
      - "MBPS_PER_TB_500"
      - "MBPS_PER_TB_1000"
    default: "MBPS_PER_TB_125"
    visible:
      and:
        - ${add_lfs}
        - eq:
          - ${create_lfs}
          - "new"

  lfs_target_path:
    type: string
    title: "LFS Path"
    description: "Local path on which Lustre filesystem will be mounted."
    required: true
    default: "/lfs"
    visible:
      and:
        - ${add_lfs}

  lfs_source_IP:
    type: string
    title: "Lustre Server IP"
    description: "IP address of the Lustre server."
    required: true
    default: "0.0.0.0"
    visible:
      and:
        - ${add_lfs}
        - eq:
          - ${create_lfs}
          - "existing"

  lfs_source_path:
    type: string
    title: "Lustre Server Path"
    default: "lustrefs"
    minLength: 1
    maxLength: 8
    description: "Lustre filesystem share path on the Lustre server."
    visible:
      and:
        - ${add_lfs}
    required: true

  lfs_options:
    type: string
    title: "Options"
    default: "defaults,_netdev"
    description: "Recommended mount options for LFS. Do not modify unless you require custom options."
    visible:
      and:
        - ${add_lfs}
