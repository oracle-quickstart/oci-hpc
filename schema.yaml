            - ${monitoring_shape}
            - "VM.Standard.E3.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Optimized3.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.E4.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.E5.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.E6.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.A1.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.A2.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard3.Flex"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.x86.Generic"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.Intel.Generic"
          - eq:
            - ${monitoring_shape}
            - "VM.Standard.AMD.Generic"
        - ${monitoring_node}

  monitoring_memory:
    title: Memory in GBs
    type: integer
