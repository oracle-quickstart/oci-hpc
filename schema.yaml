---
title: HPC cluster
description: Oracle Cloud HPC cluster
schemaVersion: 1.1.0
version: "2021040901"
informationalText: Automated HPC cluster deployment
logoUrl: https://cloudmarketplace.oracle.com/marketplace/content?contentId=80357668

source:
  type: marketplace
  reference: 67628143
locale: "en"

outputGroups:
- title: "Cluster deployment details"
  outputs:
    - controller
    - backup
    - login
    - monitoring

- title: "Cluster monitoring details"
  outputs:
    - grafana_url
    - grafana_password

outputs:
  controller:
    title: "Controller Instance Public IP"
    type: copyableString
    visible: true

  backup:
    title: "Backup Controller Instance IP"
    type: copyableString
    visible: true

  login:
    title: "Login Instance IP"
    type: copyableString
    visible: true

  monitoring:
    title: "Monitoring Instance IP"
    type: copyableString
    visible: true

  grafana_url:
    title: "Grafana URL"
    type: link
    visible: ${cluster_monitoring}

  grafana_password:
    title: "Grafana admin password"
    type: copyableString
    visible: ${cluster_monitoring}
    sensitive: true

variableGroups:

  - title: "Cluster configuration"
    variables:
      - ${targetCompartment}
      - ${ssh_key}
      - ${use_custom_name}
      - ${cluster_name}
      - ${ldap}

  - title: "Function and Events configuration"
    variables:
      - ${use_OCI_generated_container}
      - ${use_existing_auth_token}
      - ${auth_token}  
      - ${home_region} 
      - ${use_existing_registry}
      - ${registry_id}

  - title: "Controller node options"
    variables:
      - ${controller_ad}
      - ${controller_shape}
      - ${controller_ocpus}
      - ${controller_ocpus_denseIO_flex}
      - ${controller_custom_memory}
      - ${controller_memory}
      - ${controller_boot_volume_size}
      - ${controller_boot_volume_backup}

  - title: "Management nodes image options (controller,backup,monitoring,login)"
    variables:
      - ${use_marketplace_image_controller}
      - ${marketplace_listing_controller}
      - ${unsupported_controller}
      - ${controller_image_compartment}
      - ${custom_controller_image}
      - ${unsupported_controller_image}
      - ${controller_username}

  - title: "Compute node options"
    variables:
      - ${ad}
      - ${cluster_network_shape}
      - ${instance_pool_shape}
      - ${rdma_enabled}
      - ${stand_alone}
      - ${compute_cluster_exists}
      - ${compute_cluster_id}
      - ${memory_fabric_id}
      - ${instance_pool_ocpus}
      - ${instance_pool_ocpus_denseIO_flex}
      - ${instance_pool_custom_memory}
      - ${instance_pool_memory}
      - ${node_count}
      - ${hyperthreading}
      - ${boot_volume_size}
      - ${use_marketplace_image}
      - ${marketplace_listing}
      - ${unsupported}
      - ${compute_image_compartment}
      - ${image}
      - ${image_ocid}
      - ${compute_username}
      - ${BIOS}
      - ${IOMMU}
      - ${SMT}
      - ${virt_instr}
      - ${access_ctrl}
      - ${numa_nodes_per_socket}
      - ${percentage_of_cores_enabled}
      - ${change_hostname}
      - ${hostname_convention}
      - ${preemptible}
      - ${ondemand_partition}
      - ${ondemand_partition_count}

  - title: "Login node options"
    variables:
      - ${login_node}
      - ${login_ad}
      - ${login_shape}
      - ${login_ocpus}
      - ${login_ocpus_denseIO_flex}
      - ${login_custom_memory}
      - ${login_memory}
      - ${login_boot_volume_size}

  - title: "Cluster Monitoring"
    variables:
      - ${cluster_monitoring}
      - ${use_lets_encrypt_prod_ep}
      - ${alerting}
      - ${ingest_oci_metrics}
      - ${monitoring_node}
      - ${monitoring_ad}
      - ${monitoring_shape}
      - ${monitoring_ocpus}
      - ${monitoring_ocpus_denseIO_flex}
      - ${monitoring_custom_memory}
      - ${monitoring_memory}
      - ${monitoring_boot_volume_size}

  - title: "Storage options: Lustre Filesystem"
    variables:
      - ${add_lfs}
      - ${create_lfs}
      - ${lfs_compartment}
      - ${lfs_ad}
      - ${lfs_capacity_in_gbs}
      - ${lfs_perf_tier}
      - ${lfs_target_path}
      - ${lfs_source_IP}
      - ${lfs_source_path}
      - ${lfs_options}

  - title: "Storage options: File Storage Service"
    variables:
      - ${add_nfs}
      - ${create_fss}
      - ${mount_target_count}
      - ${nfs_target_path}
      - ${nfs_source_IP}
      - ${nfs_source_path}
      - ${nfs_options}
      - ${fss_compartment}
      - ${fss_ad}
      - ${compute_node_ssh_key}

  - title: "Storage options: Local Storage (NVMe)"
    variables:
      - ${localdisk}
      - ${log_vol}
      - ${redundancy}

  - title: "Storage options: General"
    variables:
      - ${shared_home}

  - title: "Network options"
    variables:
      - ${use_existing_vcn}
      - ${vcn_compartment}
      - ${vcn_id}
      - ${private_deployment}
      - ${public_subnet_id}
      - ${private_subnet_id}
      - ${vcn_subnet}
      - ${public_subnet}
      - ${private_subnet}
      - ${additional_subnet}
      - ${zone_name}

  - title: "Software"
    variables:
      - ${privilege_sudo} 
      - ${privilege_group_name} 
      - ${slurm}
      - ${slurm_version}
      - ${slurm_federation}
      - ${ip_slurmdbd}
      - ${munge_key}
      - ${slurm_ha}      
      - ${mysql_admin_username}
      - ${mysql_admin_password}
      - ${queue}
      - ${spack}
      - ${enroot}
      - ${pyxis}
      - ${pam}
      - ${sacct_limits}
      - ${healthchecks}

  - title: "Hidden"
    variables:
      - ${region}
      - ${current_user_ocid}
      - ${tenancy_ocid}
      - ${marketplace_listing_id}
      - ${marketplace_listing_id_GPU}
      - ${marketplace_listing_id_HPC}
      - ${ssh_cidr}
      - ${marketplace_source_images}
      - ${marketplace_version_id}
      - ${controller_boot_volume_backup_period}
      - ${controller_boot_volume_backup_retention_seconds}
      - ${controller_boot_volume_backup_time_zone}
      - ${controller_boot_volume_backup_type}
      - ${nfs_list_of_mount_target_IPs}
      - ${OCI_generated_container_namespace}
      - ${OCI_generated_container_name}
      - ${wildcard_dns_domain}
      - ${rdma_subnet}
    visible: false


    
variables:

  targetCompartment:
    title: "Cluster compartment"
    type: oci:identity:compartment:id
    default: ${compartment_ocid}
    required: true

  ad:
    type: oci:identity:availabilitydomain:name
    visible: complexExpression
    dependsOn:
      compartmentId: ${targetCompartment}
    required: true
    description: "Availability Domain"
    title: "Availability Domain"

  ssh_key:
    type: oci:core:ssh:publickey
    title: "Public SSH key"
    description: "Public SSH key."
    required: true

  use_custom_name:
    type: boolean
    title: "Use custom cluster name"
    description: "Use custom name for the cluster."
    default: false

  ldap:
    type: boolean
    title: "Configure LDAP authentication from controller"
    description: "When selected nodes will be configured to use LDAP authentication. User and group management can be performed using cluster commands."
    default: true

  cluster_name:
    title: "Cluster name"
    description: "The custom cluster name must be lower case letters, digits and - only."
    pattern: "^[-a-z0-9]+$"
    default: ""
    type: string
    visible:
      and:
        - ${use_custom_name}
    required: true

  controller_ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${targetCompartment}
    visible: complexExpression
    required: true
    description: "Availability Domain for controller host."
    title: "Availability Domain"

  controller_shape:
    title: "Controller Shape"
    type: oci:core:instanceshape:name
    dependsOn:
      compartmentId: ${targetCompartment}
    required: true
    default: VM.Standard.E5.Flex

  controller_ocpus:
    title: Cores
    type: integer
    description: Number of OCPUs for Flex shape.
    minimum: 1
    maximum: 64
    default: 4
    visible:
      and: 
        - or: 
          - eq:
            - ${controller_shape}
            - "VM.Standard.E3.Flex"
          - eq: 
            - ${controller_shape}
            - "VM.Standard.E4.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.E5.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.E6.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Optimized3.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.A1.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.A2.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard3.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.x86.Generic"
          - eq:
            - ${controller_shape}
            - "VM.Standard.Intel.Generic"
          - eq:
            - ${controller_shape}
            - "VM.Standard.AMD.Generic"
    required: true

  controller_ocpus_denseIO_flex:
    title: Cores
    type: enum
    description: Number of OCPUs for Dense IO Flex shape.
    enum:
      - 8
      - 16
      - 32
    default: 8
    visible:
      and: 
        - or: 
          - eq:
            - ${controller_shape}
            - "VM.DenseIO.E4.Flex"
          - eq:
            - ${controller_shape}
            - "VM.DenseIO.E5.Flex"
    required: true

  controller_custom_memory: 
    title: Use custom memory size
    type: boolean
    default: false
    visible:
      and: 
        - or: 
          - eq:
            - ${controller_shape}
            - "VM.Standard.E3.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Optimized3.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.E4.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.E5.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.E6.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.A1.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.A2.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard3.Flex"
          - eq:
            - ${controller_shape}
            - "VM.Standard.x86.Generic"
          - eq:
            - ${controller_shape}
            - "VM.Standard.Intel.Generic"
          - eq:
            - ${controller_shape}
            - "VM.Standard.AMD.Generic"

  controller_memory:
    title: Memory in GBs
    type: integer
    description: Amount of memory for flex shape. Minimum 1 GB per core.
    minimum: 1
    maximum: 1024
    default: 32
    visible:
      and: 
        - and: 
          - or: 
            - eq:
              - ${controller_shape}
              - "VM.Standard.E3.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Optimized3.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Standard.E4.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Standard.E5.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Standard.E6.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Standard.A1.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Standard.A2.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Standard3.Flex"
            - eq:
              - ${controller_shape}
              - "VM.Standard.x86.Generic"
            - eq:
              - ${controller_shape}
              - "VM.Standard.Intel.Generic"
            - eq:
              - ${controller_shape}
              - "VM.Standard.AMD.Generic"
        - and: 
            - ${controller_custom_memory}
    required: true

  controller_boot_volume_size:
    type: integer
    required: true
    minimum: 50
    title: "Size of the boot volume in GB"
    default: 1024

  controller_boot_volume_backup:
    type: boolean
    title: "Enable boot volume backup"
    description: "Schedule: Daily, Type: Incremental, Start Time: 00:00 Regional Time, Retention: 90 days."
    default: true

  use_marketplace_image_controller:
    type: boolean
    title: "Use marketplace image"
    description: "Use marketplace image, otherwise provide custom image OCID."
    default: true
    visible: true

  unsupported_controller: 
    title: "Use specific image" 
    description: "Use an image that is not listed for the management nodes (controller, controller backup, login and monitoring nodes)."
    type: boolean
    default: false
    visible: 
      not: 
        - ${use_marketplace_image_controller}

  marketplace_listing_controller:
    type: enum
    title: "Image version"
    description: "Marketplace listing to use."
    required: true
    enum:
      - "HPC_OL8"
      - "GPU_OL8_NV570"
      - "GPU_OL8_NV550"
      - "GPU_OL8_AMD632"
    default: "HPC_OL8"
    visible: ${use_marketplace_image_controller}

  controller_username: 
    title: "Controller username" 
    description: "Default username for controller."
    type: string
    default: "opc"
    required: true
    visible: true

  unsupported_controller_image:
    title: "Image OCID"
    description: "Unlisted image ID for management nodes. Please note that only Oracle Linux 7 and Ubuntu 22.04 are supported as controller image at this moment."
    type: string
    required: true
    visible: ${unsupported_controller}
    default: "image.ocid"

  controller_image_compartment:
    title: "Controller image compartment"
    type: oci:identity:compartment:id
    default: ${targetCompartment}
    visible:
      and: 
        - not: 
          - ${unsupported_controller}
        - not:
          - ${use_marketplace_image_controller}
    required: true

  custom_controller_image:
    title: "Controller image"
    description: "Custom image for controller nodes. Please note that only Oracle Linux 7, 8 and Ubuntu 22.04 are supported as controller image at this moment."
    type: oci:core:image:id
    dependsOn:
      compartmentId: ${controller_image_compartment}
    visible: 
      and: 
        - not: 
          - ${unsupported_controller}
        - not:
          - ${use_marketplace_image_controller}
    required: true

  shared_home:
    type: enum
    title: "Shared /home folder"
    description": "Cluster /home folder can be shared across the nodes, either from the controller (NFS) or from the File Storage Service (FSS). To use FSS, make sure you created one or added NFS mount information."
    visible: true
    enum:
      - "none"
      - "nfs"
      - "fss"
    default: "nfs"

  compute_node_ssh_key:
    type: oci:core:ssh:publickey
    title: "Public SSH key of the compute nodes"
    description: "Public SSH key of the compute nodes. If re-using an existing FSS/NFS as /home, the public key must match the default private in the ~/.ssh directory."
    visible:
      and:
        - ${add_nfs}
        - or:
          - eq:
            - ${shared_home}
            - "nfs"
          - eq:
            - ${shared_home}
            - "fss"
        - not:
          - eq:
            - ${create_fss}
            - "new"

  rdma_enabled:
    title: Use cluster network
    type: boolean
    description: Use ROCEv2 cluster network
    default: true
    visible: 
      not:
        - or:
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200.4"
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200-v2.4"
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200-v3.4"            
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB300.4"            

  stand_alone:
    title: Use Stand-Alone instances
    type: boolean
    description: Do not use instance pools (or Cluster Network), but Stand-Alone instance or Compute Clusters.
    default: false
    visible: 
      not:
        - or:
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200.4"
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200-v2.4"
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200-v3.4"            
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB300.4"

  compute_cluster_exists:
    title: Use existing Compute Cluster
    type: boolean
    description: The compute cluster already exists.
    default: false
    visible: 
      and:
        - ${stand_alone}
        - ${rdma_enabled}

  compute_cluster_id: 
    title: Compute Cluster ID
    type: string
    description: Specify the compute cluster OCID.
    default: ""
    visible: ${compute_cluster_exists}

  memory_fabric_id: 
    title: Memory Fabric ID
    type: string
    description: Specify the memory Fabric OCID. Only one memory cluster can be spun up for the initial spin up. Use the CLI to create additionnal Memory Cluster.
    default: ""
    visible: 
      and:
        - or:
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200.4"
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200-v2.4"
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB200-v3.4"            
          - eq:
            - ${cluster_network_shape}
            - "BM.GPU.GB300.4"

  cluster_network_shape:
    type: enum
    enum:
      - "BM.HPC2.36"
      - "BM.GPU4.8"
      - "BM.GPU.B4.8"
      - "BM.GPU.A100-v2.8"
      - "BM.GPU.H100.8"
      - "BM.GPU.H200.8"
      - "BM.GPU.B200.8"
      - "BM.GPU.GB200.4"
      - "BM.GPU.GB200-v2.4"
      - "BM.GPU.GB200-v3.4"
      - "BM.GPU.GB300.4"
      - "BM.GPU.MI300X.8"
      - "BM.GPU.MI355X-v0.8"
      - "BM.GPU.MI355X.8"
      - "BM.GPU.MI355X-v1.8"
      - "BM.GPU.L40S.4"
      - "BM.Optimized3.36"
      - "BM.HPC.E5.144"
    default: "BM.GPU.H100.8"
    title: "Shape of the Compute Nodes"
    description: "Shape of compute nodes used in permanent/initial cluster."
    required: true
    visible:
      and:
        - ${rdma_enabled}

  instance_pool_shape:
    title: "Shape of the Compute Nodes"
    required: true
    default: "VM.Standard.E5.Flex"
    type: oci:core:instanceshape:name
    dependsOn:
      compartmentId: ${targetCompartment}
    visible:
      not:
        - ${rdma_enabled}
    description: "Shape of compute nodes used in permanent/initial cluster."

  instance_pool_ocpus:
    title: Cores
    type: integer
    description: Number of OCPUs for flex shape
    minimum: 1
    maximum: 64
    default: 2
    visible:
      and: 
        - not: 
          - ${rdma_enabled}
        - or: 
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E3.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Optimized3.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E4.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E5.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E6.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.A1.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.A2.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard3.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.x86.Generic"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.Intel.Generic"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.AMD.Generic"
    required: true

  instance_pool_ocpus_denseIO_flex:
    title: Cores
    type: enum
    description: Number of OCPUs for Dense IO flex shape.
    enum:
      - 8
      - 16
      - 32
    default: 8
    visible:
      and: 
        - or: 
          - eq:
            - ${instance_pool_shape}
            - "VM.DenseIO.E4.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.DenseIO.E5.Flex"
    required: true

  instance_pool_custom_memory: 
    title: Use custom memory size
    type: boolean
    default: false
    visible:
      and: 
        - not: 
          - ${rdma_enabled}
        - or: 
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E3.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Optimized3.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E4.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E5.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.E6.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.A1.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.A2.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard3.Flex"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.x86.Generic"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.Intel.Generic"
          - eq:
            - ${instance_pool_shape}
            - "VM.Standard.AMD.Generic"

  instance_pool_memory:
    title: Memory in GBs
    type: integer
    description: Amount of memory for Flex shapes. Minimum 1 GB per core.
    minimum: 1
    maximum: 1024
    default: 16
    visible:
      and: 
        - and: 
          - or: 
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.E3.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Optimized3.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.E4.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.E5.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.E6.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.A1.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.A2.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard3.Flex"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.x86.Generic"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.Intel.Generic"
            - eq:
              - ${instance_pool_shape}
              - "VM.Standard.AMD.Generic"
        - and: 
            - ${instance_pool_custom_memory}
            - not: 
              - ${rdma_enabled}
    required: true

  ondemand_partition:
    type: boolean
    title: "On-Demand Partition"
    default: false
    description: "Add another partition for nodes on-demand."

  ondemand_partition_count:
    required: true
    type: integer
    minimum: 0
    title: "Maximum number of nodes in the on-demand partition"
    default: 100
    description: "Number of Compute Instances (Permanent Cluster when autoscaling)."
    visible: ${ondemand_partition}

  node_count:
    required: true
    type: integer
    minimum: 0
    title: "Initial cluster size"
    default: 2
    description: "Number of Compute Instances (Permanent Cluster when autoscaling)."

  hyperthreading:
    type: boolean
    title: "Hyperthreading enabled"
    default: true
    description: "When unchecked SMT will be disabled."

  boot_volume_size:
    type: integer
    required: true
    minimum: 50
    title: "Size of the boot volume in GB"
    default: 256
    description: "Boot volume size in GB of each compute node."

  use_marketplace_image:
    type: boolean
    title: "Use marketplace image"
    description: "Use marketplace image, otherwise provide custom image OCID."
    default: true

  marketplace_listing:
    type: enum
    title: "Image version"
    description: "Marketplace listing to use."
    required: true
    enum:
      - "HPC_OL8"
      - "GPU_OL8_NV570"
      - "GPU_OL8_NV550"
      - "GPU_OL8_AMD632"
    default: "GPU_OL8_NV570"
    visible: ${use_marketplace_image}

  compute_image_compartment:
    title: "Compute image compartment"
    type: oci:identity:compartment:id
    default: ${targetCompartment}
    visible:
      and: 
        - not:
            - ${use_marketplace_image}
        - not:
            - ${unsupported}

  image:
    title: "Image"
    description: "Custom image ID for compute nodes. Supported OS are OL8, CentOS7 and Ubuntu 22.04 (OL7 should still work but is not supported anymore)."
    type: oci:core:image:id
    required: true
    dependsOn:
      compartmentId: ${compute_image_compartment}
    visible:
      and: 
        - not:
            - ${use_marketplace_image}
        - not:
            - ${unsupported}

  compute_username: 
    title: "Default username for compute hosts" 
    description: "Custom image ID for compute hosts."
    type: string
    default: "opc"
    visible:
      and: 
        - not:
            - ${use_marketplace_image}

  unsupported: 
    title: "Use unsupported image" 
    description: "Custom image ID for compute nodes."
    type: boolean
    default: false
    visible:
      and: 
        - not:
            - ${use_marketplace_image}

  image_ocid:
    title: "Image OCID"
    description: "Custom image ID for compute nodes. Supported OS are OL8, CentOS7 and Ubuntu 22.04 (OL7 should still work but is not supported anymore)."
    type: string
    required: true
    visible:
      and: 
        - not:
            - ${use_marketplace_image}
        - and: 
            - ${unsupported}

  BIOS: 
    title: "Modify BIOS options" 
    description: "WARNING : Do NOT change those if you have not tested the changes on a single instance. Error will be \"Shape does not support the provided platform configuration\" "
    type: boolean
    default: false
    visible: true

  IOMMU: 
    title: "IOMMU enabled" 
    type: boolean
    default: false
    visible: ${BIOS}

  SMT: 
    title: "SMT Enabled" 
    type: boolean
    default: true
    visible: ${BIOS}

  virt_instr: 
    title: "Virtualization instructions" 
    description: "Virtualization instructions include Secure Virtual Machine for AMD shapes or VT-x for Intel shapes."
    type: boolean
    default: false
    visible: ${BIOS}

  access_ctrl: 
    title: "Access Control Service" 
    description: "Access control service lets the platform enforce PCIe device isolation."
    type: boolean
    default: false
    visible: ${BIOS}

  numa_nodes_per_socket: 
    title: "Numa Node per Socket" 
    description: "NUMA Settings."
    type: enum
    enum:
      - "Default"
      - "NPS0"
      - "NPS1"
      - "NPS2"
      - "NPS4"
    default: "Default"
    visible: ${BIOS}

  percentage_of_cores_enabled: 
    title: "Numa Node per Socket" 
    description: "NUMA Settings."
    type: enum
    enum:
      - "Default"
      - "25"
      - "50"
      - "75"
      - "100"
    default: "Default"
    visible: ${BIOS}

  change_hostname: 
    title: "Change hostname" 
    description: "Will modify the hostname of the node and display name in the oci console."
    type: boolean
    default: true
    required: true

  hostname_convention:
    type: string
    title: "Hostname Convention"
    description: "Will add -INDEX at the end with the index of the IP in the subnet."
    default: "GPU"
    visible: ${change_hostname}

  preemptible: 
    title: "Use preemptible instances" 
    description: "Not available for instance pools, Cluster Network or Compute Cluster."
    type: boolean
    default: false
    visible: 
      and:
        - ${stand_alone} 
        - not:
          - ${rdma_enabled}

  private_deployment:
    type: boolean
    title: "Private deployment"
    description: "Deploy the controller, controller backup, login and monitoring nodes in a private subnet."      
    default: false

  use_existing_vcn:
    type: boolean
    title: "Use Existing VCN"
    description: "Use existing VCN or create new one. If true, make sure the security lists are correctly set in the subnets (ex: Open traffic within VCN)."
    default: false

  vcn_compartment:
    title: "VCN compartment"
    type: oci:identity:compartment:id
    visible: true
    default: ${targetCompartment}
    required: true

  vcn_id:
    type: oci:core:vcn:id
    visible:
      and:
        - ${use_existing_vcn}
    title: "Existing network"
    default: ''
    required: true
    dependsOn:
      compartmentId: ${vcn_compartment}

  public_subnet_id:
    title: Controller node subnet
    type: oci:core:subnet:id
    dependsOn:
      compartmentId: ${vcn_compartment}
      vcnId: ${vcn_id}
      hidePrivateSubnet: false
    visible: ${use_existing_vcn}  
    required: true

  private_subnet_id:
    title: Private Subnet
    type: oci:core:subnet:id
    dependsOn:
      compartmentId: ${vcn_compartment}
      vcnId: ${vcn_id}
      hidePublicSubnet: true
    visible: ${use_existing_vcn}
    required: true

  zone_name:
    title: Private Zone Name
    description: "The zone needs to be private and unprotected for the stack to be able to add entries."
    type: string
    visible: ${use_existing_vcn}
    required: true

  vcn_subnet:
    type: string
    title: "VCN IP range"
    description: "VCN subnet (The RDMA subnet will be at 10.224.0.0/12)"
    default: "172.16.0.0/18"
    required: true
    visible:
      not:
        - ${use_existing_vcn}

  public_subnet:
    type: string
    title: "Master Node subnet IP range"
    default: "172.16.0.0/24"
    description: "Must be within VCN subnet."
    required: true
    visible:
      not:
        - ${use_existing_vcn}

  additional_subnet:
    type: string
    title: "Additional subnet IP range"
    default: "172.16.1.0/24"
    description: "Must be within VCN subnet."
    required: true
    visible:
      not:
        - ${use_existing_vcn}

  rdma_subnet:
    type: string
    title: "RDMA subnet IP range"
    default: "10.224.0.0/12"
    description: "Must be at least the same size as private subnet for HPC and at least 16 times the size of the private subnet for GPUs, currently cannnot be modified with the compute agent."
    required: true

  private_subnet:
    type: string
    title: "Private subnet IP range"
    default: "172.16.32.0/19"
    description: "Must be within VCN subnet."
    required: true
    visible:
      not:
        - ${use_existing_vcn}

  ssh_cidr:
    type: string
    title: "Initial CIDR range allowed to ssh"
    default: "0.0.0.0/0"
    description: "Allowed ssh network in CIDR notation."
    required: true

  slurm:
    type: boolean
    title: "Install SLURM"
    default: true
    description: "Install slurm job scheduler."

  slurm_version:
    type: enum
    title: "SLURM version"
    description: "24.xx has new feature but topology plugin is broken." 
    enum:
      - "24.11.7-1"
      - "23.11.11-2"
      - "25.11.0-1"
    default: "25.11.0-1"
    visible: ${slurm}
    required: true

  slurm_ha:
    type: boolean
    title: "Create a back-up slurm controller"
    default: false
    required: true
    description: "Add a second controller of the same shape as the controller as a back-up controller node and MySQL service hosted on OCI. We recommend using a FSS to save the state and share between controllers." 
    visible: ${slurm}

  mysql_admin_username:
    type: string
    title: "Admin username for MySQL service"
    required: true
    description: "Admin username for MySQL service" 
    visible: ${slurm_ha}

  mysql_admin_password:
    type: string
    title: "Admin password for MySQL service. Administrator password must be between 8 and 32 characters, and contain at least 1 uppercase, 1 lowercase, 1 numeric, and 1 special characters."
    required: true
    pattern: "^(?=.*[!@#%^*_+\\-:?.,\\[\\]\\{\\}])(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?!.*[$\\(\\)]).{8,32}$"
    description: "Admin password for MySQL service" 
    visible: ${slurm_ha}

  slurm_federation:
    type: boolean
    title: "Join Slurm federation"
    default: false
    required: true
    description: "Join an existing Slurm federation. Use only for additial Slurm clusters" 
    visible: ${slurm}

  ip_slurmdbd:
    type: string
    title: "slurmdbd host IP"
    required: true
    description: "For Slurm federation. IP of the initial controller where slurmdbd runs. Make sure to adapt the secutiry list accordingly. Default port: 6819" 
    visible:
      and:
        - ${slurm}
        - ${slurm_federation}  

  munge_key:
    type: string
    title: "Base64 of the Munge key"
    required: true
    description: "If you need to connect to another slurm cluster for federation, provide the base64 munge key here. This will get you the string: sudo cat /etc/munge/munge.key | base64 -w 0"
    visible:
      and:
        - ${slurm_federation}

  pyxis:
    type: boolean
    title: "Install Nvidia Pyxis plugin for slurm"
    default: true
    description: "Install Pyxis. Pyxis is a plugin that integrates Enroot with slurm. (Warning: using Pyxis with autoscaling is causing an issue that prevents jobs from being scheduled on nodes to be spun up)."
    visible:
      and:
        - ${slurm}
        - ${enroot}


  queue:
    type: String
    title: "Queue name"
    default: "compute"
    required: true
    description: "Add the permanent cluster to a specific queue, compute is the default queue." 
    visible: ${slurm}

  spack:
    type: boolean
    title: "Install Spack package manager"
    default: false
    description: "Install Spack package manager. Requires shared folder."

  enroot:
    type: boolean
    title: "Install Nvidia Enroot for containerized GPU workloads"
    default: true
    description: "Install Enroot, either the Nvidia or AMD Container Toolkit, and docker."
    visible: ${slurm}

  cluster_monitoring:
    type: boolean
    title: "Install HPC Cluster Monitoring Tools"
    default: true
    description: "Install Grafana, Node-Exporter, and Prometheus tools for system monitoring."

  use_lets_encrypt_prod_ep:
    title: "Use Let's Encrypt Production Endpoint"
    description: "Use Let's Encrypt Production Endpoint to generate TLS certificate for Grafana"
    type: boolean
    default: true
    visible: 
     and:
      - ${cluster_monitoring}
      - not:
        - ${private_deployment}

  alerting:
    type: boolean
    title: "Install HPC Cluster alerting tools"
    default: false
    description: "Creates a Topic that you can subscribe to."
    visible: ${cluster_monitoring}

  ingest_oci_metrics:
    type: boolean
    title: "Ingest OCI metrics in Prometheus"
    description: "Setup pipeline to ingest cluster resources metrics from OCI Metrics into Prometheus"
    default: false
    visible: cluster_monitoring

  pam:
    type: boolean
    title: "Enable PAM"
    default: false
    description: "Enable PAM for the slurm cluster (Supported on OL with RHCK kernel and Ubuntu at this time). When PAM is enabled, users that are not in the sudo group will not be able to SSH into the compute nodes unless they have an active job running in Slurm."
    visible: ${slurm}

  sacct_limits:
    type: boolean
    title: "Enable Limits for slurm jobs"
    default: false
    description: "Enable Limits for the slurm cluster When enabled, users will not be able to submit jobs if the right limits are not set."
    visible: ${slurm}

  healthchecks:
    type: boolean
    title: "Turn on Healthchecks for GPU nodes"
    default: true
    description: "Will run tests on GPU nodes before starting a job. Nodes that are showing issues will be set in drain state."
    visible: ${slurm}

  add_nfs:
    type: boolean
    title: "Add File Storage Service (network file system)"
    default: false
    description: "Use an existing File Storage service or create a new one."
    visible: true

  create_fss:
    type: enum
    title: "FSS type"
    enum:
      - "existing"
      - "new"
    default: "new"
    required: true
    visible: ${add_nfs}

  mount_target_count:
    title: "Number of FSS mount targets"
    description: "Number of FSS Mount Target to use with File System."
    type: integer
    default: 1
    required: true
    visible: 
      and:
        - ${add_nfs}
        - eq:
          - ${create_fss}
          - "new"

  fss_compartment:
    title: "FSS compartment"
    description: "Compartment to add the FSS Mount Target and File System."
    type: oci:identity:compartment:id
    default: ${targetCompartment}
    required: true
    visible: 
      and:
        - ${add_nfs}
        - eq:
          - ${create_fss}
          - "new"

  fss_ad:
    title: "FSS Availability Domain"
    description: "FSS Availability Domain."
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${fss_compartment}
    visible: 
      and:
        - ${add_nfs}
        - eq:
          - ${create_fss}
          - "new"
    default: ${ad}
    required: true

  localdisk:
    type: boolean
    title: "Mount Localdisk"
    default: true
    description: "Mount the NVMe disks (if applicable)."
    visible: true

  log_vol:
    type: boolean
    title: "One Logical Volume"
    default: true
    description: "Mount all NVMe's as one logical volume."
    visible: 
      and: 
        - ${localdisk}

  redundancy:
    type: boolean
    title: "Redundancy"
    default: false
    description: "Use RAID for redundancy."
    visible: 
      and: 
        - ${localdisk}
        - ${log_vol}

  nfs_target_path:
    type: string
    title: "NFS Path"
    default: "/fss"
    description: "Value of the path on which you can mount the drive."
    visible: 
      and:
        - ${add_nfs}
    required: true

  nfs_source_IP:
    type: string
    title: "NFS server IP"
    default: "0.0.0.0"
    required: true
    description: "IP address of the NFS server."
    visible: 
      and:
        - ${add_nfs}
        - eq:
          - ${create_fss}
          - "existing"

  nfs_source_path:
    type: string
    title: "NFS server Path"
    default: "/fss"
    description: "Value of the path on the NFS server."
    visible: ${add_nfs}
    required: true

  nfs_options:
    type: string
    title: "Options"
    default: ""
    description: "Mount options, FSS requires empty string."
    visible: 
      and:
        - ${add_nfs}
        - eq:
          - ${create_fss}
          - "existing"

  privilege_sudo:
    type: boolean
    title: "Sudo Access"
    default: true
    description: "Give sudo access to the privilege group."

  privilege_group_name:
    type: string
    title: "Name of the group with privileges"
    default: "privilege"
    required: true
    visible: 
      and:
        - ${privilege_sudo}

  login_node:
    type: boolean
    title: "Login Node"
    default: true
    description: "Create a login node for users."

  login_ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${targetCompartment}
    visible: 
      and:
        - complexExpression
        - ${login_node}
    required: true
    description: "Availability Domain."
    title: "Availability Domain For Login Node"
    default: ${ad}

  login_shape:
    title: Shape of the login node
    type: oci:core:instanceshape:name
    dependsOn:
      compartmentId: ${targetCompartment}
    required: true
    default: VM.Standard.E5.Flex
    visible: ${login_node}

  login_ocpus:
    type: integer
    title: Cores
    description: Number of OCPUs for the Flex shape.
    minimum: 1
    maximum: 64
    default: 16
    visible:
      and: 
        - or: 
          - eq:
            - ${login_shape}
            - "VM.Standard.E3.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.E4.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.E5.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.E6.Flex"
          - eq:
            - ${login_shape}
            - "VM.Optimized3.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.A1.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.A2.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard3.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.x86.Generic"
          - eq:
            - ${login_shape}
            - "VM.Standard.Intel.Generic"
          - eq:
            - ${login_shape}
            - "VM.Standard.AMD.Generic"
        - ${login_node}
    required: true

  login_ocpus_denseIO_flex:
    title: Cores
    type: enum
    description: Number of OCPUs for Dense IO Flex shape.
    enum:
      - 8
      - 16
      - 32
    default: 8
    visible:
      and: 
        - or: 
          - eq:
            - ${login_shape}
            - "VM.DenseIO.E4.Flex"
          - eq:
            - ${login_shape}
            - "VM.DenseIO.E5.Flex"
        - ${login_node}
    required: true

  login_custom_memory: 
    title: Use custom memory size
    type: boolean
    default: false
    visible:
      and: 
        - or: 
          - eq:
            - ${login_shape}
            - "VM.Standard.E3.Flex"
          - eq:
            - ${login_shape}
            - "VM.Optimized3.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.E4.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.E5.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.E6.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.A1.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.A2.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard3.Flex"
          - eq:
            - ${login_shape}
            - "VM.Standard.x86.Generic"
          - eq:
            - ${login_shape}
            - "VM.Standard.Intel.Generic"
          - eq:
            - ${login_shape}
            - "VM.Standard.AMD.Generic"
        - ${login_node}

  login_memory:
    title: Memory in GBs
    type: integer
    description: Number of memory for Flex shape. Minimum 1 GB per core.
    minimum: 1
    maximum: 1024
    default: 128
    visible:
      and: 
        - and: 
          - or: 
            - eq:
              - ${login_shape}
              - "VM.Standard.E3.Flex"
            - eq:
              - ${login_shape}
              - "VM.Optimized3.Flex"
            - eq:
              - ${login_shape}
              - "VM.Standard.E4.Flex"
            - eq:
              - ${login_shape}
              - "VM.Standard.E5.Flex"
            - eq:
              - ${login_shape}
              - "VM.Standard.E6.Flex"
            - eq:
              - ${login_shape}
              - "VM.Standard.A1.Flex"
            - eq:
              - ${login_shape}
              - "VM.Standard.A2.Flex"
            - eq:
              - ${login_shape}
              - "VM.Standard3.Flex"
            - eq:
              - ${login_shape}
              - "VM.Standard.x86.Generic"
            - eq:
              - ${login_shape}
              - "VM.Standard.Intel.Generic"
            - eq:
              - ${login_shape}
              - "VM.Standard.AMD.Generic"
        - and: 
            - ${login_custom_memory}
            - ${login_node}
    required: true

  login_boot_volume_size:
    type: integer
    required: true
    minimum: 50
    title: "Size of the boot volume in GB"
    default: 512
    visible:  ${login_node}

  monitoring_node:
    type: boolean
    title: "Monitoring Node"
    default: false
    description: "Create a monitoring node."
    visible: cluster_monitoring

  monitoring_ad:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: ${targetCompartment}
    visible: 
      and:
